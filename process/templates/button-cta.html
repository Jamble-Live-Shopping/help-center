<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; padding: 16px 0 12px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.section-title { font-size: 14px; font-weight: 600; color: #A0A7B7; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 20px 10px; }
.field-preview { margin: 0 20px 12px; height: 40px; background: #F9FAFC; border: 1px solid #DADDE3; border-radius: 8px; display: flex; align-items: center; padding: 0 12px; font-size: 14px; color: #A0A7B7; }
.cta-wrap { padding: 16px 20px 8px; border-top: 0.5px solid #E9EAEF; margin-top: 8px; }
.btn-brand { width: 100%; background: #7E53F8; color: #FFFFFF; border: none; padding: 14px; border-radius: 28px; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; }
</style></head><body>
<div class="phone">
  <div class="section-title">Almost done</div>
  <div class="field-preview">Charizard VMAX PSA 9</div>
  <div class="field-preview">R$ 150.00 · Real-time offers</div>
  <div class="field-preview">3 photos added</div>
  <div class="cta-wrap">
    <button class="btn-brand">Add Listing</button>
  </div>
</div>
</body></html>
