<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; padding: 16px 0 12px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }

.section-title { font-size: 14px; font-weight: 600; color: #A0A7B7; text-transform: uppercase; letter-spacing: 0.5px; padding: 16px 20px 10px; }
.grid-wrap { padding: 0 20px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: #F9FAFC; border: 1px solid #E9EAEF; border-radius: 12px; padding: 12px; }
.slot { aspect-ratio: 1; border-radius: 8px; background: #F2F2F7; display: flex; align-items: center; justify-content: center; position: relative; }
.slot .label { font-size: 12px; color: #8E8E93; font-weight: 500; }
.slot.add { border: 1.5px dashed #C7C7CC; background: transparent; }
.slot.add .plus { font-size: 22px; color: #C7C7CC; font-weight: 300; }
.badge { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: #7E53F8; color: white; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.hint { font-size: 13px; color: #8E8E93; padding: 8px 0 0; text-align: center; }
</style></head><body>
<div class="phone">
  <div class="section-title">Photos</div>
  <div class="grid-wrap">
    <div class="grid">
      <div class="slot"><div class="badge">1</div><span class="label">Cover</span></div>
      <div class="slot"><div class="badge">2</div></div>
      <div class="slot"><div class="badge">3</div></div>
      <div class="slot add"><span class="plus">+</span></div>
    </div>
    <div class="hint">Up to 10 photos</div>
  </div>
</div>
</body></html>
