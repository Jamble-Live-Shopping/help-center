<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; padding: 16px 0 12px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }

.section-header { font-size: 13px; font-weight: 400; color: #6D6D80; text-transform: uppercase; padding: 8px 20px 6px; letter-spacing: -0.08px; }
.group { background: #FFFFFF; margin: 0 12px; border-radius: 12px; overflow: hidden; border: 1px solid #E9EAEF; }
.row { display: flex; align-items: center; padding: 12px 16px; min-height: 44px; }
.row-icon { width: 30px; height: 30px; border-radius: 7px; background: #7E53F8; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; margin-right: 12px; flex-shrink: 0; }
.row-icon.gray { background: #8E8E93; }
.row-label { font-size: 17px; color: #000; flex: 1; line-height: 22px; }
.row.dimmed .row-label { color: #C7C7CC; }
.spacer { height: 20px; }
</style></head><body>
<div class="phone">
  <div class="section-header">Important</div>
  <div class="group">
    <div class="row">
      <div class="row-icon">▶</div>
      <div class="row-label">Apply to go Live</div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="section-header">Sell</div>
  <div class="group">
    <div class="row dimmed">
      <div class="row-icon gray">$</div>
      <div class="row-label" style="color:#C7C7CC">...</div>
    </div>
  </div>
</div>
</body></html>
