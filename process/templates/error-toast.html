<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 16px 12px;
}
.phone {
  width: 320px;
  background: #F9FAFC;
  padding: 12px 0;
}
.toast {
  background: #FFFFFF;
  border-radius: 12px;
  margin: 0 12px;
  padding: 12px 16px;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18), 0 0 1px rgba(0, 0, 0, 0.1);
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast-icon {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
}
.toast-text {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  flex: 1;
  min-width: 0;
}
.toast-title {
  font-size: 16px;
  font-weight: 600;
  color: #162233;
  line-height: 22px;
  letter-spacing: -0.01em;
}
.toast-subtitle {
  font-size: 14px;
  font-weight: 400;
  color: #162233;
  line-height: 20px;
  margin-top: 2px;
}
</style></head><body>
<div class="phone">
  <div class="toast">
    <svg class="toast-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="16" cy="16" r="14" fill="#D92C20"/>
      <rect x="14.5" y="7.5" width="3" height="11" rx="1.5" fill="#FFFFFF"/>
      <circle cx="16" cy="22.5" r="1.75" fill="#FFFFFF"/>
    </svg>
    <div class="toast-text">
      <div class="toast-title">Oops, something happened!</div>
      <div class="toast-subtitle">You can not use prebid if you have more than one quantity</div>
    </div>
  </div>
</div>
</body></html>
