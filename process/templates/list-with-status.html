<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 320px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
  padding-bottom: 8px;
}
.section-header {
  padding: 16px 20px 8px;
  font-size: 17px;
  font-weight: 600;
  color: #162233;
}
.list {
  margin: 0 12px;
  border: 1px solid #E9EAEF;
  border-radius: 12px;
  overflow: hidden;
}
.row {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  border-bottom: 1px solid #F0F1F5;
}
.row:last-child { border-bottom: none; }
.row-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.row-id {
  font-size: 15px;
  font-weight: 600;
  color: #162233;
}
.row-amount {
  font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: #162233;
}
.row-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.status {
  font-size: 13px;
  font-weight: 600;
}
.status.completed { color: #17B169; }
.status.failed { color: #D92C20; }
.status.pending { color: #FCB022; }
.row-date {
  font-size: 13px;
  color: #6B7A92;
}
</style></head><body>
<div class="phone">
  <div class="section-header">Payouts History</div>
  <div class="list">
    <div class="row">
      <div class="row-top">
        <div class="row-id">#PAY-12345</div>
        <div class="row-amount">R$ 350,00</div>
      </div>
      <div class="row-bottom">
        <div class="status completed">Completed</div>
        <div class="row-date">19/03/2026</div>
      </div>
    </div>
    <div class="row">
      <div class="row-top">
        <div class="row-id">#PAY-12340</div>
        <div class="row-amount">R$ 520,00</div>
      </div>
      <div class="row-bottom">
        <div class="status completed">Completed</div>
        <div class="row-date">15/03/2026</div>
      </div>
    </div>
    <div class="row">
      <div class="row-top">
        <div class="row-id">#PAY-12335</div>
        <div class="row-amount">R$ 180,00</div>
      </div>
      <div class="row-bottom">
        <div class="status completed">Completed</div>
        <div class="row-date">10/03/2026</div>
      </div>
    </div>
    <div class="row">
      <div class="row-top">
        <div class="row-id">#PAY-12330</div>
        <div class="row-amount">R$ 95,00</div>
      </div>
      <div class="row-bottom">
        <div class="status failed">Failed</div>
        <div class="row-date">08/03/2026</div>
      </div>
    </div>
  </div>
</div>
</body></html>
