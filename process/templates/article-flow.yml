# Article flow contract.
#
# Lives at articles/<slug>/flow.yml. Versioned per article. Read by
# scripts/validate-article-flow.py and enforced by the
# validate-article-flow CI workflow.
#
# This file is NOT a substitute for process/. The MD doctrine
# (process/00-RUNBOOK.md, process/03-html-template.md, process/design-system.md,
# process/12-procedure-compliance.md) remains the source of truth for HOW to
# write an article. The flow.yml only declares WHAT this specific article is,
# what sources it draws from, what claims it must verify, what mockups it
# needs, what it must NOT say, and what risk flags need human review.
#
# Convention: every key documented below is required unless tagged optional.
# Empty arrays are valid (e.g. ios_files: []) but signal "explicitly nothing
# applies", not "to be filled later".

# Workflow version. Used as a future-proof tag. No behavior bound to this
# value in the current MVP; the RUNBOOK MD remains the canonical workflow.
workflow: article-v2

# Mode of work for this article. Used by reviewers to calibrate scope.
#   v2_rewrite   = full rewrite of an existing article on the v2 mockup pipeline
#   new_article  = brand new slug, no prior intercom_id
#   minor_edit   = targeted fix (typo, claim correction), no mockup changes expected
mode: v2_rewrite

# Audience targeting. Drives reviewer assignment and tone calibration.
#   seller_br   = active or aspiring sellers in Brazil
#   buyer_br    = buyers and prospective buyers in Brazil
#   both        = applies to both audiences (rare; usually means split into two)
audience: seller_br

# Single-sentence "job to be done" for the reader. What does the reader walk
# away with? Used by reviewers to validate the article actually serves this job.
job_to_be_done: ""

# Sources of truth that the article must reflect. Every claim in pt-br.md and
# en.md must be traceable to one of these. Code audit (Phase 7) cross-checks
# this list. Empty array = explicitly no source needed (rare; flag with risk).
source_of_truth:
  ios_files: []          # repo-relative paths in Jamble-iOS, e.g. DISCOUNT/Views/X.swift:220-305
  backend_files: []      # repo-relative paths in jamble_backend, e.g. src/entities/referral.py:140-272
  legal: []              # Notion page ids, ToU section refs (e.g. "Notion 34f9449e Section 25")
  support_context: []    # Intercom convo ids, Slack thread URLs (optional, for context only)

# Content contract. Three lists with different enforcement.
content_contract:
  # Topics the article MUST cover. Validator soft-warns if keywords missing
  # in pt-br.md and en.md. Use short noun phrases, not full sentences.
  must_answer: []

  # Deterministic strings or regex patterns that MUST NOT appear in pt-br.md
  # or en.md. Hard fail. Use this for unambiguous bans (e.g. "auction",
  # "leilao", competitor names, internal codenames). Each entry is
  # case-insensitive substring match. Prefix with "regex:" to use a regex
  # (e.g. "regex:\\bWise\\b" to ban a standalone word).
  forbidden_terms: []

  # Human-readable phrases / rules describing what NOT to say. Soft warn.
  # Reviewers use this list during PR review. Validator does NOT tokenize
  # these into keywords (would create false positives for adjacent legitimate
  # vocabulary). For deterministic enforcement, use forbidden_terms instead.
  must_not_say: []

# Mockup plan. One entry per screen the article needs. Validator enforces:
#   - HTML pair (__pt-br + __en) for each name in mockup-sources/
#   - PNG pair rendered DPR3 (>=900px wide) in assets/mockups/
mockup_plan:
  required: true        # if false, validator skips mockup checks entirely
  screens:
    # Example schema (uncomment and fill per article):
    # - name: inbox-list                  # also drives filename: <name>__pt-br.html
    #   purpose: "Show where seller sees buyer messages"
    #   source: ios_required              # ios_required | composite | feather_fallback
    #
    #   # Screen-scoped icon contract (PR #88, batch-10 readiness gate).
    #   # OPTIONAL. When non-empty, the validator (rule
    #   # `screen_icon_not_in_html`) fails if any of these icon names is
    #   # missing from BOTH `<name>__pt-br.html` AND `<name>__en.html`.
    #   # Reference an icon via `alt="<icon>"`, `<!-- icon: <icon> -->`,
    #   # or `Assets.xcassets/<icon>.imageset`. Use this to lock the
    #   # iOS icon set for a specific screen, which the global
    #   # `flow.icons_required` rule cannot do per-screen.
    #   required_icons:
    #     - icon-send
    #     - icon-camera
    #
    #   # Manual review-gate list (PR #88, batch-10 readiness gate).
    #   # OPTIONAL. The validator does NOT enforce semantic content; this
    #   # is descriptive metadata that the reviewer pack surfaces at the
    #   # top of each article block so a reviewer scanning a 10-article
    #   # batch can see what to scrutinise without expanding every detail.
    #   # When `source: ios_required` and review_checks is empty, the
    #   # validator emits a SOFT warn (`screen_review_checks_missing`)
    #   # nudging the worker to record what the reviewer must check.
    #   # Conventional values:
    #   #   - icons_match_ios_source
    #   #   - labels_match_xcstrings
    #   #   - no_invented_ui_state
    #   review_checks:
    #     - icons_match_ios_source
    #     - labels_match_xcstrings
    #
    #   # Screen-scoped HTML text contract (PR #89A, deterministic
    #   # negative visual contract). OPTIONAL. Pure substring grep on
    #   # the screen's HTML files; no LLM, no regex, no semantic check.
    #   #
    #   # `html_must_contain` is locale-specific: each list applies
    #   # ONLY to its matching `<screen>__<lang>.html`. The rule
    #   # `screen_html_required_text_missing` HARD-fails when a
    #   # required string is missing for that locale.
    #   html_must_contain:
    #     pt-br:
    #       - "Seguir"
    #       - "Mensagem"
    #     en:
    #       - "Follow"
    #       - "Message"
    #
    #   # `html_must_not_contain` applies to BOTH locales (a flat list).
    #   # The rule `screen_html_forbidden_text_present` HARD-fails when
    #   # any listed string appears in either pt-br or en HTML. Use
    #   # this on screens whose iOS source says "no icon", "no toast",
    #   # "no <feature X>" so the validator catches the moment a
    #   # mockup smuggles invented UI back in.
    #   html_must_not_contain:
    #     - "::before"
    #     - "<img"
    #     - "<svg"
    #     - "icon-"
    []

# iOS icons used in the mockups. Each entry must satisfy ONE of:
#   1. assets/icons-ios/<name>.svg or .png exists in the repo (preferred,
#      reusable across articles), OR
#   2. an HTML mockup-source contains a comment "Assets.xcassets/<name>.imageset"
#      to document the inline base64 embed.
# Worker bias: when an icon is reusable, add it to the pool. When one-off,
# inline embed is OK but must be documented in the HTML comment.
icons_required: []

# Hard ban on Feather-style stroke SVGs for UI chrome (per process/03-html-template.md
# section "Embedding real iOS icons"). Default false. Setting to true requires
# explicit reviewer approval and risk_flag.
icons_fallback_feather: false

# If the article describes prices, currency_required: true forces validator to
# fail if pt-br.md does not contain "R$". Set false for articles that don't
# touch prices (e.g. DM, profile, notifications).
currency_required: false

# Per-article TOC override.
#   true  -> hard fail when the article has >= toc_required_h2_count H2
#            sections without a TOC marker. Use this on a long article
#            where navigation is critical (>= 8-10 sections, dense FAQs).
#   false -> skip the TOC check entirely. Use this on short articles or
#            articles where a TOC would be redundant.
#   unset -> fall back to workflow toc_policy in process/workflows/article-v2.yml
#            (currently `warn`, calibrated against historical content).
# This field is OPTIONAL; remove the line when leaving on workflow default.
# toc_required: false

# Legal, product, or operational tensions to surface in the PR body.
# HARD FAIL when metadata.state == "published" AND risk_flags is non-empty
# AND resolved_decisions is empty: an article with active risks cannot
# ship as published. To unblock, either resolve the risk and remove it
# from risk_flags, or document the decision in resolved_decisions and
# leave the risk in place for traceability.
risk_flags: []

# Per-risk decisions that explicitly green-light publication despite a
# remaining risk_flag. One entry per risk that was reviewed by humans
# and intentionally accepted. Use this when a risk cannot be removed
# (e.g. legal label staying ambiguous) but the team agreed to ship.
# Each entry: who made the call, when, and why.
#   resolved_decisions:
#     - risk: "ToU R$ 100 cap vs code R$ 500"
#       decided_by: "Aymar + Yamila"
#       decided_at: "2026-05-05"
#       rationale: "ToU 25.B.2.d update planned 2026-05-15, ship article with code value"
resolved_decisions: []
