# Golden flow for apply-to-sell-on-jamble.
# This flow intentionally declares the canonical screen names that the
# article SHOULD have. The historical article used asymmetric naming
# (configuracoes-menu pt-br vs settings-apply-to-sell en, two different
# screen names for the same iOS view), violating the 1:1 mirror principle
# in process/03-html-template.md.
#
# Replay therefore fails on mockup_declared_not_in_{pt,en} for screen
# 'settings-menu'. That is the calibration finding from the golden replay
# (see deliverables/golden-replay-2026-05-05.md): the validator does
# surface the asymmetry. The fail is allowlisted here as documented
# technical debt; the article needs a separate cleanup PR to land the
# unified settings-menu pair before the allowlist can drop.

workflow: article-v2
mode: v2_rewrite
audience: seller_br

job_to_be_done: "Help a buyer or new user apply to become a Live Seller on Jamble in Brazil, understand the review timeline, and know what to do after approval"

source_of_truth:
  ios_files:
    - PROFILE/ProfileSettings/ProfileSettingsV2ViewController.swift
    - PROFILE/Views/ProfileHeaderViewController.swift
    - SHOW/ViewControllers/JambleTabBarController.swift
    - APPLY/SellerApplicationInvitationViewController.swift
  backend_files:
    - jamble_backend/src/services/seller_application_service.py
  legal: []
  support_context: []

content_contract:
  must_answer:
    - "where to find the application entry point in the app"
    - "how long the review takes"
    - "what happens after approval"
    - "max 2 applications and what to do after a refusal"
  forbidden_terms:
    - "regex:\\bauction\\b"
    - "regex:\\bleil[aã]o\\b"
  must_not_say:
    - "Internal review SLAs or staffing details"
    - "Backend service names and database tables"

mockup_plan:
  required: true
  screens:
    - name: settings-menu
      purpose: "Show the Settings IMPORTANTE section with the Apply to go Live row"
      source: ios_required
    - name: pending-application
      purpose: "Show the native UIAlertController that appears when the user tries to re-apply"
      source: ios_required

icons_required: []
icons_fallback_feather: false

currency_required: false

risk_flags: []
resolved_decisions: []

# Expected fails (technical debt tracker, structured).
# Each entry pins a single rule + count + substring guard. Drop entries
# in a separate cleanup PR once the underlying defect is fixed.
expected_fails:
  - rule: mockup_png_missing
    count: 2
    contains: "settings-menu"
    reason: "the unified settings-menu pair PNGs do not exist yet (legacy article uses configuracoes-menu pt-br + settings-apply-to-sell en)"
    removal_path: "Render and commit the settings-menu pt-br + en PNGs in a cleanup PR"
  - rule: mockup_html_missing
    count: 2
    contains: "settings-menu"
    reason: "the unified settings-menu pair HTMLs do not exist yet (same legacy naming asymmetry)"
    removal_path: "Generate the settings-menu pt-br + en HTML mockup-sources in the cleanup PR"
  - rule: mockup_declared_not_in_pt
    count: 1
    contains: "settings-menu"
    reason: "pt-br.md still embeds the legacy configuracoes-menu PNG, not the unified settings-menu name declared in this flow"
    removal_path: "Update pt-br.md image link to settings-menu after the cleanup PR ships the unified pair"
  - rule: mockup_declared_not_in_en
    count: 1
    contains: "settings-menu"
    reason: "en.md still embeds settings-apply-to-sell PNG, not settings-menu"
    removal_path: "Update en.md image link to settings-menu after the cleanup PR ships the unified pair"
  - rule: mockup_referenced_not_declared
    count: 2
    contains:
      - "configuracoes-menu"
      - "settings-apply-to-sell"
    reason: "pt-br.md references legacy 'configuracoes-menu' and en.md references legacy 'settings-apply-to-sell'; the unified flow declares only settings-menu"
    removal_path: "Cleanup PR replaces both legacy embeds with the unified settings-menu pair"
  - rule: content_audit_missing_stale_feature
    count: 1
    contains: "stale-feature audit"
    reason: "this article's content-audit has no stale-feature subsection at all (older audit format)"
    removal_path: "Add a 'Stale-feature audit' subsection with the structured table"
  - rule: backend_files_not_audited
    count: 1
    contains: "jamble_backend"
    reason: "flow declares seller_application_service.py but the historical code-audit cites only iOS files"
    removal_path: "Add a backend evidence row to the code-audit, or drop backend_files from this flow if the dependency is not strict"
