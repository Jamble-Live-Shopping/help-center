# Golden flow for livestream-tools-everything-you-can-do-while-hosting.
# Used by golden replay specifically to verify that the stale-feature gate
# (content_audit_scan6_not_stale) catches the misleading "Scan 6" label
# in the historical content-audit. No allowlist on that rule: replay
# should fail until the underlying audit is rewritten with an explicit
# stale-feature subsection.

workflow: article-v2
mode: v2_rewrite
audience: seller_br

job_to_be_done: "Help live sellers learn every tool available while hosting a show: product list, settings, screen overlays, audience interactions"

source_of_truth:
  ios_files:
    - LIVE_SHOPPING/HostV2/  # host UI controllers
    - LIVE_SHOPPING/ProductList/  # product list management
  backend_files: []
  legal: []
  support_context: []

content_contract:
  must_answer:
    - "what controls the host has during a show"
    - "how to add a product live"
    - "how to configure show settings without ending the live"
    - "what the audience can interact with"
  forbidden_terms:
    - "regex:\\bauction\\b"
    - "regex:\\bleil[aã]o\\b"
  must_not_say:
    - "Internal scheduling or transcoding details"
    - "Backend service names"

mockup_plan:
  required: true
  screens:
    - name: screen-overview
      purpose: "Annotated overview of every host control on the live screen"
      source: ios_required
    - name: product-list-tabs
      purpose: "Show the product list tabs (live, queued, sold) the host uses"
      source: ios_required
    - name: add-products-sheet
      purpose: "Show the bottom sheet to add products mid-show"
      source: ios_required
    - name: show-settings-menu
      purpose: "Show the host settings menu accessible without ending the show"
      source: ios_required

icons_required: []
icons_fallback_feather: false

currency_required: false

risk_flags: []
resolved_decisions: []

# Expected fails: empty. This article is a clean canary post-PR #76:
# the content-audit gained an explicit "Stale-feature audit" subsection
# with the structured table (Claim / feature, Source checked, Status,
# Checked at, Owner, Verdict). The replay must therefore observe 0
# hard fails. If a regression appears, the canary fails loud and the
# team investigates instead of allowlisting.
#
# NOTE: rule 27 (source_of_truth_path_missing) is intentionally NOT
# expected here. Replay forces no-iOS mode (JAMBLE_IOS_ROOT unset,
# JAMBLE_IOS_NO_DEFAULT_FALLBACK=1) so path-existence is skipped and
# expected_fails stay filesystem-portable for CI. The rule is proven
# by fake-JAMBLE_IOS_ROOT tests in test-article-factory.py.
expected_fails: []
