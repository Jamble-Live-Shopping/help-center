<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
  padding: 20px 16px 16px;
}
.navbar {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 2px 0 14px;
}
.navbar-title {
  font-size: 18px;
  font-weight: 700;
  color: #162233;
  letter-spacing: -0.3px;
}
.navbar-close {
  position: absolute;
  right: 0;
  top: 2px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #F3F4F8;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #6D6D80;
  font-size: 14px;
  font-weight: 600;
}
.summary-card {
  background: #F3F4F8;
  border-radius: 20px;
  padding: 18px 16px;
  margin-bottom: 18px;
  text-align: center;
}
.summary-label {
  font-size: 13px;
  font-weight: 600;
  color: #7E53F8;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 6px;
}
.summary-label svg { width: 14px; height: 14px; }
.summary-amount {
  font-size: 32px;
  font-weight: 700;
  color: #7E53F8;
  line-height: 38px;
  letter-spacing: -0.5px;
}
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: #6D6D80;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  padding: 4px 4px 10px;
}
.friend-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 4px;
}
.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  color: #FFFFFF;
}
.a1 { background: #FDB022; }
.a2 { background: #17B169; }
.a3 { background: #7E53F8; }
.friend-info { flex: 1; min-width: 0; }
.friend-name {
  font-size: 15px;
  font-weight: 600;
  color: #162233;
  line-height: 20px;
}
.friend-status {
  font-size: 13px;
  color: #6D6D80;
  line-height: 18px;
  margin-top: 2px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.friend-status.completed { color: #7E53F8; font-weight: 500; }
.friend-status svg { width: 12px; height: 12px; }
.reward-amount {
  font-size: 15px;
  font-weight: 700;
  color: #7E53F8;
}
</style>
</head>
<body>
<div class="phone">
  <div class="navbar">
    <div class="navbar-title">Ongoing Referrals</div>
    <div class="navbar-close">v</div>
  </div>

  <div class="summary-card">
    <div class="summary-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="#7E53F8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Pending
    </div>
    <div class="summary-amount">R$ 60</div>
  </div>

  <div class="section-title">Friends</div>

  <div class="friend-row">
    <div class="avatar a1">BS</div>
    <div class="friend-info">
      <div class="friend-name">Bruno Silva</div>
      <div class="friend-status">
        <svg viewBox="0 0 24 24" fill="none" stroke="#6D6D80" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        8 days Left
      </div>
    </div>
  </div>
  <div class="friend-row">
    <div class="avatar a2">CA</div>
    <div class="friend-info">
      <div class="friend-name">Camila Alves</div>
      <div class="friend-status">
        <svg viewBox="0 0 24 24" fill="none" stroke="#6D6D80" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        12 days Left
      </div>
    </div>
  </div>
  <div class="friend-row">
    <div class="avatar a3">LR</div>
    <div class="friend-info">
      <div class="friend-name">Lucas Rocha</div>
      <div class="friend-status completed">Completed</div>
    </div>
    <div class="reward-amount">R$ 30</div>
  </div>
</div>
</body>
</html>
