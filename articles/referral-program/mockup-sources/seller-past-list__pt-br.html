<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
}

.phone { padding: 20px 16px 16px; }
.navbar { display: flex; align-items: center; justify-content: center; position: relative; padding: 2px 0 14px; }
.navbar-title { font-size: 18px; font-weight: 700; color: #162233; letter-spacing: -0.3px; }
.navbar-close { position: absolute; right: 0; top: 2px; width: 28px; height: 28px; border-radius: 50%; background: #F3F4F8; display: flex; align-items: center; justify-content: center; }
.navbar-close img { width: 14px; height: 14px; }
.summary-card { background: #079455; border-radius: 20px; padding: 18px 16px; margin-bottom: 18px; text-align: center; }
.summary-label { font-size: 13px; font-weight: 600; color: #FFFFFF; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 6px; opacity: 0.95; }
.summary-label img { width: 20px; height: 20px; }
.summary-amount { font-size: 32px; font-weight: 700; color: #FFFFFF; line-height: 38px; letter-spacing: -0.5px; }
.section-title { font-size: 13px; font-weight: 600; color: #6D6D80; text-transform: uppercase; letter-spacing: 0.3px; padding: 4px 4px 10px; }
.friend-row { display: flex; align-items: center; gap: 12px; padding: 10px 4px; }
.avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #FFFFFF; }
.a1 { background: #7E53F8; }
.a2 { background: #FDB022; }
.friend-info { flex: 1; min-width: 0; }
.friend-name { font-size: 15px; font-weight: 600; color: #162233; line-height: 20px; }
.friend-status { font-size: 13px; color: #079455; font-weight: 500; line-height: 18px; margin-top: 2px; }
.reward-pill { display: flex; align-items: center; gap: 6px; background: #F9FAFC; color: #079455; font-size: 14px; font-weight: 700; padding: 6px 10px; border-radius: 12px; border: 1px solid #E9EAEF; }
.reward-pill img { width: 18px; height: 18px; }
</style></head>
