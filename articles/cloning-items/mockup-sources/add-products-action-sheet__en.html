<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; min-height: 460px; background: rgba(0,0,0,0.32); border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 14px 8px; }
.sheet { background: rgba(242,242,247,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 14px; overflow: hidden; }
.sheet-action { padding: 16px 16px; font-size: 17px; color: #007AFF; text-align: center; border-bottom: 0.5px solid rgba(60,60,67,0.18); background: rgba(255,255,255,0.78); }
.sheet-action:last-child { border-bottom: none; }
.cancel { margin-top: 8px; background: rgba(255,255,255,0.92); border-radius: 14px; }
.cancel .sheet-action { color: #007AFF; font-weight: 600; }
</style></head><body>
<div class="phone">
  <div class="sheet">
    <div class="sheet-action">New Quickie Listing</div>
    <div class="sheet-action">Clone Past Shows Listings</div>
  </div>
  <div class="cancel">
    <div class="sheet-action">Cancel</div>
  </div>
</div>
</body></html>
