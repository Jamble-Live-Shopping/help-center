<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 14px; }
.nav { display: flex; align-items: center; padding: 12px 16px; }
.nav-back { width: 24px; height: 24px; color: #162233; font-size: 22px; line-height: 22px; }
.nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 500; color: #000; margin-right: 24px; }
.show-card { display: flex; gap: 10px; align-items: center; margin: 8px 16px 12px; padding: 10px; border: 1px solid #E9EAEF; border-radius: 8px; }
.show-thumb { width: 56px; height: 64px; border-radius: 6px; background: linear-gradient(135deg, #7E53F8 0%, #5A3FCB 100%); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; font-weight: 700; }
.show-meta { display: flex; flex-direction: column; gap: 4px; }
.show-title { font-size: 15px; font-weight: 500; color: #000; }
.show-date { font-size: 13px; font-weight: 500; color: #6B7A92; }
.show-counts { font-size: 13px; font-weight: 500; color: #000; }
.list { padding: 0 12px; }
.cell { display: flex; align-items: center; gap: 12px; padding: 14px 8px; background: #FFFFFF; border-top: 1px solid #F0F1F5; }
.cell.added { opacity: 0.5; }
.cell-img { width: 52px; height: 52px; border-radius: 8px; flex-shrink: 0; background: #F2F2F7; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.cell-meta { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.cell-title { font-size: 15px; font-weight: 500; color: #000; line-height: 18px; }
.cell-sub { font-size: 13px; font-weight: 500; color: #6B7A92; }
.radio { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #A0A7B7; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.radio.checked { border-color: #162233; }
.radio.checked::after { content: ""; width: 10px; height: 10px; border-radius: 50%; background: #162233; }
.cta { background: #000; color: white; height: 50px; border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; margin: 14px 20px 0; }
</style></head><body>
<div class="phone">
  <div class="nav">
    <div class="nav-back">&#8592;</div>
    <div class="nav-title">Selecionar listagens</div>
  </div>
  <div class="show-card">
    <div class="show-thumb">FF</div>
    <div class="show-meta">
      <div class="show-title">Fashion Finds Friday</div>
      <div class="show-date">15 de mar, 20:00</div>
      <div class="show-counts">12 unsolds, 3 solds</div>
    </div>
  </div>
  <div class="list">
    <div class="cell">
      <div class="cell-img">&#128095;</div>
      <div class="cell-meta">
        <div class="cell-title">Nike Air Max 90</div>
        <div class="cell-sub">2 Disponível</div>
        <div class="cell-sub">Começa em R$200</div>
      </div>
      <div class="radio checked"></div>
    </div>
    <div class="cell">
      <div class="cell-img">&#128085;</div>
      <div class="cell-meta">
        <div class="cell-title">Camiseta vintage</div>
        <div class="cell-sub">1 Disponível</div>
        <div class="cell-sub">R$80</div>
      </div>
      <div class="radio"></div>
    </div>
    <div class="cell added">
      <div class="cell-img">&#128086;</div>
      <div class="cell-meta">
        <div class="cell-title">(Added) Calça Levis 501</div>
      </div>
      <div class="radio"></div>
    </div>
  </div>
  <div class="cta">Clone 1 listing</div>
</div>
</body></html>
