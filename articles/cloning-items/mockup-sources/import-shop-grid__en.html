<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 14px; }
.nav { display: flex; align-items: center; padding: 12px 16px; }
.nav-back { width: 24px; height: 24px; color: #162233; font-size: 18px; line-height: 22px; }
.nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 500; color: #000; margin-right: 24px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 8px; }
.card { background: #FFFFFF; border-radius: 8px; overflow: hidden; }
.card-img { aspect-ratio: 1; background: #F2F2F7; display: flex; align-items: center; justify-content: center; font-size: 28px; position: relative; border-radius: 8px; }
.card-img.selected { box-shadow: 0 0 0 2px #7E53F8 inset; }
.card .badge { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 50%; background: #7E53F8; color: white; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.card-meta { padding: 6px 4px 0; }
.card-title { font-size: 12px; font-weight: 500; color: #162233; line-height: 14px; }
.card-price { font-size: 12px; font-weight: 600; color: #6B7A92; margin-top: 2px; }
.cta { background: #000; color: white; height: 50px; border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; margin: 14px 20px 0; }
</style></head><body>
<div class="phone">
  <div class="nav">
    <div class="nav-back">&#9662;</div>
    <div class="nav-title">Import Listings from Shop</div>
  </div>
  <div class="grid">
    <div class="card">
      <div class="card-img selected">&#128095;<div class="badge">1</div></div>
      <div class="card-meta">
        <div class="card-title">Nike Air Max</div>
        <div class="card-price">$200</div>
      </div>
    </div>
    <div class="card">
      <div class="card-img selected">&#128091;<div class="badge">2</div></div>
      <div class="card-meta">
        <div class="card-title">Leather Bag</div>
        <div class="card-price">$150</div>
      </div>
    </div>
    <div class="card">
      <div class="card-img selected">&#128141;<div class="badge">3</div></div>
      <div class="card-meta">
        <div class="card-title">Silver Ring</div>
        <div class="card-price">$45</div>
      </div>
    </div>
  </div>
  <div class="cta">Import 3 products</div>
</div>
</body></html>
