# Article flow contract.
#
# Lives at articles/<slug>/flow.yml. Versioned per article. Read by
# scripts/validate-article-flow.py and enforced by the
# validate-article-flow CI workflow.

workflow: article-v2
mode: v2_rewrite
audience: seller_br
job_to_be_done: "Help sellers handle a shipment returned to them: how to know it's returned, how to repackage and reship, refund flow if the buyer cancels"

source_of_truth:
  ios_files:
    - TRANSACTION/Models/Transaction.swift:37-58
    - TRANSACTION/Models/TransactionFilter.swift:10-73
    - TRANSACTION/Models/TransactionFilter.swift:151-164
    - TRANSACTION/Sale/SaleViewController.swift:903-998
    - TRANSACTION/Sale/SaleViewController.swift:1076-1170
    - RESOURCES/Assets.xcassets/transaction_alert_red.imageset/Vector.svg
    - RESOURCES/Localizable.xcstrings
  backend_files:
    - jamble_backend/src/entities/transaction.py:30-72
    - jamble_backend/src/entities/transaction.py:402-432
    - jamble_backend/src/entities/transaction.py:601-680
    - jamble_backend/src/entities/transaction.py:682-756
    - jamble_backend/src/services/shipping_service.py:3080-3100
  legal: []
  support_context: []

content_contract:
  must_answer: []

  # Anti-pattern bans tied to RUNBOOK rule 2c and lessons learned. No legal
  # bans for this article.
  forbidden_terms:
    - "auction"
    - "leilão"

  must_not_say:
    - "Do not invent a self-service reship flow inside the app. iOS has no reship affordance after DELIVERY_RETURNED."
    - "Do not claim the buyer must cancel to be refunded. Refund is automatic once the parcel reaches the seller."

mockup_plan:
  required: true
  screens:
    # Screen 1: sale detail status banner when status = delivery_returned.
    # Seller view. Status label "Cancelado", red step bar at max_step,
    # description text from backend.
    # iOS source: SaleViewController.swift:903-998 (setupTransactionStatusView).
    # Backend source: transaction.py:412-418 (status), 634-638 (seller
    # description), 698-706 (max_step), 750-756 (red step_color).
    - name: sale-detail-returned-status
      purpose: "Show the seller's order-detail status banner once the parcel has been returned to them (status = DELIVERY_RETURNED)"
      source: ios_required
      review_checks:
        - icons_match_ios_source
        - labels_match_xcstrings
        - no_invented_ui_state
      html_must_contain:
        pt-br:
          - "Cancelado"
          - "devolvido a você"
          - "Número do pedido"
        en:
          - "Canceled"
          - "returned to you"
          - "Order Number"
      # Text-only anchor (rule 10e Option B): the seller's status banner
      # at SaleViewController.swift:903-998 renders status / action /
      # description / step bar as plain UILabels and a CSS-equivalent
      # AWStepBar. No UIImage attached to the banner itself.
      html_must_not_contain:
        - "<img"
        - "<svg"
        - "icon-"
      # Deterministic visible_text contract (PR #117, Step 2.6 ground-truth).
      # Status label + description resolve through backend transaction.py
      # because action=None for DELIVERY_RETURNED and the seller's
      # status_label falls back to `status` (line 418: "Canceled" / "Cancelado"),
      # while status_desc reads from description() at lines 636-637.
      # ship-title resolves through xcstrings (SaleViewController.swift:43
      # uses literal "Order Number"). ship-addr is runtime data (JAM-... id).
      visible_text:
        - selector: ".status-label"
          source: backend
          path: "jamble_backend/src/entities/transaction.py:412-418"
          locale_values:
            en: "Canceled"
            pt-br: "Cancelado"
        - selector: ".status-desc"
          source: backend
          path: "jamble_backend/src/entities/transaction.py:636-637"
          locale_values:
            en: "Your item could not be delivered and was returned to you"
            pt-br: "Seu item não pôde ser entregue e foi devolvido a você"
        - selector: ".ship-title"
          source: xcstrings
          key: "Order Number"
        - selector: ".ship-addr"
          source: user_content
      visible_text_allowlist:
        - selector: ".ship-addr"
          reason: "Runtime transaction id (JAM-YYYY-MM-NNNNNN), already covered by user_content entry"

    # Screen 2: Sales-list filter tabs with the "Devolvido" / "Returned"
    # tab visible. Real iOS asset: transaction_alert_red.imageset (red
    # circle with "!" inside, .alwaysOriginal renderingMode).
    # iOS source: TransactionFilter.swift:64-65 (label), :142-148 (icon
    # state), :160 (asset name).
    - name: sales-list-returned-tab
      purpose: "Show the Sales list filter strip where the seller finds returned shipments (Returned / Devolvido tab)"
      source: ios_required
      review_checks:
        - icons_match_ios_source
        - labels_match_xcstrings
        - no_invented_ui_state
      html_must_contain:
        pt-br:
          - "Devolvido"
          - "Concluído"
          - "Cancelado"
        en:
          - "Returned"
          - "Completed"
          - "Canceled"
      # Icon anchor (rule 10e Option A): the "Returned" filter pill uses
      # the iOS asset `transaction_alert_red` (Assets.xcassets/
      # transaction_alert_red.imageset/Vector.svg). Embedded inline so
      # `<svg` appears in the HTML.
      required_icons:
        - transaction_alert_red
      # Deterministic visible_text contract (PR #117, Step 2.6 ground-truth).
      # Nav title + 6 filter pills resolve through xcstrings (Sales /
      # TransactionFilter labels). For "To Ship" and "In Delivery" the
      # xcstrings file only ships the pt-BR localization (en uses the key
      # as the source literal via sourceLanguage:en) ; declared as backend
      # so the validator can compare both locales. Row pills resolve through
      # backend transaction.py:418 ("Canceled" / "Cancelado" for
      # delivery_returned, since TransactionV3Cell.swift:197 reads
      # action ?? status and action=None for DELIVERY_RETURNED). Row title
      # and meta line are runtime data (product titles + interpolated
      # "Order number: %@" with the runtime id).
      visible_text:
        - selector: ".nav"
          source: xcstrings
          key: "Sales"
        - selector: ".tabs > .tab:nth-of-type(1)"
          source: xcstrings
          key: "All"
        - selector: ".tabs > .tab:nth-of-type(2)"
          source: backend
          path: "Jamble/TRANSACTION/Models/TransactionFilter.swift:60"
          locale_values:
            en: "To Ship"
            pt-br: "Para envio"
        - selector: ".tab.tab-shipped"
          source: backend
          path: "Jamble/TRANSACTION/Models/TransactionFilter.swift:63"
          locale_values:
            en: "In Delivery"
            pt-br: "Em entrega"
        - selector: ".tab.tab-completed"
          source: xcstrings
          key: "Completed"
        - selector: ".tab.selected"
          source: xcstrings
          key: "Returned"
        - selector: ".tabs > .tab:nth-of-type(6)"
          source: xcstrings
          key: "Canceled"
        - selector: ".row .title"
          source: user_content
        - selector: ".row .meta"
          source: user_content
        - selector: ".row .pill"
          source: backend
          path: "jamble_backend/src/entities/transaction.py:412-418"
          locale_values:
            en: "Canceled"
            pt-br: "Cancelado"
      visible_text_allowlist:
        - selector: ".row .title"
          reason: "User-supplied product title (Charizard Holo 1999, Hot Wheels Treasure Hunt), runtime data"
        - selector: ".row .meta"
          reason: "Runtime interpolation of xcstrings 'Order number: %@' with the JAM-... id, full line cannot be matched as literal"

    # Screen 3: buyer-side order detail after delivery_returned. Shows
    # the refund-timing description verbatim from backend transaction.py:
    # 629-633. Justification: the article (seller-focused) must clarify
    # the refund flow the buyer sees, so the seller can answer buyer
    # questions about timing.
    # Backend source: transaction.py:412-418 (status="Canceled"),
    # 629-633 (buyer description with 5 business days).
    - name: buyer-refund-status-after-return
      purpose: "Show the buyer's order-detail card after the shipment was returned, communicating the automatic refund within 5 business days"
      source: ios_required
      review_checks:
        - icons_match_ios_source
        - labels_match_xcstrings
        - no_invented_ui_state
      html_must_contain:
        pt-br:
          - "Cancelado"
          - "5 dias úteis"
          - "devolvido ao vendedor"
        en:
          - "Canceled"
          - "5 business days"
          - "returned to the seller"
      html_must_not_contain:
        - "<img"
        - "<svg"
        - "icon-"
      # Deterministic visible_text contract (PR #117, Step 2.6 ground-truth).
      # Buyer-side variant: same banner structure as Screen 1 but the
      # description comes from the is_buyer=True branch at transaction.py:
      # 631-632 (refund-timing copy with "5 business days").
      visible_text:
        - selector: ".status-label"
          source: backend
          path: "jamble_backend/src/entities/transaction.py:412-418"
          locale_values:
            en: "Canceled"
            pt-br: "Cancelado"
        - selector: ".status-desc"
          source: backend
          path: "jamble_backend/src/entities/transaction.py:631-632"
          locale_values:
            en: "Your order could not be delivered and was returned to the seller. You'll receive a refund on your payment method within 5 business days"
            pt-br: "Seu pedido não pôde ser entregue e foi devolvido ao vendedor. Você receberá um reembolso no método de pagamento em até 5 dias úteis"
        - selector: ".ship-title"
          source: xcstrings
          key: "Order Number"
        - selector: ".ship-addr"
          source: user_content
      visible_text_allowlist:
        - selector: ".ship-addr"
          reason: "Runtime transaction id (JAM-YYYY-MM-NNNNNN), already covered by user_content entry"

icons_required:
  - transaction_alert_red
icons_fallback_feather: false

currency_required: false

# Short article (3 mockups, lifecycle-focused). 6-7 H2 sections linear.
# A TOC would add chrome without value.
toc_required: false

risk_flags: []
resolved_decisions: []
