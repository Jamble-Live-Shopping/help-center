# Article flow contract.
#
# Lives at articles/<slug>/flow.yml. Versioned per article. Read by
# scripts/validate-article-flow.py and enforced by the
# validate-article-flow CI workflow.

workflow: article-v2
mode: v2_rewrite
audience: seller_br
job_to_be_done: "Help sellers handle a shipment returned to them: how to know it's returned, how to repackage and reship, refund flow if the buyer cancels"

source_of_truth:
  ios_files:
    - TRANSACTION/Models/Transaction.swift:37-58
    - TRANSACTION/Models/TransactionFilter.swift:10-73
    - TRANSACTION/Models/TransactionFilter.swift:151-164
    - TRANSACTION/Sale/SaleViewController.swift:903-998
    - TRANSACTION/Sale/SaleViewController.swift:1076-1170
    - RESOURCES/Assets.xcassets/transaction_alert_red.imageset/Vector.svg
    - RESOURCES/Localizable.xcstrings
  backend_files:
    - jamble_backend/src/entities/transaction.py:30-72
    - jamble_backend/src/entities/transaction.py:402-432
    - jamble_backend/src/entities/transaction.py:601-680
    - jamble_backend/src/entities/transaction.py:682-756
    - jamble_backend/src/services/shipping_service.py:3080-3100
  legal: []
  support_context: []

content_contract:
  must_answer: []

  # Anti-pattern bans tied to RUNBOOK rule 2c and lessons learned. No legal
  # bans for this article.
  forbidden_terms:
    - "auction"
    - "leilão"

  must_not_say:
    - "Do not invent a self-service reship flow inside the app. iOS has no reship affordance after DELIVERY_RETURNED."
    - "Do not claim the buyer must cancel to be refunded. Refund is automatic once the parcel reaches the seller."

mockup_plan:
  required: true
  screens:
    # Screen 1: sale detail status banner when status = delivery_returned.
    # Seller view. Status label "Cancelado", red step bar at max_step,
    # description text from backend.
    # iOS source: SaleViewController.swift:903-998 (setupTransactionStatusView).
    # Backend source: transaction.py:412-418 (status), 634-638 (seller
    # description), 698-706 (max_step), 750-756 (red step_color).
    - name: sale-detail-returned-status
      purpose: "Show the seller's order-detail status banner once the parcel has been returned to them (status = DELIVERY_RETURNED)"
      source: ios_required
      review_checks:
        - icons_match_ios_source
        - labels_match_xcstrings
        - no_invented_ui_state
      html_must_contain:
        pt-br:
          - "Cancelado"
          - "devolvido a você"
          - "Número do pedido"
        en:
          - "Canceled"
          - "returned to you"
          - "Order Number"
      # Text-only anchor (rule 10e Option B): the seller's status banner
      # at SaleViewController.swift:903-998 renders status / action /
      # description / step bar as plain UILabels and a CSS-equivalent
      # AWStepBar. No UIImage attached to the banner itself.
      html_must_not_contain:
        - "<img"
        - "<svg"
        - "icon-"

    # Screen 2: Sales-list filter tabs with the "Devolvido" / "Returned"
    # tab visible. Real iOS asset: transaction_alert_red.imageset (red
    # circle with "!" inside, .alwaysOriginal renderingMode).
    # iOS source: TransactionFilter.swift:64-65 (label), :142-148 (icon
    # state), :160 (asset name).
    - name: sales-list-returned-tab
      purpose: "Show the Sales list filter strip where the seller finds returned shipments (Returned / Devolvido tab)"
      source: ios_required
      review_checks:
        - icons_match_ios_source
        - labels_match_xcstrings
        - no_invented_ui_state
      html_must_contain:
        pt-br:
          - "Devolvido"
          - "Concluído"
          - "Cancelado"
        en:
          - "Returned"
          - "Completed"
          - "Canceled"
      # Icon anchor (rule 10e Option A): the "Returned" filter pill uses
      # the iOS asset `transaction_alert_red` (Assets.xcassets/
      # transaction_alert_red.imageset/Vector.svg). Embedded inline so
      # `<svg` appears in the HTML.
      required_icons:
        - transaction_alert_red

    # Screen 3: buyer-side order detail after delivery_returned. Shows
    # the refund-timing description verbatim from backend transaction.py:
    # 629-633. Justification: the article (seller-focused) must clarify
    # the refund flow the buyer sees, so the seller can answer buyer
    # questions about timing.
    # Backend source: transaction.py:412-418 (status="Canceled"),
    # 629-633 (buyer description with 5 business days).
    - name: buyer-refund-status-after-return
      purpose: "Show the buyer's order-detail card after the shipment was returned, communicating the automatic refund within 5 business days"
      source: ios_required
      review_checks:
        - icons_match_ios_source
        - labels_match_xcstrings
        - no_invented_ui_state
      html_must_contain:
        pt-br:
          - "Cancelado"
          - "5 dias úteis"
          - "devolvido ao vendedor"
        en:
          - "Canceled"
          - "5 business days"
          - "returned to the seller"
      html_must_not_contain:
        - "<img"
        - "<svg"
        - "icon-"

icons_required:
  - transaction_alert_red
icons_fallback_feather: false

currency_required: false

# Short article (3 mockups, lifecycle-focused). 6-7 H2 sections linear.
# A TOC would add chrome without value.
toc_required: false

risk_flags: []
resolved_decisions: []
