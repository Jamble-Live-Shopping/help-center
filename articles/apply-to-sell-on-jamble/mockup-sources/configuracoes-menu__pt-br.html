<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; padding: 16px 0 14px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.navtitle { font-size: 20px; font-weight: 700; color: #162233; padding: 4px 20px 14px; }
.section-header { font-size: 12px; font-weight: 600; color: #6D6D80; text-transform: uppercase; letter-spacing: 0.6px; padding: 14px 20px 8px; }
.group { background: #FFFFFF; margin: 0 12px; border-radius: 12px; border: 1px solid #E9EAEF; overflow: hidden; }
.row { display: flex; align-items: center; padding: 14px 16px; min-height: 56px; }
.row + .row { border-top: 1px solid #E9EAEF; }
.row-icon { width: 30px; height: 30px; border-radius: 8px; background: #7E53F8; display: flex; align-items: center; justify-content: center; margin-right: 14px; flex-shrink: 0; }
.row-icon svg { width: 16px; height: 16px; }
.row-label { font-size: 16px; color: #162233; font-weight: 500; flex: 1; line-height: 20px; }
.chevron { color: #C7C7CC; font-size: 16px; margin-left: 8px; }
</style></head><body>
<div class="phone">
  <div class="navtitle">Ajustes</div>
  <div class="section-header">Importante</div>
  <div class="group">
    <div class="row">
      <div class="row-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      </div>
      <div class="row-label">Inscreva-se para entrar no ar</div>
      <div class="chevron">›</div>
    </div>
  </div>
</div>
</body></html>
