<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; min-height: 380px; background: rgba(0,0,0,0.08); border-radius: 24px; padding: 24px; display: flex; align-items: center; justify-content: center; }
.alert { width: 280px; background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 14px; overflow: hidden; text-align: center; }
.alert-body { padding: 22px 18px 6px; }
.alert-title { font-size: 17px; font-weight: 600; color: #000; line-height: 22px; }
.alert-msg { font-size: 13px; color: #000; line-height: 18px; margin-top: 8px; }
.alert-btns { margin-top: 20px; border-top: 0.5px solid rgba(60,60,67,0.2); display: flex; }
.alert-btn { flex: 1; padding: 12px 8px; font-size: 17px; border: none; background: transparent; font-family: inherit; }
.alert-btn.blue { color: #007AFF; border-right: 0.5px solid rgba(60,60,67,0.2); }
.alert-btn.purple { color: #7E53F8; font-weight: 600; }
</style></head><body>
<div class="phone">
  <div class="alert">
    <div class="alert-body">
      <div class="alert-title">Aplicativo pendente</div>
      <div class="alert-msg">Parece que você já enviou um aplicativo para o Go Live. Nós o atualizaremos assim que possível. Alguma dúvida? Fique à vontade para entrar em contato!</div>
    </div>
    <div class="alert-btns">
      <button class="alert-btn blue">Entre em contato</button>
      <button class="alert-btn purple">Ok, vou aguardar!</button>
    </div>
  </div>
</div>
</body></html>
