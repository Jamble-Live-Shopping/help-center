<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; padding: 20px 20px 16px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.title { font-size: 15px; font-weight: 600; color: #6D6D80; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
.row { display: flex; justify-content: space-between; align-items: baseline; padding: 10px 0; font-size: 16px; color: #162233; }
.row.muted { color: #6D6D80; font-size: 14px; }
.row .amount { font-variant-numeric: tabular-nums; font-weight: 500; }
.row .amount.neg { color: #E02424; }
.divider { height: 1px; background: #E9EAEF; margin: 6px 0; }
.total { display: flex; justify-content: space-between; align-items: baseline; padding: 14px 0 4px; margin-top: 4px; border-top: 2px solid #162233; }
.total .label { font-size: 15px; font-weight: 600; color: #162233; }
.total .amount { font-size: 22px; font-weight: 700; color: #7E53F8; font-variant-numeric: tabular-nums; }
.hint { font-size: 12px; color: #6D6D80; margin-top: 6px; text-align: center; }
</style></head><body>
<div class="phone">
  <div class="title">Cálculo dos ganhos</div>
  <div class="row">
    <span>Preço de venda</span>
    <span class="amount">R$ 100,00</span>
  </div>
  <div class="divider"></div>
  <div class="row muted">
    <span>Taxa Jamble (14%)</span>
    <span class="amount neg">- R$ 14,00</span>
  </div>
  <div class="total">
    <span class="label">Você recebe</span>
    <span class="amount">R$ 86,00</span>
  </div>
  <div class="hint">Descontado antes do valor entrar na carteira</div>
</div>
</body></html>
