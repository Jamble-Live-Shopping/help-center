risk_flags:
  - "ChangeShippingWeightViewController.swift defined in TRANSACTION/Sale/ but has zero call sites. The Confirm Weight modal documented in the prior v1 article was unreachable in production. Article reframed around address fix before label + support route after label. Re-audit if a future PR wires the controller back in."

resolved_decisions:
  - risk: "ChangeShippingWeightViewController.swift defined in TRANSACTION/Sale/ but has zero call sites. The Confirm Weight modal documented in the prior v1 article was unreachable in production. Article reframed around address fix before label + support route after label. Re-audit if a future PR wires the controller back in."
    decided_by: "Aymar"
    decided_at: "2026-05-11"
    rationale: "v2 rewrite drops the unreachable Confirm Weight surface and aligns the article with the surfaces sellers actually see today: Edit Shipping Address (pre-label) and the bundle action row (post-label). The dead controller is documented via negative_scan + this risk flag so a future re-audit can detect rewiring."
