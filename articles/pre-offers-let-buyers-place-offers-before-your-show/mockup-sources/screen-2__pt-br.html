<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 16px 16px 20px; }

.head-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.thumb { width: 54px; height: 54px; border-radius: 6px; background: linear-gradient(135deg,#FFD23F 0%,#F58220 60%,#162233 100%); flex-shrink: 0; }
.head-text { flex: 1; min-width: 0; }
.prod-name { font-size: 20px; font-weight: 600; color: #162233; line-height: 24px; }
.prod-meta-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.starting-pill { background: #F2EDFD; color: #162233; border: 1px solid #DCD0FB; border-radius: 14px; padding: 5px 12px; font-size: 12px; font-weight: 500; line-height: 14px; display: inline-flex; align-items: center; gap: 6px; height: 28px; }
.starting-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: #162233; display: inline-block; }
.close { width: 32px; height: 32px; border-radius: 16px; border: 0.5px solid #DCD0FB; color: #162233; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }

.warn { background: #F2EDFD; border: 1px solid #DCD0FB; padding: 10px 16px; margin: 0 -16px 14px; color: #162233; font-size: 12px; line-height: 16px; text-align: center; }
.warn .badge { display: inline-block; width: 12px; height: 12px; border-radius: 6px; background: #162233; color: #FFFFFF; font-weight: 700; font-size: 9px; line-height: 12px; text-align: center; margin-right: 6px; vertical-align: -1px; }

.center { padding: 26px 0 18px; text-align: center; }
.label-title { font-size: 21px; font-weight: 600; color: #162233; line-height: 26px; }
.label-sub { font-size: 14px; color: #8B92A5; line-height: 18px; margin-top: 4px; }
.amount { font-size: 48px; font-weight: 500; color: #162233; font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; line-height: 56px; margin-top: 18px; letter-spacing: -1px; }
.amount .cursor { display: inline-block; width: 2px; height: 42px; background: #162233; vertical-align: -8px; margin-left: 2px; animation: none; }
.min-pill { display: inline-block; background: #F2EDFD; color: #5223D8; border-radius: 12.5px; padding: 6px 20px; font-size: 13px; font-weight: 500; font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; line-height: 14px; margin-top: 18px; }

.slide { margin: 6px 8px 14px; height: 52px; background: #162233; border-radius: 26px; position: relative; color: #FFFFFF; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; }
.slide .handle { position: absolute; left: 4px; top: 4px; width: 44px; height: 44px; border-radius: 22px; background: #FFFFFF; display: flex; align-items: center; justify-content: center; color: #162233; font-weight: 700; }
.slide .handle-text { font-size: 18px; line-height: 18px; }
.helper { text-align: center; color: #5223D8; font-size: 12px; font-weight: 500; line-height: 16px; }
.helper .qmark { display: inline-block; width: 14px; height: 14px; line-height: 14px; border-radius: 7px; border: 1px solid #5223D8; color: #5223D8; font-weight: 700; font-size: 10px; text-align: center; margin-right: 4px; vertical-align: -2px; }
</style>
</head>
<body>
<div class="phone">
  <div class="head-row">
    <div class="thumb"></div>
    <div class="head-text">
      <div class="prod-name">Charizard Holo</div>
      <div class="prod-meta-row">
        <span class="starting-pill"><span class="dot"></span>Começa em 3h</span>
      </div>
    </div>
    <div class="close">X</div>
  </div>

  <div class="warn"><span class="badge">!</span>As ofertas são finais. Você pode aumentar a qualquer momento, mas não pode diminuir ou cancelar sua oferta máximo.</div>

  <div class="center">
    <div class="label-title">Sua oferta máxima</div>
    <div class="label-sub">O valor máximo para o qual você fará uma oferta para esse item</div>
    <div class="amount">R$ 75<span class="cursor"></span></div>
    <div class="min-pill">Mínimo: R$ 66</div>
  </div>

  <div class="slide">
    <div class="handle"><span class="handle-text">›</span></div>
    Enviar oferta
  </div>
  <div class="helper"><span class="qmark">?</span>Como funcionam as ofertas</div>
</div>
</body>
</html>
