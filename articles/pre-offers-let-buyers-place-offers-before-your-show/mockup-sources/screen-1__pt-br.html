<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 14px; }

.profile-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.avatar { width: 28px; height: 28px; border-radius: 14px; background: linear-gradient(135deg,#F58220,#E04A1F); display: flex; align-items: center; justify-content: center; color: #FFFFFF; font-weight: 600; font-size: 12px; font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; }
.profile-name { font-size: 15px; font-weight: 500; color: #4A5568; font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; line-height: 16px; }
.start-time { font-size: 12px; font-weight: 500; color: #8B92A5; line-height: 14px; }

.image { width: 100%; aspect-ratio: 1 / 1; border-radius: 4px; background: linear-gradient(135deg,#162233 0%,#2D3D52 50%,#162233 100%); position: relative; overflow: hidden; }
.card-tag { position: absolute; top: 8px; left: 8px; height: 24px; padding: 0 10px; background: rgba(255,255,255,0.92); color: #162233; border-radius: 12px; display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; }
.bookmark { position: absolute; bottom: 10px; right: 10px; height: 28px; padding: 0 10px; background: rgba(255,255,255,0.92); color: #162233; border-radius: 14px; display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; }
.bookmark-heart { width: 12px; height: 12px; background: #F04437; border-radius: 50%; display: inline-block; }
.product-mock { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 60%; aspect-ratio: 0.72; background: linear-gradient(135deg,#FFD23F 0%,#F58220 100%); border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,0.35); }

.title { font-size: 16px; font-weight: 600; color: #2D3748; line-height: 22px; margin-top: 10px; padding-left: 10px; font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; }
.price-line { font-size: 14px; color: #5223D8; padding-left: 10px; margin-top: 4px; font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; }
.price-line .lead { font-weight: 600; color: #5223D8; }
.price-line .muted { color: #7A8395; font-weight: 500; }

.cta { margin-top: 8px; margin-left: 8px; height: 30px; padding: 0 12px 0 8px; background: #162233; color: #FFFFFF; border-radius: 15px; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; font-family: -apple-system, "SF Pro Display", system-ui, sans-serif; }
.cta .ic { width: 14px; height: 14px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; }
.cta .ic svg { width: 14px; height: 14px; }
</style>
</head>
<body>
<div class="phone">
  <div class="profile-row">
    <div class="avatar">Lu</div>
    <div>
      <div class="profile-name">lucas.tcg</div>
      <div class="start-time">Começa em 3h</div>
    </div>
  </div>

  <div class="image">
    <div class="card-tag">3h</div>
    <div class="product-mock"></div>
    <div class="bookmark"><span class="bookmark-heart"></span> 24</div>
  </div>

  <div class="title">Charizard Holo PSA 9</div>
  <div class="price-line"><span class="muted">A partir de </span><span class="lead">R$ 50</span></div>

</div>
