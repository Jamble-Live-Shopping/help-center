# Flow contract for choose-quantities-when-listing-products.
# Worker batch real-1-rerun-2 (2026-05-08).
#
# See process/templates/article-flow.yml for field documentation.
# See process/00-RUNBOOK.md for the canonical 8-phase workflow.

workflow: article-v2
mode: v2_rewrite
audience: seller_br

job_to_be_done: "Help sellers configure available stock per listing, including single-item and multi-quantity flows"

source_of_truth:
  ios_files:
    - PRODUCT/Views/Components/CreateProductQuantityCell.swift
    - PRODUCT/View Models/CreateProductViewModel.swift
    - PRODUCT/Views/Components/PreBidToggleCell.swift
    - LIVE_SHOPPING/Show/Model/ShowSaleType.swift
    - LIVE_SHOPPING/SaleView/View/Components/ShowBuyItNowBannerView.swift
    - RESOURCES/Localizable.xcstrings
  backend_files: []
  legal: []
  support_context: []

content_contract:
  must_answer:
    - "1.000"
    - "Buy It Now"
  # Calibration patch 2026-05-11 (PR review): the previous flow banned
  # `pre-offer` and `pre-offers`, but `Pre-Offer` is the CORRECT EN
  # user-facing label per xcstrings (`Pre-Bid` source key resolves to
  # EN `Pre-Offer` and pt-BR `Pré-oferta`). Those bans were inverted.
  # Patched to:
  #   - keep `pre-ofertas` (deprecated pt-BR plural form)
  #   - ban `regex:\\bPre-Bid\\b` (with hyphen, case-insensitive): the
  #     iOS source key must not leak into user-facing body or mockups.
  #     The lowercase one-word "prebid" used verbatim in the iOS error
  #     toast is NOT matched by the hyphenated regex; preserved.
  forbidden_terms:
    - "regex:\\bauction\\b"
    - "regex:\\bleil[aã]o\\b"
    - "pre-ofertas"
    - "regex:\\bPre-Bid\\b"
  must_not_say:
    - "Verified badges"
    - "Jamble Prime"

mockup_plan:
  required: true
  screens:
    - name: screen-1
      purpose: "Quantity stepper cell on the product creation form, default value 1"
      source: ios_required
      review_checks:
        - labels_match_xcstrings
        - no_invented_ui_state
    - name: screen-2
      purpose: "Pre-Bid toggle cell, with the Quantity cell showing 2, illustrating the conflict that triggers the error toast"
      source: ios_required
      review_checks:
        - labels_match_xcstrings
        - no_invented_ui_state
    - name: screen-3
      purpose: "Error toast shown when Pre-Bid is enabled while quantity is greater than 1"
      source: ios_required
      review_checks:
        - labels_match_xcstrings
        - no_invented_ui_state

icons_required: []
icons_fallback_feather: false

currency_required: false

toc_required: false

risk_flags: []
resolved_decisions: []
