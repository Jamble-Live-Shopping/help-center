<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
  padding: 22px 18px;
}
.card { position: relative; border-radius: 18px; overflow: hidden; border: 1px solid #E9EAEF; background: #FFFFFF; }
.thumb {
  width: 100%; height: 240px;
  background: linear-gradient(160deg, #1B1530 0%, #2D2546 55%, #4A3B6B 100%);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.thumb::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.18) 0%, transparent 55%);
}
.product-silhouette {
  width: 118px; height: 162px;
  border-radius: 9px;
  background: #FFFFFF;
  box-shadow: 0 8px 22px rgba(0,0,0,0.42), 0 2px 6px rgba(0,0,0,0.25);
  padding: 8px;
  display: flex; flex-direction: column;
  position: relative;
}
.ps-art {
  flex: 1;
  border-radius: 5px;
  background:
    radial-gradient(ellipse at 35% 40%, rgba(255,255,255,0.30) 0%, transparent 55%),
    linear-gradient(150deg, #FDB022 0%, #FF6A1F 55%, #C2410C 100%);
}
.ps-meta { margin-top: 7px; display: flex; flex-direction: column; gap: 4px; }
.ps-meta span { height: 5px; border-radius: 2px; background: rgba(22,34,51,0.14); }
.ps-meta span:nth-child(1) { width: 78%; }
.ps-meta span:nth-child(2) { width: 48%; }
/* Saved-state pill: white heart on a liveRed background, matching iOS
   ProductPhotosSection.swift:51 (Image("bookmark_heart_white_icon"))
   wrapped in a RoundedRectangle filled with .liveRed when isBookmarked. */
.bookmark-pill {
  position: absolute; top: 12px; right: 12px;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border-radius: 50px;
  background: #F14A22; /* UIColor.liveRed = rgb(241, 74, 34) */
  box-shadow: 0 2px 8px rgba(22,34,51,0.18);
  border: 0.5px solid rgba(255,255,255,0.08);
}
.bookmark-pill svg { display: block; }
.bookmark-pill .count { color: #FFFFFF; font-size: 14px; font-weight: 600; line-height: 1; }
.body { padding: 14px 16px 16px; }
.title { font-size: 16px; font-weight: 600; color: #162233; line-height: 20px; }
.price { font-size: 18px; font-weight: 700; color: #162233; margin-top: 6px; }
.callout { margin-top: 14px; display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
.callout-arrow { font-size: 18px; color: #7E53F8; line-height: 1; }
.callout-text { font-size: 13px; color: #6D6D80; line-height: 18px; }
.callout-text b { color: #162233; font-weight: 600; }
</style></head><body>
<div class="phone">
  <div class="card">
    <div class="thumb">
      <div class="product-silhouette">
        <div class="ps-art"></div>
        <div class="ps-meta"><span></span><span></span></div>
      </div>
    </div>
    <!-- icon: bookmark_heart_white_icon -->
    <!-- Assets.xcassets/bookmark_heart_white_icon.imageset/bookmark_heart_white_icon.svg -->
    <!-- Real iOS asset, copied verbatim. Source: Jamble-iOS/Jamble/RESOURCES/Assets.xcassets/bookmark_heart_white_icon.imageset/bookmark_heart_white_icon.svg -->
    <!-- Used in PRODUCT/Views/SwiftUI/Components/ProductPhotosSection.swift:51 -->
    <div class="bookmark-pill" role="img" aria-label="bookmark_heart_white_icon (heart icon)" alt="bookmark_heart_white_icon">
      <svg width="15" height="14" viewBox="0 0 15 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M7.49651 13.7643C7.26611 13.7643 6.91701 13.563 6.59583 13.3547C2.75577 10.8626 0.235291 7.89145 0.235291 4.91338C0.235291 2.1852 2.14136 0.352539 4.43144 0.352539C5.85575 0.352539 6.88908 1.13697 7.49651 2.26851C8.11091 1.13003 9.14424 0.352539 10.5686 0.352539C12.8587 0.352539 14.7647 2.1852 14.7647 4.91338C14.7647 7.89145 12.2442 10.8626 8.40416 13.3547C8.08298 13.563 7.73389 13.7643 7.49651 13.7643Z" fill="white"/>
      </svg>
      <span class="count">12</span>
    </div>
    <div class="body">
      <div class="title">Charizard PSA 9 Base Set</div>
      <div class="price">$1,450.00</div>
    </div>
  </div>
  <div class="callout">
    <div class="callout-arrow">↗</div>
    <div class="callout-text">Tap the <b>heart icon</b>. When it fills in, the product moves into your <b>Bookmarks</b> tab.</div>
  </div>
</div></body></html>
