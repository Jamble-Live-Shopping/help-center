<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
}

.phone { padding: 0; }
.nav { padding: 14px 18px 8px; }
.nav-title { font-size: 22px; font-weight: 700; color: #162233; letter-spacing: -0.4px; }
.tabs { display: flex; padding: 6px 16px 14px; gap: 24px; border-bottom: 1px solid #F1F2F5; }
.tab { padding: 8px 0; font-size: 15px; font-weight: 600; color: #6D6D80; border-bottom: 3px solid transparent; }
.tab.active { color: #162233; border-bottom-color: #7E53F8; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px; }
.cell { border-radius: 14px; overflow: hidden; border: 1px solid #E9EAEF; }
.cell-thumb { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 48px; position: relative; }
.c1 { background: linear-gradient(135deg,#FDB022 0%,#FF8A00 100%); }
.c2 { background: linear-gradient(135deg,#7E53F8 0%,#4F2DA9 100%); }
.cell-mark { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center; }
.cell-mark svg { width: 14px; height: 14px; }
.cell-body { padding: 8px 10px; }
.cell-title { font-size: 12px; font-weight: 600; color: #162233; line-height: 15px; }
.cell-price { font-size: 13px; font-weight: 700; color: #162233; margin-top: 3px; }
</style></head><body>
<div class="phone">
  <div class="nav"><div class="nav-title">Lista de desejos</div></div>
  <div class="tabs">
    <div class="tab active">Favoritos</div>
    <div class="tab">Ofertas</div>
  </div>
  <div class="grid">
    <div class="cell">
      <div class="cell-thumb c1">🎴<div class="cell-mark"><svg viewBox="0 0 24 24" fill="#7E53F8" stroke="#7E53F8" stroke-width="1.6"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div></div>
      <div class="cell-body"><div class="cell-title">Charizard PSA 9</div><div class="cell-price">R$ 1.450,00</div></div>
    </div>
    <div class="cell">
      <div class="cell-thumb c2">🃏<div class="cell-mark"><svg viewBox="0 0 24 24" fill="#7E53F8" stroke="#7E53F8" stroke-width="1.6"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div></div>
      <div class="cell-body"><div class="cell-title">Pikachu Holo</div><div class="cell-price">R$ 320,00</div></div>
    </div>
  </div>
</div></body></html>
