<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
}

.phone { padding: 22px 18px; }
.card { position: relative; border-radius: 18px; overflow: hidden; border: 1px solid #E9EAEF; background: #FFFFFF; }
.thumb { width: 100%; height: 240px; background: linear-gradient(135deg,#FDB022 0%,#FF8A00 100%); display: flex; align-items: center; justify-content: center; font-size: 64px; }
.bookmark-btn { position: absolute; top: 12px; right: 12px; width: 40px; height: 40px; border-radius: 50%; background: #FFFFFF; box-shadow: 0 2px 8px rgba(22,34,51,0.12); display: flex; align-items: center; justify-content: center; }
.bookmark-btn svg { width: 22px; height: 22px; }
.body { padding: 14px 16px 16px; }
.title { font-size: 16px; font-weight: 600; color: #162233; line-height: 20px; }
.price { font-size: 18px; font-weight: 700; color: #162233; margin-top: 6px; }
.toast { margin: 14px 0 0; background: #ECFDF3; border: 1px solid #ABEFC6; border-radius: 14px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.toast-icon { width: 22px; height: 22px; border-radius: 50%; background: #079455; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.toast-icon svg { width: 14px; height: 14px; }
.toast-label { font-size: 13px; font-weight: 600; color: #079455; }
</style></head><body>
<div class="phone">
  <div class="card">
    <div class="thumb">🎴</div>
    <div class="bookmark-btn">
      <svg viewBox="0 0 24 24" fill="#7E53F8" stroke="#7E53F8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div class="body">
      <div class="title">Charizard PSA 9 Base Set</div>
      <div class="price">R$ 1.450,00</div>
    </div>
  </div>
  <div class="toast">
    <div class="toast-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="toast-label">Produto salvo nos Favoritos</div>
  </div>
</div></body></html>
