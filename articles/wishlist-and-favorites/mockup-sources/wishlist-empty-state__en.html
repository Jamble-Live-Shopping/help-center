<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
}

.phone { padding: 0 0 24px; }
.nav { padding: 14px 18px 8px; }
.nav-title { font-size: 22px; font-weight: 700; color: #162233; letter-spacing: -0.4px; }
.tabs { display: flex; padding: 6px 16px 14px; gap: 24px; border-bottom: 1px solid #F1F2F5; }
.tab { padding: 8px 0; font-size: 15px; font-weight: 600; color: #6D6D80; border-bottom: 3px solid transparent; }
.tab.active { color: #162233; border-bottom-color: #7E53F8; }
.empty { padding: 60px 30px 30px; text-align: center; }
/* Empty-state illustration: real iOS heart asset, scaled up. liveRed
   tint to match the saved-state colour the buyer sees on filled cards. */
.empty-illu {
  width: 84px; height: 84px; border-radius: 50%;
  background: rgba(241, 74, 34, 0.10);
  margin: 0 auto 20px;
  display: flex; align-items: center; justify-content: center;
}
.empty-illu svg { display: block; }
.empty-title { font-size: 19px; font-weight: 700; color: #162233; line-height: 24px; }
.empty-sub { font-size: 14px; color: #6D6D80; line-height: 20px; margin-top: 8px; }
.cta { margin: 26px 16px 0; height: 50px; border-radius: 25px; background: #7E53F8; color: #FFFFFF; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
</style></head><body>
<div class="phone">
  <div class="nav"><div class="nav-title">Wishlist</div></div>
  <div class="tabs">
    <div class="tab active">Bookmarks</div>
    <div class="tab">Offers</div>
  </div>
  <div class="empty">
    <!-- icon: bookmark_heart_white_icon -->
    <!-- Assets.xcassets/bookmark_heart_white_icon.imageset/bookmark_heart_white_icon.svg -->
    <!-- Real iOS asset, copied verbatim then re-coloured with liveRed fill -->
    <!-- to teach the buyer the saved-state cue she sees on filled cards. -->
    <div class="empty-illu" role="img" aria-label="bookmark_heart_white_icon (heart icon)" alt="bookmark_heart_white_icon">
      <svg width="44" height="41" viewBox="0 0 15 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M7.49651 13.7643C7.26611 13.7643 6.91701 13.563 6.59583 13.3547C2.75577 10.8626 0.235291 7.89145 0.235291 4.91338C0.235291 2.1852 2.14136 0.352539 4.43144 0.352539C5.85575 0.352539 6.88908 1.13697 7.49651 2.26851C8.11091 1.13003 9.14424 0.352539 10.5686 0.352539C12.8587 0.352539 14.7647 2.1852 14.7647 4.91338C14.7647 7.89145 12.2442 10.8626 8.40416 13.3547C8.08298 13.563 7.73389 13.7643 7.49651 13.7643Z" fill="#F14A22"/>
      </svg>
    </div>
    <div class="empty-title">Start Exploring Deals</div>
    <div class="empty-sub">Discover deals and save your favorite items.</div>
  </div>
  <div class="cta">Browse products</div>
</div></body></html>
