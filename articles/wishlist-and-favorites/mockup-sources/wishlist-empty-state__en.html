<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
}

.phone { padding: 0 0 24px; }
.nav { padding: 14px 18px 8px; }
.nav-title { font-size: 22px; font-weight: 700; color: #162233; letter-spacing: -0.4px; }
.tabs { display: flex; padding: 6px 16px 14px; gap: 24px; border-bottom: 1px solid #F1F2F5; }
.tab { padding: 8px 0; font-size: 15px; font-weight: 600; color: #6D6D80; border-bottom: 3px solid transparent; }
.tab.active { color: #162233; border-bottom-color: #7E53F8; }
.empty { padding: 60px 30px 30px; text-align: center; }
.empty-illu { width: 84px; height: 84px; border-radius: 50%; background: #F4EFFF; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }
.empty-illu svg { width: 42px; height: 42px; }
.empty-title { font-size: 19px; font-weight: 700; color: #162233; line-height: 24px; }
.empty-sub { font-size: 14px; color: #6D6D80; line-height: 20px; margin-top: 8px; }
.cta { margin: 26px 16px 0; height: 50px; border-radius: 25px; background: #7E53F8; color: #FFFFFF; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
</style></head><body>
<div class="phone">
  <div class="nav"><div class="nav-title">Wishlist</div></div>
  <div class="tabs">
    <div class="tab active">Bookmarks</div>
    <div class="tab">Bids</div>
  </div>
  <div class="empty">
    <div class="empty-illu"><svg viewBox="0 0 24 24" fill="#7E53F8" stroke="#7E53F8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div>
    <div class="empty-title">Start Exploring Deals</div>
    <div class="empty-sub">Discover deals and save your favorite items.</div>
  </div>
  <div class="cta">Browse products</div>
</div></body></html>
