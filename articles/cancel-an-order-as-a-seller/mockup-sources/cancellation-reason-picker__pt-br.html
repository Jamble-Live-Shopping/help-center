<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 18px; }

.nav-title { font-size: 17px; font-weight: 600; color: #162233; text-align: center; padding: 14px 40px 6px; line-height: 22px; }
.nav-hint { font-size: 13px; color: #6B7A92; padding: 0 20px 6px; line-height: 18px; text-align: center; }
.group { background: #FFFFFF; margin: 10px 14px 16px; border: 1px solid #E9EAEF; border-radius: 12px; overflow: hidden; }
.opt { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #F0F1F5; }
.opt:last-child { border-bottom: none; }
.opt.selected { background: #F9F8FF; }
.opt-text { flex: 1; font-size: 16px; font-weight: 600; color: #162233; line-height: 22px; }
.radio { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid #C7C7CC; flex-shrink: 0; margin-left: 12px; position: relative; }
.radio.selected { border: none; background: #7E53F8; }
.radio.selected::after { content: ""; position: absolute; top: 5px; left: 5px; width: 12px; height: 12px; border-radius: 50%; background: #FFFFFF; }
.submit { display: block; margin: 4px 16px 0; background: #7E53F8; color: #FFFFFF; border: none; border-radius: 28px; height: 52px; width: calc(100% - 32px); font-size: 16px; font-weight: 600; cursor: pointer; }
</style></head><body>
<div class="phone">
  <div class="nav-title">O que te levou a cancelar?</div>
  <div class="nav-hint">Nossa equipe vai analisar seu pedido em até 2 horas.</div>
  <div class="group">
    <div class="opt selected"><div class="opt-text">Não foi possível enviar o item</div><div class="radio selected"></div></div>
    <div class="opt"><div class="opt-text">Item perdido</div><div class="radio"></div></div>
    <div class="opt"><div class="opt-text">Item danificado</div><div class="radio"></div></div>
    <div class="opt"><div class="opt-text">O comprador solicitou o cancelamento</div><div class="radio"></div></div>
    <div class="opt"><div class="opt-text">Outras razões</div><div class="radio"></div></div>
  </div>
  <button class="submit">Enviar</button>
</div>
</body></html>
