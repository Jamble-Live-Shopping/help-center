<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 14px; }

.section-header { font-size: 13px; font-weight: 400; color: #6D6D80; text-transform: uppercase; padding: 18px 20px 8px; letter-spacing: -0.08px; }
.group { background: #FFFFFF; margin: 0 12px 8px; border-radius: 12px; overflow: hidden; border: 1px solid #E9EAEF; }
.row { display: flex; align-items: center; padding: 12px 14px; min-height: 52px; border-bottom: 1px solid #F0F1F5; }
.row:last-child { border-bottom: none; }
.row-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; }
.row-icon.yellow { background: #FAE44D; }
.row-icon.gray { background: #8E8E93; }
.row-icon.blue { background: #4A90E2; }
.row-icon.purple { background: #7E53F8; }
.row-icon svg { width: 18px; height: 18px; }
.row-label { font-size: 16px; color: #162233; flex: 1; line-height: 22px; font-weight: 500; }
.row-chevron { color: #C7C7CC; font-size: 18px; flex-shrink: 0; margin-left: 8px; }
.row.highlight { background: #F9F8FF; }
.row.highlight .row-label { color: #7E53F8; font-weight: 600; }
</style></head><body>
<div class="phone">
  <div class="section-header">Sell</div>
  <div class="group">
    <div class="row highlight">
      <div class="row-icon yellow"><svg viewBox="0 0 24 24" fill="none" stroke="#162233" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>
      <div class="row-label">My Sales</div>
      <div class="row-chevron">&rsaquo;</div>
    </div>
    <div class="row">
      <div class="row-icon gray"><svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h15a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h12"/><circle cx="17" cy="14" r="1.5" fill="#FFFFFF"/></svg></div>
      <div class="row-label">My Wallet</div>
      <div class="row-chevron">&rsaquo;</div>
    </div>
    <div class="row">
      <div class="row-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
      <div class="row-label">Shipping Preferences</div>
      <div class="row-chevron">&rsaquo;</div>
    </div>
    <div class="row">
      <div class="row-icon purple"><svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
      <div class="row-label">Vacation mode</div>
      <div class="row-chevron">&rsaquo;</div>
    </div>
  </div>
</div>
</body></html>
