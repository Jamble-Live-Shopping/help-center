<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 12px; }

.order-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 4px 10px; border-bottom: 1px solid #F0F1F5; margin-bottom: 12px; }
.order-num-label { font-size: 13px; font-weight: 600; color: #162233; }
.order-num-value { font-size: 13px; color: #7E53F8; font-weight: 500; }

.product-row { display: flex; gap: 12px; padding: 8px 4px 14px; }
.product-img { width: 64px; height: 64px; border-radius: 10px; background: linear-gradient(135deg, #FFE5B4, #FFB88C); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.product-info { flex: 1; min-width: 0; }
.product-name { font-size: 15px; font-weight: 600; color: #162233; line-height: 20px; margin-bottom: 4px; }
.product-price { font-size: 15px; font-weight: 700; color: #162233; }

.status-card { background: #F3F4F8; border-radius: 14px; padding: 14px; position: relative; }
.cancel-btn { position: absolute; top: 10px; right: 10px; border: 1px solid #F04437; color: #F04437; font-size: 13px; font-weight: 500; padding: 5px 10px; border-radius: 8px; background: transparent; }
.status-label { font-size: 14px; font-weight: 500; color: #17B169; margin-bottom: 4px; }
.status-action { font-size: 19px; font-weight: 700; color: #162233; line-height: 24px; margin-bottom: 14px; max-width: 200px; }
.progress-bar { display: flex; gap: 4px; margin-bottom: 10px; }
.progress-step { flex: 1; height: 4px; border-radius: 2px; background: #DADDE3; }
.progress-step.done { background: #17B169; }
.progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: #6B7A92; }
</style></head><body>
<div class="phone">
  <div class="order-header">
    <div class="order-num-label">Order Number</div>
    <div class="order-num-value">JMB-2A4F91 &nbsp;&#x29C9;</div>
  </div>
  <div class="product-row">
    <div class="product-img">&#x1F0CF;</div>
    <div class="product-info">
      <div class="product-name">Charizard Holo 1999</div>
      <div class="product-price">R$ 285.00</div>
    </div>
  </div>
  <div class="status-card">
    <button class="cancel-btn">Cancel Sale</button>
    <div class="status-label">Confirmed</div>
    <div class="status-action">Ship the item</div>
    <div class="progress-bar">
      <div class="progress-step done"></div>
      <div class="progress-step done"></div>
      <div class="progress-step"></div>
      <div class="progress-step"></div>
    </div>
    <div class="progress-labels">
      <span>Ordered</span>
      <span>Confirmed</span>
      <span>Shipped</span>
      <span>Delivered</span>
    </div>
  </div>
</div>
</body></html>
