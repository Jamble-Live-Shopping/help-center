<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; padding: 40px 12px; min-height: 460px; }
.phone { width: 270px; }

.alert { background: rgba(255,255,255,0.96); border-radius: 14px; backdrop-filter: blur(20px); overflow: hidden; }
.alert-body { padding: 19px 16px 17px; text-align: center; }
.alert-title { font-size: 17px; font-weight: 700; color: #000; margin-bottom: 4px; }
.alert-msg { font-size: 13px; color: #000; line-height: 18px; }
.alert-btns { border-top: 0.5px solid #C6C6C8; display: flex; }
.alert-btn { flex: 1; padding: 11px; text-align: center; font-size: 17px; }
.alert-btn.destructive { color: #F04437; font-weight: 600; border-left: 0.5px solid #C6C6C8; }
.alert-btn.secondary { color: #007AFF; }
</style></head><body>
<div class="phone">
  <div class="alert">
    <div class="alert-body">
      <div class="alert-title">Cancel this sale</div>
      <div class="alert-msg">Abusive or repeated cancellations may lead to temporary restrictions or account suspension.</div>
    </div>
    <div class="alert-btns">
      <div class="alert-btn secondary">Don&rsquo;t Cancel</div>
      <div class="alert-btn destructive">Cancel Sale</div>
    </div>
  </div>
</div>
</body></html>
