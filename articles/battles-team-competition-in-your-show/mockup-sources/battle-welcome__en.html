<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; min-height: 460px; background: #0C131D; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.18); border: 1px solid #E9EAEF; overflow: hidden; display: flex; flex-direction: column; align-items: center; padding: 18px 20px 24px; }
.handle { width: 40px; height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; margin-bottom: 14px; }
.eyebrow { color: rgba(255,255,255,0.55); font-size: 12px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 18px; }
.title { font-size: 28px; font-weight: 700; color: #FFFFFF; line-height: 1.1; text-align: center; margin-bottom: 16px; }
.avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #FF7AA4, #FF2867); margin-bottom: 12px; border: 2px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 22px; }
.team-row { display: flex; align-items: center; gap: 6px; color: #FFFFFF; font-size: 14px; font-weight: 500; margin-bottom: 14px; }
.team-icon { width: 14px; height: 14px; border-radius: 50%; background: #FF2867; }
.score-pill { display: flex; align-items: center; gap: 6px; background: rgba(126,83,248,0.20); color: #FFFFFF; font-size: 13px; font-weight: 600; padding: 6px 12px; border-radius: 14px; margin-bottom: 22px; }
.score-pill .star { width: 10px; height: 10px; border-radius: 2px; background: #FFD15A; }
.cta { width: 100%; height: 48px; background: #7E53F8; color: #FFFFFF; font-size: 15px; font-weight: 600; border-radius: 24px; display: flex; align-items: center; justify-content: center; gap: 6px; }
.cta .arrow { font-size: 16px; }
</style></head><body><div class="phone">
  <div class="handle"></div>
  <div class="eyebrow">Battle starts now!</div>
  <div class="title">Welcome to the Battle!</div>
  <div class="avatar">A</div>
  <div class="team-row"><span>You've joined the team</span><div class="team-icon"></div></div>
  <div class="score-pill"><div class="star"></div><span>Your score: 0</span></div>
  <div class="cta"><span>View battle rules</span><span class="arrow">›</span></div>
</div></body></html>
