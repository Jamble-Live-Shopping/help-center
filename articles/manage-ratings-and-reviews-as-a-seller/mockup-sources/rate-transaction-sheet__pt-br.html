<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; padding-bottom: 16px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 12px; }
.nav-side { font-size: 16px; font-weight: 400; color: #7E53F8; min-width: 60px; }
.nav-side.right { text-align: right; font-weight: 600; }
.nav-title { font-size: 16px; font-weight: 600; color: #000000; }
.stars { display: flex; gap: 16px; justify-content: center; padding: 8px 16px 4px; }
.star { width: 21px; height: 21px; }
.tap-hint { font-size: 12px; font-weight: 400; color: #8B8A8F; text-align: center; padding: 4px 16px 16px; }
.divider { height: 1px; background: #CCCCCC; margin: 0 16px; }
.input { padding: 14px 16px; }
.placeholder { font-size: 16px; font-weight: 400; color: #C5C5C7; }
.kb-area { background: #F9FAFC; height: 24px; }
</style></head><body><div class="phone">
<div class="nav"><div class="nav-side">Cancelar</div><div class="nav-title">Escreva um feedback</div><div class="nav-side right">Enviar</div></div>
<div class="stars"><svg class="star" viewBox="0 0 24 24" fill="#7E53F8"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg><svg class="star" viewBox="0 0 24 24" fill="#7E53F8"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg><svg class="star" viewBox="0 0 24 24" fill="#7E53F8"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg><svg class="star" viewBox="0 0 24 24" fill="#7E53F8"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg><svg class="star" viewBox="0 0 24 24" fill="#7E53F8"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></div>
<div class="tap-hint">Toque em uma estrela para avaliar</div>
<div class="divider"></div>
<div class="input"><div class="placeholder">Como foi seu produto?</div></div>
<div class="kb-area"></div>
</div></body></html>
