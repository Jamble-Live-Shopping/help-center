<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: linear-gradient(180deg, #1F2433 0%, #2A3042 100%); border-radius: 24px; padding: 12px 8px 8px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; min-height: 420px; display: flex; flex-direction: column; justify-content: flex-end; }
.scrim { flex: 1; }
.action-group { background: rgba(242, 242, 242, 0.96); backdrop-filter: blur(20px); border-radius: 14px; overflow: hidden; }
.action { padding: 17px 16px; text-align: center; font-size: 20px; font-weight: 400; color: #007AFF; border-bottom: 0.5px solid rgba(60, 60, 67, 0.18); }
.action:last-child { border-bottom: none; }
.action.destructive { color: #FF3B30; }
.cancel-group { background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(20px); border-radius: 14px; margin-top: 8px; overflow: hidden; }
.cancel-action { padding: 17px 16px; text-align: center; font-size: 20px; font-weight: 600; color: #007AFF; }
</style>
</head>
<body>
<div class="phone">
  <div class="scrim"></div>
  <div class="action-group">
    <div class="action">Comunicar</div>
    <div class="action destructive">Bloquear</div>
  </div>
  <div class="cancel-group">
    <div class="cancel-action">Cancelar</div>
  </div>
</div>
</body>
</html>
