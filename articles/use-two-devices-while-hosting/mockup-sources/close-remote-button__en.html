<style>

body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;

  justify-content: center;

  left: 70px;
  height: 24px;
  padding: 0 10px;
  border-radius: 12px;
  background: rgba(0,0,0,0.45);
  color: #FFFFFF;
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
}

.close-remote {
  position: absolute;
  top: 14px;
  right: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.cr-glyph {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cr-glyph svg { width: 24px; height: 24px; }
.cr-badge {
  width: 20px;
  height: 20px;
  border-radius: 10px;
  background: #D92C20;
  display: flex;
  align-items: center;

}
.cr-badge svg { width: 12px; height: 12px; }

  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 7px solid #FFFFFF;
  position: absolute;
  top: -7px;
  right: 24px;
}
.side-card-text {
  font-size: 13px;
  color: #162233;
  line-height: 18px;
  font-weight: 500;
  flex: 1;
}
.side-card-text strong { color: #7E53F8; font-weight: 700; }
