<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 320px;
  background: #0F1320;
  border-radius: 24px;
  box-shadow: 0 6px 28px rgba(22,34,51,0.10);
  border: 1px solid #E9EAEF;
  overflow: hidden;
  position: relative;
  height: 540px;
}
.video-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 25%, rgba(126,83,248,0.14) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 80%, rgba(255,255,255,0.04) 0%, transparent 55%),
    linear-gradient(180deg, #1B1530 0%, #0F1320 70%);
}

.offline-card {
  position: absolute;
  top: 18%;
  left: 20px;
  right: 20px;
  background: rgba(12,19,29,0.80);
  border-radius: 17px;
  padding: 20px 20px;
  text-align: center;
}
.hold-on {
  font-size: 16px;
  font-weight: 500;
  color: #FFFFFF;
  line-height: 22px;
  margin-bottom: 4px;
}
.offline-headline {
  font-size: 28px;
  font-weight: 600;
  color: #FFFFFF;
  line-height: 34px;
  letter-spacing: -0.01em;
  margin-bottom: 20px;
}
.loader-bar {
  height: 50px;
  border-radius: 12px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
}
.spinner {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.20);
  border-top-color: #FFFFFF;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style></head><body>
<div class="phone">
  <div class="video-bg"></div>
  <div class="offline-card">
    <div class="hold-on">Hold on</div>
    <div class="offline-headline">Your main device seems offline</div>
    <div class="loader-bar">
      <div class="spinner"></div>
    </div>
  </div>
</div></body></html>
