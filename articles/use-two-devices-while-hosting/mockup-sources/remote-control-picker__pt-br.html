<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 320px;
  background: #FFFFFF;
  border-radius: 16px;
  box-shadow: 0 6px 28px rgba(22,34,51,0.10);
  border: 1px solid #E9EAEF;
  overflow: hidden;
  padding: 28px 24px 24px;
}
.bltn-title {
  font-size: 24px;
  font-weight: 600;
  color: #000000;
  letter-spacing: -0.01em;
  text-align: center;
  margin-bottom: 14px;
  line-height: 30px;
}
.bltn-desc {
  font-size: 16px;
  font-weight: 500;
  color: #000000;
  line-height: 22px;
  margin-bottom: 24px;
}
.bltn-desc p { margin-bottom: 12px; }
.bltn-desc p:last-child { margin-bottom: 0; }
.bltn-btn {
  height: 48px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 10px;
  text-align: center;
  padding: 0 14px;
}
.bltn-btn:last-child { margin-bottom: 0; }
.bltn-btn.primary { background: #7E53F8; color: #FFFFFF; }
.bltn-btn.alt { background: transparent; color: #7E53F8; }
</style></head><body>
<div class="phone">
  <div class="bltn-title">Controle remoto</div>
  <div class="bltn-desc">
    <p>Selecione a primeira opção se quiser usar este dispositivo como um controle remoto</p>
    <p>Caso você queira fazer uma transmissão ao vivo a partir desse dispositivo, use a segunda opção</p>
  </div>
  <div class="bltn-btn primary">Use como um controle remoto</div>
  <div class="bltn-btn alt">Transmissão ao vivo a partir deste dispositivo</div>
</div></body></html>
