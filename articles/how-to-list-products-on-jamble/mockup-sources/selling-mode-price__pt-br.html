<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; color: #162233; }
.phone { width: 340px; min-height: 640px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; position: relative; padding-bottom: 76px; }
.top { height: 58px; display: flex; align-items: center; padding: 16px 16px 6px; gap: 12px; }
.nav-title { flex: 1; font-size: 18px; font-weight: 700; line-height: 24px; color: #162233; }
.close { width: 24px; height: 24px; color: #162233; display: flex; align-items: center; justify-content: center; }
.collection { padding-top: 2px; }
.footer { position: absolute; left: 16px; right: 16px; bottom: 8px; height: 52px; border-radius: 26px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; background: #F3F4F8; border: 0.5px solid #D8DCE8; color: #7D8BA6; }
.footer.enabled { background: #7E53F8; color: #fff; border-color: #7E53F8; }
.section-header { height: 48px; display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 8px; }
.section-title { display: flex; align-items: center; gap: 4px; min-width: 0; }
.section-title-main { font-size: 16px; font-weight: 600; color: #162233; letter-spacing: 0.1px; }
.section-title-extra { font-size: 13px; color: #6D7A95; }
.section-right { font-size: 15px; font-weight: 600; color: #7E53F8; text-align: right; }
.photo-row { display: flex; gap: 8px; padding: 0 16px 16px; overflow: hidden; }
.photo-cell { width: 94px; height: 94px; flex: 0 0 94px; border-radius: 4px; overflow: hidden; position: relative; border: 0.5px solid #D8DCE8; background: #F4F5F8; }
.photo-add { display: flex; align-items: center; justify-content: center; color: #162233; }
.photo-add svg { width: 21px; height: 21px; }
.photo-a { background: linear-gradient(135deg, #30243B 0%, #7551B8 56%, #E8D7FF 100%); }
.photo-a::after { content: ""; position: absolute; inset: 14px 24px 18px; border-radius: 10px; background: linear-gradient(160deg, #FFFFFF 0%, #CED4E8 100%); box-shadow: 0 8px 20px rgba(0,0,0,.18); }
.photo-b { background: linear-gradient(135deg, #101624 0%, #20385E 55%, #EFCB5F 100%); }
.photo-b::after { content: ""; position: absolute; left: 22px; right: 22px; top: 12px; bottom: 12px; border-radius: 5px; border: 2px solid rgba(255,255,255,.85); background: rgba(255,255,255,.18); }
.photo-c { background: linear-gradient(135deg, #EEE8DF 0%, #B07C54 52%, #2B1B12 100%); }
.delete-dot { position: absolute; top: 6px; right: 6px; width: 30px; height: 30px; border-radius: 50%; background: #fff; border: 0.5px solid #E0E2E8; display: flex; align-items: center; justify-content: center; color: #434B5E; font-size: 16px; font-weight: 700; }
.field { height: 74px; margin: 16px 16px 8px; border-radius: 8px; border: 1px solid #E9EAEF; background: #FAFBFC; padding: 12px 14px; display: flex; flex-direction: column; justify-content: center; }
.field-label { font-size: 17px; font-weight: 600; color: #4F6079; line-height: 22px; }
.field-value { font-size: 17px; font-weight: 600; color: #162233; line-height: 22px; margin-top: 2px; }
.desc { height: 110px; margin: 8px 16px 16px; border-radius: 8px; background: #fff; box-shadow: 0 0 5px #E8EAEF; padding: 6px; }
.desc-inner { height: 100%; border-radius: 4px; border: 0.5px dashed #7D8BA6; background: #FAFBFC; padding: 14px 16px; }
.desc-hint { font-size: 17px; font-weight: 500; color: #4F6079; line-height: 24px; }
.desc-sub { margin-top: 6px; font-size: 12px; color: #4F6079; line-height: 16px; }
.attr-row { height: 74px; display: flex; align-items: center; gap: 16px; padding: 0 16px; }
.attr-stack { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; gap: 2px; }
.attr-title { display: flex; align-items: center; gap: 4px; color: #4F6079; font-size: 17px; font-weight: 600; line-height: 22px; }
.attr-title.selected { font-size: 13px; font-weight: 400; line-height: 18px; }
.attr-optional { font-size: 13px; font-weight: 400; color: #6D7A95; }
.attr-value { font-size: 17px; font-weight: 600; color: #162233; line-height: 22px; }
.chev { width: 20px; height: 20px; flex: 0 0 20px; display: flex; align-items: center; justify-content: center; color: #9AA5B8; }
.divider { height: 8px; background: #F4F5F8; }
.sell-mode { padding-bottom: 8px; }
.sale-cell { background: #fff; border-bottom: 1px solid #F0F1F5; }
.sale-top { min-height: 66px; display: flex; align-items: center; padding: 12px 16px; gap: 16px; }
.sale-icon { width: 24px; height: 24px; color: #5F66F6; flex: 0 0 24px; }
.sale-icon img { width: 24px; height: 24px; display: block; }
.sale-copy { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: flex-start; }
.sale-title { font-size: 17px; font-weight: 600; color: #162233; line-height: 22px; }
.sale-subtitle { font-size: 13px; font-weight: 400; color: #4F6079; line-height: 18px; margin-top: 2px; }
.radio { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #7D8BA6; flex: 0 0 18px; display: flex; align-items: center; justify-content: center; }
.radio.on { border-color: #162233; }
.radio.on::after { content: ""; width: 10px; height: 10px; border-radius: 50%; background: #162233; display: block; }
.sale-inputs { display: flex; gap: 16px; padding: 0 16px 12px 56px; }
.mini-field { flex: 1; height: 74px; border-radius: 8px; border: 1px solid #E9EAEF; background: #FAFBFC; padding: 11px 12px; display: flex; flex-direction: column; justify-content: center; }
.mini-label { font-size: 14px; color: #4F6079; line-height: 18px; }
.mini-value { margin-top: 6px; font-size: 17px; font-weight: 600; color: #162233; line-height: 22px; }
.quantity-cell { height: 74px; margin: 16px 16px 8px; display: flex; flex-direction: column; align-items: stretch; }
.quantity-title { font-size: 17px; font-weight: 600; color: #162233; line-height: 22px; }
.quantity-controls { margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 12px; }
.round-btn { width: 32px; height: 32px; border-radius: 16px; border: 0; background: #F3F4F8; display: flex; align-items: center; justify-content: center; color: #162233; font-size: 22px; line-height: 32px; }
.qty-value { min-width: 32px; text-align: center; font-size: 17px; font-weight: 600; color: #162233; }
.prebid-cell { height: 74px; display: flex; align-items: center; padding: 0 16px; gap: 16px; }
.prebid-copy { flex: 1; min-width: 0; }
.prebid-title { font-size: 17px; font-weight: 600; color: #162233; line-height: 22px; }
.prebid-subtitle { font-size: 15px; color: #4F6079; line-height: 20px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.switch { width: 51px; height: 31px; border-radius: 16px; background: #7E53F8; padding: 2px; display: flex; justify-content: flex-end; flex: 0 0 51px; }
.switch-dot { width: 27px; height: 27px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.24); }
</style></head><body>
<div class="phone">
  <div class="top"><div class="nav-title">Nova listagem rápida</div><div class="close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div></div>
  <div class="collection sell-mode">
    <div class="sale-cell sale-auction">
      <div class="sale-top">
        <div class="sale-icon"><img alt="icon-real-time-offer" src="../../../assets/icons-ios/icon-real-time-offer.svg"></div>
        <div class="sale-copy"><div class="sale-title">Oferta em tempo real</div><div class="sale-subtitle">A última oferta vence ao final do tempo</div></div>
        <div class="radio on"></div>
      </div>
      <div class="sale-inputs"><div class="mini-field"><div class="mini-label">Comece em</div><div class="mini-value">R$ 75,00</div></div><div class="mini-field"><div class="mini-label">Duração (segundos)</div><div class="mini-value">15</div></div></div>
    </div>
    <div class="sale-cell sale-bin"><div class="sale-top"><div class="sale-icon"><img alt="sell-mode-buy_it_now" src="../../../assets/icons-ios/sell-mode-buy_it_now.svg"></div><div class="sale-copy"><div class="sale-title">Comprar agora</div><div class="sale-subtitle">Ofereça um desconto em um item durante um período limitado.</div></div><div class="radio"></div></div></div>
    <div class="sale-cell sale-sd"><div class="sale-top"><div class="sale-icon"><img alt="sell-mode-sudden-death" src="../../../assets/icons-ios/sell-mode-sudden-death.svg"></div><div class="sale-copy"><div class="sale-title">Morte súbita</div><div class="sale-subtitle">Sem tempo adicional, mesmo que alguém dê uma oferta.</div></div><div class="radio"></div></div></div>
  </div>
  <div class="footer enabled">Adicionar produto</div>
</div></body></html>
