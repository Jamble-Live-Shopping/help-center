<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; min-height: 540px; background: rgba(0,0,0,0.18); border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 12px 8px; display: flex; flex-direction: column; justify-content: flex-end; gap: 8px; position: relative; }

.sheet { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 14px; overflow: hidden; }
.sheet-btn { display: block; width: 100%; padding: 14px 12px; font-size: 17px; color: #007AFF; border: none; background: transparent; font-family: inherit; border-bottom: 0.5px solid rgba(60,60,67,0.2); text-align: center; }
.sheet-btn:last-child { border-bottom: none; }
.sheet-btn.destructive { color: #D92C20; }
.cancel { background: rgba(255,255,255,0.95); border-radius: 14px; }
.cancel .sheet-btn { font-weight: 600; color: #007AFF; }
</style></head><body>
<div class="phone">
  <div class="sheet">
    <button class="sheet-btn destructive">Fim do Show</button>
    <button class="sheet-btn">Comece a batalha!</button>
    <button class="sheet-btn">Como serei pago?</button>
    <button class="sheet-btn">Configurações de áudio</button>
    <button class="sheet-btn">Está preso? Desbloqueie!</button>
    <button class="sheet-btn">Alguma dúvida, bug ou feedback?</button>
    <button class="sheet-btn">Central de ajuda</button>
  </div>
  <div class="cancel">
    <button class="sheet-btn">Cancelar</button>
  </div>
</div>
</body></html>
