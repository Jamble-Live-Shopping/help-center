<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 10px; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; }
.nav-back { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #162233; font-size: 22px; font-weight: 300; }
.nav-title { font-size: 17px; font-weight: 600; color: #162233; }
.nav-spacer { width: 28px; }
.section-header { padding: 12px 20px 10px; font-size: 13px; font-weight: 600; color: #6D6D80; text-transform: uppercase; letter-spacing: 0.04em; }
.list { margin: 0 12px; border: 1px solid #E9EAEF; border-radius: 12px; overflow: hidden; background: #FFFFFF; }
.row { padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; border-bottom: 0.5px solid #F0F1F5; }
.row:last-child { border-bottom: none; }
.row-top, .row-bottom { display: flex; justify-content: space-between; align-items: center; }
.row-id { font-size: 14px; font-weight: 600; color: #162233; font-family: "SF Mono", Menlo, monospace; }
.row-amount { font-family: -apple-system, "SF Pro Rounded", system-ui, sans-serif; font-size: 16px; font-weight: 700; color: #162233; }
.status { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 10px; }
.status.ok { background: rgba(23,177,105,0.12); color: #17B169; }
.status.wait { background: rgba(252,176,34,0.14); color: #B8820B; }
.status.err { background: rgba(217,44,32,0.10); color: #D92C20; }
.row-date { font-size: 12px; color: #6B7A92; }
</style></head><body><div class="phone">

<div class="section-header">RECENT PAYOUTS</div>
<div class="list">
  <div class="row">
    <div class="row-top"><div class="row-id">po_1A2B3C</div><div class="row-amount">R$ 350.00</div></div>
    <div class="row-bottom"><div class="status ok">Completed</div><div class="row-date">04/19/2026</div></div>
  </div>
  <div class="row">
    <div class="row-top"><div class="row-id">po_4D5E6F</div><div class="row-amount">R$ 520.00</div></div>

  </div>
  <div class="row">
    <div class="row-top"><div class="row-id">po_7G8H9I</div><div class="row-amount">R$ 180.00</div></div>
    <div class="row-bottom"><div class="status err">Failed</div><div class="row-date">04/17/2026</div></div>
  </div>
</div>
</div></body></html>
