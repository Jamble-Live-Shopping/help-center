<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 10px; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; }
.nav-back { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #162233; font-size: 22px; font-weight: 300; }
.nav-title { font-size: 17px; font-weight: 600; color: #162233; }
.nav-spacer { width: 28px; }
.section-header { font-size: 13px; font-weight: 400; color: #6D6D80; text-transform: uppercase; padding: 14px 24px 8px; letter-spacing: 0.04em; }
.group { background: #FFFFFF; margin: 0 12px 12px; border-radius: 12px; overflow: hidden; border: 1px solid #E9EAEF; }
.row { display: flex; align-items: center; padding: 13px 16px; min-height: 48px; border-bottom: 0.5px solid #F0F1F5; }
.row:last-child { border-bottom: none; }
.row-icon { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: white; font-size: 15px; margin-right: 14px; flex-shrink: 0; }
.row-icon.purple { background: #7E53F8; }
.row-icon.green { background: #17B169; }
.row-icon.orange { background: #FCB022; }
.row-label { font-size: 16px; color: #162233; flex: 1; line-height: 20px; }
.row-chev { color: #BDC2CD; font-size: 18px; font-weight: 300; }
</style></head><body><div class="phone">
<div class="nav"><div class="nav-back">&lsaquo;</div><div class="nav-title">Settings</div><div class="nav-spacer"></div></div>
<div class="section-header">SELL</div>
<div class="group">
  <div class="row"><div class="row-icon purple">$</div><div class="row-label">My Sales</div><div class="row-chev">&rsaquo;</div></div>
  <div class="row"><div class="row-icon green">&#x1F4B3;</div><div class="row-label">My Wallet</div><div class="row-chev">&rsaquo;</div></div>
  <div class="row"><div class="row-icon orange">&#x2709;</div><div class="row-label">Shipping Preferences</div><div class="row-chev">&rsaquo;</div></div>
</div>
</div></body></html>
