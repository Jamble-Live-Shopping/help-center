<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #E9EAEF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; min-height: 460px; display: flex; align-items: center; justify-content: center; padding: 16px; }
.alert { width: 272px; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 14px; overflow: hidden; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.18); }
.alert-body { padding: 20px 16px 16px; }
.alert-title { font-size: 17px; font-weight: 600; color: #000; line-height: 22px; }
.alert-msg { font-size: 13px; color: #000; line-height: 18px; margin-top: 6px; }
.alert-btns { border-top: 0.5px solid rgba(60,60,67,0.28); }
.alert-btn { display: block; width: 100%; padding: 11px 8px; font-size: 17px; border: none; background: transparent; cursor: pointer; font-family: inherit; border-bottom: 0.5px solid rgba(60,60,67,0.28); color: #007AFF; }
.alert-btn:last-child { border-bottom: none; }
.alert-btn.cancel { font-weight: 600; }
</style></head><body><div class="phone">
<div class="alert">
  <div class="alert-body">
    <div class="alert-title">Registration</div>
    <div class="alert-msg">You must first verify your identity and bank details. Jamble is powered by Pagar.me for more secure transactions.</div>
  </div>
  <div class="alert-btns">
    <button class="alert-btn">Individual</button>
    <button class="alert-btn">Company</button>
    <button class="alert-btn cancel">Later</button>
  </div>
</div>
</div></body></html>
