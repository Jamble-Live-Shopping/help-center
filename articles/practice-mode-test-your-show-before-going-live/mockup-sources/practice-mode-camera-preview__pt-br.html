<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.preview { height: 420px; background: linear-gradient(160deg, #2E3C52 0%, #162233 100%); position: relative; }
.badge { position: absolute; top: 16px; left: 16px; background: rgba(22,34,51,0.78); color: #FFFFFF; font-size: 12px; font-weight: 600; padding: 6px 10px; border-radius: 12px; letter-spacing: 0.02em; }
.back { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 16px; background: rgba(22,34,51,0.78); color: #FFFFFF; font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
.self-hint { position: absolute; bottom: 104px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.65); font-size: 12px; }
.actions { padding: 16px 20px 24px; }
.cta { background: #7E53F8; color: #FFFFFF; height: 52px; border-radius: 26px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; }
</style></head><body><div class="phone"><div class="preview"><div class="badge">Modo de prática</div><div class="back">X</div><div class="self-hint">Visualização da câmera</div></div><div class="actions"><div class="cta">Parar de praticar</div></div></div></body></html>
