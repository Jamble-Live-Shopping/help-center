<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 28px 24px 24px; }
.label { font-size: 13px; color: #6B7A92; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.title { font-size: 20px; font-weight: 700; color: #162233; margin-bottom: 12px; line-height: 26px; }
.timer { font-size: 34px; font-weight: 700; color: #162233; line-height: 40px; margin-bottom: 24px; font-variant-numeric: tabular-nums; }
.btn { height: 48px; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
.btn.primary { background: #7E53F8; color: #FFFFFF; }
.btn.secondary { background: #E9EAEF; color: #162233; }
</style></head><body><div class="phone"><div class="label">Seu show</div><div class="title">O Show começa em</div><div class="timer">00:45:30</div><div class="btn secondary">Modo de prática</div><div class="btn primary">Vá ao vivo</div></div></body></html>
