<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: rgba(0,0,0,0.35); display: flex; justify-content: center; padding: 32px 12px; }
.phone { width: 270px; background: transparent; border: none; box-shadow: none; }
.alert { background: rgba(255,255,255,0.96); border-radius: 14px; backdrop-filter: blur(20px); }
.alert-body { padding: 19px 16px 17px; text-align: center; }
.alert-title { font-size: 17px; font-weight: 600; color: #000; margin-bottom: 4px; }
.alert-msg { font-size: 13px; color: #000; line-height: 18px; }
.alert-btns { border-top: 0.5px solid #C6C6C8; display: flex; }
.alert-btn { flex: 1; padding: 11px; text-align: center; font-size: 17px; }
.alert-btn.primary { color: #7E53F8; font-weight: 600; border-right: 0.5px solid #C6C6C8; }
.alert-btn.secondary { color: #007AFF; }
</style></head><body><div class="phone"><div class="alert"><div class="alert-body"><div class="alert-title">Start your Show</div><div class="alert-msg">Once started, people will be able to join you</div></div><div class="alert-btns"><div class="alert-btn secondary">Later</div><div class="alert-btn primary">Yes, start</div></div></div></div></body></html>
