<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 16px; }
.nav { display: flex; align-items: center; padding: 14px 16px 10px; }
.nav-back { width: 24px; height: 24px; color: #7E53F8; font-size: 22px; line-height: 20px; }
.nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; color: #162233; margin-right: 24px; }
.form-body { padding: 4px 18px 8px; }
.field { margin-bottom: 12px; }
.fl { font-size: 12px; font-weight: 600; color: #6D6D80; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
.fi { font-size: 15px; color: #162233; background: #F9FAFC; border: 1px solid #E9EAEF; border-radius: 10px; padding: 11px 12px; }
.fi.focused { background: #FFFFFF; border: 1.5px solid #7E53F8; }
.fi.placeholder { color: #A0A7B7; }
.row2 { display: flex; gap: 10px; }
.row2 .field { flex: 1; }
.hint { font-size: 12px; color: #6D6D80; margin-top: 4px; }
.form-submit { background: #7E53F8; color: white; height: 48px; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; margin: 10px 18px 6px; }
</style></head><body><div class="phone">
<div class="nav"><div class="nav-back">&lsaquo;</div><div class="nav-title">Shipping Address</div></div>
<div class="form-body">
  <div class="field"><div class="fl">CEP</div><div class="fi focused">04538-132</div><div class="hint">Type your new CEP to update the address</div></div>
  <div class="field"><div class="fl">Street</div><div class="fi">Av. Brigadeiro Faria Lima</div></div>
  <div class="row2">
    <div class="field"><div class="fl">Number</div><div class="fi">3477</div></div>
    <div class="field"><div class="fl">Apartment</div><div class="fi placeholder">Suite 42</div></div>
  </div>
  <div class="field"><div class="fl">Neighborhood</div><div class="fi">Itaim Bibi</div></div>
  <div class="row2">
    <div class="field"><div class="fl">City</div><div class="fi">São Paulo</div></div>
    <div class="field"><div class="fl">State</div><div class="fi">SP</div></div>
  </div>
</div>
<div class="form-submit">Save</div>
</div></body></html>
