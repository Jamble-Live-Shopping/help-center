<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 16px; }
.nav { display: flex; align-items: center; padding: 14px 16px 10px; }
.nav-back { width: 24px; height: 24px; color: #7E53F8; font-size: 22px; line-height: 20px; }
.nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; color: #162233; margin-right: 24px; }
.section-header { font-size: 12px; font-weight: 600; color: #6D6D80; text-transform: uppercase; padding: 16px 20px 8px; letter-spacing: 0.4px; }
.group { background: #FFFFFF; margin: 0 12px 8px; border-radius: 12px; overflow: hidden; border: 1px solid #E9EAEF; }
.row { display: flex; align-items: center; padding: 14px 14px; min-height: 52px; border-bottom: 1px solid #F0F1F5; }
.row:last-child { border-bottom: none; }
.row-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; }
.row-icon svg { width: 18px; height: 18px; }
.row-icon.purple { background: #7E53F8; }
.row-icon.teal { background: #30BFB1; }
.row-icon.orange { background: #F08C3C; }
.row-body { flex: 1; min-width: 0; }
.row-label { font-size: 15px; color: #162233; line-height: 20px; font-weight: 600; }
.row-value { font-size: 13px; color: #6D6D80; line-height: 18px; margin-top: 2px; }
.row-chev { color: #C7C7CC; font-size: 18px; margin-left: 8px; }
</style></head><body><div class="phone">
<div class="nav"><div class="nav-back">&lsaquo;</div><div class="nav-title">Preferências de envio</div></div>
<div class="section-header">Endereço</div>
<div class="group">
  <div class="row"><div class="row-icon purple"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div><div class="row-body"><div class="row-label">Endereço de envio</div><div class="row-value">Av. Paulista, 1578, São Paulo</div></div><div class="row-chev">&rsaquo;</div></div>
</div>
<div class="section-header">Etiqueta</div>
<div class="group">
  <div class="row"><div class="row-icon teal"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1.2"/></svg></div><div class="row-body"><div class="row-label">Formato da etiqueta</div><div class="row-value">PDF meia página</div></div><div class="row-chev">&rsaquo;</div></div>
  <div class="row"><div class="row-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div class="row-body"><div class="row-label">Seguro do pacote</div><div class="row-value">Ativado</div></div><div class="row-chev">&rsaquo;</div></div>
</div>
</div></body></html>
