<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; padding: 22px 22px 18px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.title { font-size: 20px; font-weight: 700; color: #162233; margin-bottom: 16px; }
.qa { padding: 12px 0; border-bottom: 1px solid #E9EAEF; }
.qa:last-child { border-bottom: none; padding-bottom: 0; }
.q { font-size: 14px; color: #6D6D80; margin-bottom: 4px; }
.a { font-size: 15px; font-weight: 600; color: #162233; display: flex; align-items: baseline; gap: 8px; }
.a .arrow { color: #7E53F8; flex-shrink: 0; }
.a .value { line-height: 20px; }
</style></head><body>
<div class="phone">
  <div class="title">Guia rápido</div>
  <div class="qa">
    <div class="q">Cabe em um envelope?</div>
    <div class="a"><span class="arrow">→</span><span class="value">Carta ou Booster</span></div>
  </div>
  <div class="qa">
    <div class="q">Pequeno e leve (joia, etc)?</div>
    <div class="a"><span class="arrow">→</span><span class="value">Acessórios leves</span></div>
  </div>
  <div class="qa">
    <div class="q">Uma peça de roupa?</div>
    <div class="a"><span class="arrow">→</span><span class="value">Leve / Padrão / Mais pesada</span></div>
  </div>
  <div class="qa">
    <div class="q">Item volumoso único?</div>
    <div class="a"><span class="arrow">→</span><span class="value">Itens volumosos</span></div>
  </div>
  <div class="qa">
    <div class="q">Múltiplos itens?</div>
    <div class="a"><span class="arrow">→</span><span class="value">Pacotes Pequeno / Médio / Grande / Extra-grande</span></div>
  </div>
</div>
</body></html>
