<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; min-height: 540px; background: #0C131D; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.18); border: 1px solid #E9EAEF; overflow: hidden; padding: 18px 16px 16px; display: flex; flex-direction: column; gap: 10px; position: relative; }
.head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.title { font-size: 20px; font-weight: 700; color: #FFFFFF; line-height: 1.1; }
.close { color: #FFFFFF; font-size: 18px; opacity: 0.85; }
.subtitle { font-size: 13px; color: rgba(255,255,255,0.6); }
.rules-card { background: #7E53F8; border-radius: 16px; padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
.rule { display: flex; align-items: center; gap: 14px; }
.rule-icon { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
.rule-icon img { width: 30px; height: 30px; object-fit: contain; display: block; }
.rule-icon img.cart-icon { filter: brightness(0) invert(1); }
.entry { position: absolute; right: -4px; bottom: -4px; background: #FFFFFF; color: #7E53F8; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 8px; border: 1.5px solid #7E53F8; }
.rule-text { font-size: 14px; color: #FFFFFF; line-height: 1.3; }
.list-head { display: flex; justify-content: space-between; padding: 14px 4px 8px; font-size: 13px; color: rgba(255,255,255,0.55); font-weight: 500; border-bottom: 1px solid rgba(255,255,255,0.10); }
.row { display: flex; align-items: center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.row.r1 { background: rgba(126,83,248,0.16); }
.row.r2 { background: rgba(126,83,248,0.12); }
.row.r3 { background: rgba(126,83,248,0.08); }
.rank-num { width: 24px; text-align: center; color: #FFFFFF; font-size: 12px; font-weight: 700; }
.avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #FFFFFF; font-weight: 700; font-size: 12px; }
.a1 { background: linear-gradient(135deg, #FF7AA4, #FF2867); }
.a2 { background: linear-gradient(135deg, #FFC9DA, #FF7AA4); }
.a3 { background: linear-gradient(135deg, #FFD15A, #FF8A3D); }
.a4 { background: linear-gradient(135deg, #6FB6FF, #2B7FFF); }
.a5 { background: linear-gradient(135deg, #87CFFF, #1E6FE0); }
.uname { flex: 1; color: #FFFFFF; font-size: 14px; font-weight: 500; }
.score-with-gem { display: flex; align-items: center; gap: 4px; color: #FFFFFF; font-size: 14px; font-weight: 600; }
.score-with-gem img { width: 14px; height: 14px; object-fit: contain; display: block; }
.you { background: #0C131D; border-top: 1px solid rgba(255,255,255,0.10); padding: 12px 4px 4px; display: flex; align-items: center; gap: 12px; margin-top: 6px; }
.you .uname { color: #FFFFFF; font-weight: 600; }
.you-score { display: flex; flex-direction: column; gap: 2px; }
.you-score-label { color: rgba(255,255,255,0.55); font-size: 11px; display: flex; align-items: center; gap: 4px; }
.you-score-label img { width: 12px; height: 12px; object-fit: contain; display: block; }
