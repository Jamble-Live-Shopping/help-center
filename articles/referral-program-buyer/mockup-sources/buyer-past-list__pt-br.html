<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
  padding: 18px 16px 20px;
}
.nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding: 0 4px; }
.nav-title { font-size: 17px; font-weight: 700; color: #162233; flex: 1; text-align: center; }
.close-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #6D6D80; font-size: 18px; font-weight: 700; }
/* Summary card uses .bg.brand per ReferralListType.swift:33 (case .past
   returns Color(uiColor: .bg.brand) = Jamble purple). Label string is
   verbatim from ReferralListType.swift:26 (case .past returns "You've earned"
   localized to "Você ganhou"). Color + label both verified iOS-faithful
   2026-05-11. */
.summary-card { background: #7E53F8; border-radius: 22px; padding: 18px 16px 20px; text-align: center; margin-bottom: 16px; }
.summary-label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.86); margin-bottom: 8px; }
.summary-value { display: inline-flex; align-items: center; gap: 6px; font-size: 30px; font-weight: 700; color: #FFFFFF; }
.summary-conv { font-size: 12px; color: rgba(255,255,255,0.78); margin-top: 10px; }
.coin-glyph { width: 24px; height: 24px; border-radius: 50%; background: #FFFFFF; display: inline-flex; align-items: center; justify-content: center; color: #7E53F8; font-size: 13px; font-weight: 700; }
.list-cell { display: flex; align-items: center; gap: 12px; padding: 12px 6px; }
.avatar { width: 44px; height: 44px; border-radius: 22px; flex-shrink: 0; background: linear-gradient(150deg, #FBBF24, #F59E0B); display: flex; align-items: center; justify-content: center; color: #FFFFFF; font-weight: 700; font-size: 16px; }
.avatar.b { background: linear-gradient(150deg, #60A5FA, #2563EB); }
.avatar.c { background: linear-gradient(150deg, #A78BFA, #7E53F8); }
.cell-body { flex: 1; min-width: 0; }
.cell-name { font-size: 15px; font-weight: 600; color: #162233; }
.cell-status { font-size: 13px; margin-top: 2px; }
.status-done { color: #7E53F8; }
.status-missed { color: #6D6D80; }
.cell-reward { font-size: 15px; font-weight: 600; color: #7E53F8; flex-shrink: 0; }
hr { border: none; border-top: 1px solid #F1F2F5; margin: 0; }
</style></head><body>
<div class="phone">
  <div class="nav">
    <div></div>
    <div class="nav-title">Referências anteriores</div>
    <div class="close-btn">×</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Você ganhou</div>
    <div class="summary-value">
      <span class="coin-glyph">$</span>
      <span>6</span>
    </div>
    <div class="summary-conv">1 ponto = $1</div>
  </div>
  <div>
    <div class="list-cell">
      <div class="avatar">CA</div>
      <div class="cell-body">
        <div class="cell-name">Camila A.</div>
        <div class="cell-status status-done">Concluído</div>
      </div>
      <div class="cell-reward">$3</div>
    </div>
    <hr>
    <div class="list-cell">
      <div class="avatar b">JF</div>
      <div class="cell-body">
        <div class="cell-name">João F.</div>
        <div class="cell-status status-done">Concluído</div>
      </div>
      <div class="cell-reward">$3</div>
    </div>
    <hr>
    <div class="list-cell">
      <div class="avatar c">LM</div>
      <div class="cell-body">
        <div class="cell-name">Luiza M.</div>
        <div class="cell-status status-missed">Prazo perdido</div>
      </div>
      <div></div>
    </div>
  </div>
</div></body></html>
