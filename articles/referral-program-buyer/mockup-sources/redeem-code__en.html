<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
  padding: 22px 20px 28px;
}
.modal-handle { width: 40px; height: 4px; background: #E1E2EA; border-radius: 2px; margin: 0 auto 18px; }
.nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.nav-title { font-size: 18px; font-weight: 700; color: #162233; }
.close-btn { width: 28px; height: 28px; border-radius: 14px; background: #F4F4F8; display: flex; align-items: center; justify-content: center; color: #6D6D80; font-size: 14px; font-weight: 700; }
.intro-title { font-size: 22px; font-weight: 700; color: #162233; line-height: 28px; margin-bottom: 10px; letter-spacing: -0.3px; }
.intro-sub { font-size: 14px; color: #6D6D80; line-height: 20px; margin-bottom: 22px; }
.code-field { background: #F1F2F5; border-radius: 12px; height: 60px; display: flex; align-items: center; padding: 0 16px; margin-bottom: 22px; }
.code-placeholder { font-size: 20px; font-weight: 500; color: #B5B7C2; letter-spacing: 0.5px; }
.code-cursor { display: inline-block; width: 2px; height: 24px; background: #7E53F8; margin-right: 6px; animation: blink 1s steps(1) infinite; }
@keyframes blink { 50% { opacity: 0; } }
.cta { height: 56px; border-radius: 28px; background: #162233; color: #FFFFFF; font-size: 17px; font-weight: 600; display: flex; align-items: center; justify-content: center; opacity: 0.5; }
.hint { font-size: 12px; color: #A0A7B7; text-align: center; margin-top: 14px; line-height: 18px; }
</style></head><body>
<div class="phone">
  <div class="modal-handle"></div>
  <div class="nav">
    <div class="nav-title">Redeem a code</div>
    <div class="close-btn">×</div>
  </div>
  <div class="intro-title">I have a referral code</div>
  <div class="intro-sub">Enter the code your friend shared with you to claim your welcome credit.</div>
  <div class="code-field">
    <span class="code-cursor"></span>
    <span class="code-placeholder">Enter your code....</span>
  </div>
  <div class="cta">Redeem</div>
  <div class="hint">You will see the exact credit amount as soon as the code is confirmed.</div>
</div></body></html>
