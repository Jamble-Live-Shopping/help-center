<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 16px; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; border-bottom: 0.5px solid #F0F1F5; }
.nav-title { font-size: 17px; font-weight: 600; color: #162233; }
.nav-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; color: #162233; font-size: 20px; }
.profile-top { padding: 18px 20px 14px; display: flex; gap: 14px; align-items: flex-start; }
.avatar-wrap { position: relative; flex-shrink: 0; }
.avatar { width: 80px; height: 80px; border-radius: 40px; background: linear-gradient(135deg,#DADDE3,#BDC2CD); display:flex;align-items:center;justify-content:center;color:#6B7A92;font-size:28px;font-weight:600; border: 0.5px solid #DADDE3; }
.edit-badge { position:absolute; right:-4px; bottom:2px; width:30px; height:30px; border-radius:15px; background:#BDC2CD; border:2px solid #FFFFFF; display:flex;align-items:center;justify-content:center; color:#FFFFFF; }
.edit-badge svg { width:14px; height:14px; }
.profile-info { flex: 1; padding-top: 4px; }
.display-name { font-size: 18px; font-weight: 600; color: #162233; line-height: 22px; }
.username-row { display:flex; align-items:center; gap:6px; margin-top: 4px; color:#7E53F8; font-size: 14px; }
.link-ico { width:12px; height:12px; opacity: 0.7; }
.joined { font-size: 12px; color: #A0A7B7; margin-top: 4px; }
.bio { padding: 4px 20px 16px; font-size: 14px; color: #162233; line-height: 20px; }
.stat-row { display: flex; justify-content: space-around; padding: 12px 16px; border-top: 0.5px solid #F0F1F5; border-bottom: 0.5px solid #F0F1F5; margin: 0 16px; }
.stat { text-align: center; }
.stat-val { font-size: 16px; font-weight: 600; color: #162233; }
.stat-lbl { font-size: 11px; color: #6B7A92; text-transform: uppercase; letter-spacing: 0.3px; margin-top: 2px; }
.tabs { display: flex; gap: 0; padding: 10px 16px 0; border-top: 0.5px solid #F0F1F5; margin-top: 14px; }
.tab { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; font-weight: 600; color: #A0A7B7; }
.tab.on { color: #162233; border-bottom: 2px solid #162233; }
</style></head><body><div class="phone">
<div class="nav"><div class="nav-icon">&lsaquo;</div><div class="nav-title">Meu perfil</div><div class="nav-icon">&#x2699;</div></div>
<div class="profile-top">
  <div class="avatar-wrap">
    <div class="avatar">JS</div>
    <div class="edit-badge" aria-label="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></div>
  </div>
  <div class="profile-info">
    <div class="display-name">Jo&atilde;o | Sneakers SP</div>
    <div class="username-row"><svg class="link-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>@sneakerking</div>
    <div class="joined">Entrou em mar&ccedil;o de 2026</div>
  </div>
</div>
<div class="bio">Streetwear vintage e importados | SP. Entregas r&aacute;pidas e curadoria autoral.</div>
<div class="stat-row">
  <div class="stat"><div class="stat-val">148</div><div class="stat-lbl">Vendidos</div></div>
  <div class="stat"><div class="stat-val">1,2k</div><div class="stat-lbl">Seguidores</div></div>
  <div class="stat"><div class="stat-val">4,9</div><div class="stat-lbl">Avalia&ccedil;&atilde;o</div></div>
</div>
<div class="tabs"><div class="tab on">Shows</div><div class="tab">Produtos</div><div class="tab">Avalia&ccedil;&otilde;es</div></div>
</div></body></html>
