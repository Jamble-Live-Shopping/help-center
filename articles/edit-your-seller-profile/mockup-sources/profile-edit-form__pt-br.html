<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 14px; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; border-bottom: 0.5px solid #F0F1F5; }
.nav-title { font-size: 17px; font-weight: 600; color: #162233; }
.nav-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; color: #162233; font-size: 20px; }
.avatar-section { display:flex; flex-direction:column; align-items:center; padding: 22px 20px 6px; gap: 10px; }
.avatar-wrap { position: relative; }
.avatar { width: 96px; height: 96px; border-radius: 48px; background: linear-gradient(135deg,#DADDE3,#BDC2CD); display:flex;align-items:center;justify-content:center;color:#6B7A92;font-size:32px;font-weight:600; border: 0.5px solid #DADDE3; }
.edit-badge { position:absolute; right:-2px; bottom:4px; width:32px; height:32px; border-radius:16px; background:#BDC2CD; border:2px solid #FFFFFF; display:flex;align-items:center;justify-content:center; color:#FFFFFF; }
.edit-badge svg { width:15px; height:15px; }
.change-photo { font-size: 13px; color: #7E53F8; font-weight: 600; }
.form-body { padding: 16px 20px 8px; }
.field { margin-bottom: 16px; }
.fl { font-size: 13px; font-weight: 600; color: #6B7A92; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
.fi { font-size: 15px; color: #162233; background: #F9FAFC; border: 1px solid #E9EAEF; border-radius: 8px; padding: 11px 12px; }
.fi.placeholder { color: #A0A7B7; }
.ft { font-size: 15px; color: #162233; background: #F9FAFC; border: 1px solid #E9EAEF; border-radius: 8px; padding: 11px 12px; min-height: 70px; line-height: 20px; }
.hint { font-size: 11px; color: #A0A7B7; margin-top: 4px; }
.form-submit { background: #7E53F8; color: white; height: 48px; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; margin: 6px 20px 8px; }
</style></head><body><div class="phone">
<div class="nav"><div class="nav-icon">&lsaquo;</div><div class="nav-title">Meu perfil</div><div class="nav-icon"></div></div>
<div class="avatar-section">
  <div class="avatar-wrap">
    <div class="avatar">JS</div>
    <div class="edit-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></div>
  </div>
  <div class="change-photo">Mudar foto</div>
</div>
<div class="form-body">
  <div class="field"><div class="fl">Nome de usu&aacute;rio</div><div class="fi">@sneakerking</div><div class="hint">3-15 caracteres. Apenas letras, n&uacute;meros e _</div></div>
  <div class="field"><div class="fl">Nome</div><div class="fi">Jo&atilde;o | Sneakers SP</div><div class="hint">M&aacute;ximo 20 caracteres</div></div>
  <div class="field"><div class="fl">Bio</div><div class="ft">Streetwear vintage e importados | SP. Entregas r&aacute;pidas e curadoria autoral.</div><div class="hint">M&aacute;ximo 200 caracteres</div></div>
</div>
<div class="form-submit">Salvar</div>
</div></body></html>
