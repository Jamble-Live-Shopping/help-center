<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 14px; }

.order-header { display: flex; justify-content: space-between; align-items: center; padding: 4px 4px 10px; border-bottom: 1px solid #F0F1F5; margin-bottom: 12px; }
.order-num-label { font-size: 13px; font-weight: 600; color: #162233; }
.order-num-value { font-size: 13px; color: #7E53F8; font-weight: 500; }

.product-row { display: flex; gap: 12px; padding: 4px 4px 14px; }
.product-img { width: 64px; height: 64px; border-radius: 10px; background: linear-gradient(135deg, #FFE5B4, #FFB88C); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.product-info { flex: 1; min-width: 0; }
.product-name { font-size: 15px; font-weight: 600; color: #162233; line-height: 20px; margin-bottom: 4px; }
.product-price { font-size: 15px; font-weight: 700; color: #162233; }

.status-card { background: #F3F4F8; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
.status-label { font-size: 13px; font-weight: 500; color: #7E53F8; margin-bottom: 4px; }
.status-action { font-size: 18px; font-weight: 700; color: #162233; line-height: 22px; margin-bottom: 12px; }
.progress-bar { display: flex; gap: 4px; margin-bottom: 8px; }
.progress-step { flex: 1; height: 4px; border-radius: 2px; background: #DADDE3; }
.progress-step.done { background: #7E53F8; }
.progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: #6D6D80; }

.tracking-card { background: #FFFFFF; border: 1px solid #E9EAEF; border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.tracking-icon { width: 32px; height: 32px; border-radius: 8px; background: #EEE6FF; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tracking-icon svg { width: 18px; height: 18px; stroke: #7E53F8; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.copy-icon { display: inline-flex; vertical-align: middle; margin-left: 4px; }
.copy-icon svg { width: 12px; height: 12px; stroke: #7E53F8; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.tracking-info { flex: 1; min-width: 0; }
.tracking-label { font-size: 11px; color: #6D6D80; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
.tracking-code { font-size: 14px; font-weight: 600; color: #162233; font-family: 'SF Mono', Menlo, monospace; }
</style></head><body>
<div class="phone">
  <div class="order-header">
    <div class="order-num-label">Order number</div>
    <div class="order-num-value">JMB-2A4F91<span class="copy-icon"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span></div>
  </div>
  <div class="product-row">
    <div class="product-img">&#x1F0CF;</div>
    <div class="product-info">
      <div class="product-name">Charizard Holo 1999</div>
      <div class="product-price">R$ 285.00</div>
    </div>
  </div>
  <div class="status-card">
    <div class="status-label">Shipped</div>
    <div class="status-action">In delivery</div>
    <div class="progress-bar">
      <div class="progress-step done"></div>
      <div class="progress-step done"></div>
      <div class="progress-step done"></div>
      <div class="progress-step"></div>
    </div>
    <div class="progress-labels">
      <span>Ordered</span>
      <span>Confirmed</span>
      <span>Shipped</span>
      <span>Delivered</span>
    </div>
  </div>
  <div class="tracking-card">
    <div class="tracking-icon"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
    <div class="tracking-info">
      <div class="tracking-label">Tracking code</div>
      <div class="tracking-code">OQ451782034BR</div>
    </div>
  </div>
</div>
</body></html>
