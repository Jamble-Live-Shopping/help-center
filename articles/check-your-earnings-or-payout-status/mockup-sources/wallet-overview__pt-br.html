<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 12px; }

.nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; border-bottom: 1px solid #F0F1F5; }
.nav-back { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #162233; font-size: 22px; font-weight: 400; }
.nav-title { font-size: 17px; font-weight: 600; color: #162233; }
.nav-right { display: flex; gap: 6px; }
.nav-icon { width: 32px; height: 32px; border-radius: 50%; background: #F3F4F8; color: #162233; display: flex; align-items: center; justify-content: center; }

.card { margin: 16px 12px 12px; padding: 16px; border: 1px solid #E9EAEF; border-radius: 12px; }
.card-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.card-label-wrap { display: flex; align-items: center; gap: 6px; }
.card-label { font-size: 16px; font-weight: 600; color: #162233; }
.info-icon { width: 16px; height: 16px; color: #162233; display: inline-flex; }
.card-amount { font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; font-size: 30px; font-weight: 500; color: #162233; letter-spacing: -0.02em; margin-top: 6px; }
.withdraw-btn { height: 40px; padding: 0 18px; border-radius: 20px; background: #7E53F8; color: #FFFFFF; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; align-self: center; }

.divider { height: 1px; background: #E9EAEF; margin: 14px 0; }
.bank-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.bank-info { display: flex; flex-direction: column; gap: 2px; }
.bank-title { font-size: 13px; font-weight: 600; color: #162233; }
.bank-sub { font-size: 13px; color: #6B7A92; }
.update-btn { height: 32px; padding: 0 14px; border-radius: 16px; background: #0C131D; color: #FFFFFF; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; }

.pending-card { margin: 0 12px 12px; padding: 16px; border: 1px solid #E9EAEF; border-radius: 12px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.pending-left { flex: 1; }
.pending-title { font-size: 16px; font-weight: 600; color: #162233; }
.pending-desc { font-size: 13px; color: #6B7A92; margin-top: 2px; }
.pending-right { text-align: right; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
.pending-amount { font-size: 18px; font-weight: 700; color: #162233; }
.learn-more { font-size: 13px; font-weight: 600; color: #7E53F8; }

.history-header { margin: 0 12px; padding: 14px 16px; border: 1px solid #E9EAEF; border-bottom: none; border-radius: 12px 12px 0 0; font-size: 16px; font-weight: 600; color: #162233; }
.history-empty { margin: 0 12px; padding: 20px 16px; border: 1px solid #E9EAEF; border-radius: 0 0 12px 12px; font-size: 14px; color: #6B7A92; text-align: center; }
</style></head><body><div class="phone">
<div class="nav">
  <div class="nav-back">&lsaquo;</div>
  <div class="nav-title">My Wallet</div>
  <div class="nav-right">
    <div class="nav-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#162233" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    </div>
    <div class="nav-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#162233" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><polyline points="12 7 12 12 15 14"></polyline></svg>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-row">
    <div style="flex:1">
      <div class="card-label-wrap">
        <div class="card-label">Available to Withdraw</div>
        <div class="info-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#162233" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg></div>
      </div>
      <div class="card-amount">R$ 450,00</div>
    </div>
    <div class="withdraw-btn">Withdraw</div>
  </div>
  <div class="divider"></div>
  <div class="bank-row">
    <div class="bank-info">
      <div class="bank-title">Bank Details</div>
      <div class="bank-sub">Banco do Brasil &middot; Ag 1234 &middot; CC 56789-0</div>
    </div>
    <div class="update-btn">Update</div>
  </div>
</div>

<div class="pending-card">
  <div class="pending-left">
    <div class="pending-title">Pending</div>
    <div class="pending-desc">Pedidos em andamento</div>
  </div>
  <div class="pending-right">
    <div class="pending-amount">R$ 180,00</div>
    <div class="learn-more">Learn More</div>
  </div>
</div>

<div class="history-header">Payouts History</div>
<div class="history-empty">Puxe para atualizar</div>

</div></body></html>
