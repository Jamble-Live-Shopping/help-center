<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 12px; }

.nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; border-bottom: 1px solid #F0F1F5; }
.nav-back { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #162233; font-size: 22px; font-weight: 400; }
.nav-title { font-size: 17px; font-weight: 600; color: #162233; }
.nav-right-spacer { width: 28px; }

.header-strip { padding: 14px 16px 10px; }
.header-title { font-size: 16px; font-weight: 600; color: #162233; }
.list { margin: 0 12px; border: 1px solid #E9EAEF; border-radius: 12px; overflow: hidden; }
.row { padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; border-bottom: 1px solid #F0F1F5; }
.row:last-child { border-bottom: none; }
.row-top, .row-bottom { display: flex; justify-content: space-between; align-items: center; }
.row-id { font-size: 15px; font-weight: 600; color: #162233; letter-spacing: -0.01em; }
.row-amount { font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; font-size: 15px; font-weight: 600; color: #162233; }
.status { font-size: 13px; font-weight: 600; }
.row-date { font-size: 13px; color: #6B7A92; }
</style></head><body><div class="phone">
<div class="nav">
  <div class="nav-back">&lsaquo;</div>
  <div class="nav-title">My Wallet</div>
  <div class="nav-right-spacer"></div>
</div>
<div class="header-strip">
  <div class="header-title">Payouts History</div>
</div>
<div class="list">
  <div class="row">
    <div class="row-top"><div class="row-id">#PAY-2812</div><div class="row-amount">R$ 450.00</div></div>
    <div class="row-bottom"><div class="status" style="color:#17B169">Completed</div><div class="row-date">3/19/2026</div></div>
  </div>
  <div class="row">
    <div class="row-top"><div class="row-id">#PAY-2798</div><div class="row-amount">R$ 520.00</div></div>
    <div class="row-bottom"><div class="status" style="color:#7E53F8">Processing</div><div class="row-date">3/18/2026</div></div>
  </div>
  <div class="row">
    <div class="row-top"><div class="row-id">#PAY-2784</div><div class="row-amount">R$ 180.00</div></div>
    <div class="row-bottom"><div class="status" style="color:#7E53F8">Pending</div><div class="row-date">3/17/2026</div></div>
  </div>
  <div class="row">
    <div class="row-top"><div class="row-id">#PAY-2770</div><div class="row-amount">R$ 290.00</div></div>
    <div class="row-bottom"><div class="status" style="color:#D92C20">Failed</div><div class="row-date">3/15/2026</div></div>
  </div>
  <div class="row">
    <div class="row-top"><div class="row-id">#PAY-2755</div><div class="row-amount">R$ 130.00</div></div>
    <div class="row-bottom"><div class="status" style="color:#17B169">Completed</div><div class="row-date">3/12/2026</div></div>
  </div>
</div>
</div></body></html>
