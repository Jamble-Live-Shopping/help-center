<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 12px; }

.nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; border-bottom: 1px solid #F0F1F5; }
.nav-back { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #162233; font-size: 22px; font-weight: 400; }
.nav-center { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.nav-title { font-size: 17px; font-weight: 600; color: #162233; }
.nav-sub { font-size: 12px; color: #6B7A92; }
.nav-right-spacer { width: 28px; }

.list { margin: 14px 12px 0; }
.tx-row { display: flex; gap: 12px; padding: 14px 4px; border-bottom: 1px solid #F0F1F5; align-items: flex-start; }
.tx-row:last-child { border-bottom: none; }
.thumb { width: 56px; height: 56px; border-radius: 8px; background: #F3F4F8; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #A0A7B7; }
.tx-body { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.tx-top { display: flex; justify-content: space-between; gap: 8px; align-items: baseline; }
.tx-title { font-size: 13px; font-weight: 600; color: #162233; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-amount { font-size: 13px; font-weight: 600; color: #162233; white-space: nowrap; }
.tx-order { font-size: 13px; color: #6B7A92; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-status-row { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
.tx-status { font-size: 13px; font-weight: 600; color: #17B169; }
.tx-date { font-size: 13px; color: #6B7A92; }
</style></head><body><div class="phone">
