<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 16px 0 18px; }
.section-header { font-size: 12px; font-weight: 600; color: #6D6D80; text-transform: uppercase; letter-spacing: 0.6px; padding: 6px 20px 10px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px 4px; }
.cell { display: flex; flex-direction: column; gap: 6px; }
.thumb { aspect-ratio: 1; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #E9EAEF; }
.thumb-inner { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.shape { width: 50%; height: 64%; border-radius: 6px; background: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 1px 3px rgba(22,34,51,0.08); }
.badge { position: absolute; top: 8px; right: 8px; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgba(22,34,51,0.18); z-index: 3; }
.badge.ok { background: #22C55E; }
.badge.no { background: #EF4444; }
.badge svg { width: 12px; height: 12px; }
.label { font-size: 11px; color: #162233; font-weight: 600; text-align: center; line-height: 14px; padding: 0 2px; }
.label.muted { color: #828DA2; font-weight: 500; }
.divider { height: 1px; background: #F0F1F5; margin: 14px 16px 12px; }

.t-good-1 { background: linear-gradient(160deg, #FAFBFD 0%, #EEF1F7 100%); }
.t-good-2 { background: linear-gradient(160deg, #F4F7FB 0%, #E6ECF4 100%); }
.t-good-3 { background: linear-gradient(160deg, #F9FAFC 0%, #ECEEF3 100%); }

.t-bad-1 { background: linear-gradient(160deg, #2A2D38 0%, #1A1C24 100%); }
.t-bad-1 .shape { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.22); filter: blur(2px); }
.t-bad-2 { background: linear-gradient(160deg, #EDEFF3 0%, #D8DEE5 100%); position: relative; }
.t-bad-2::after { content: "STOCK"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-22deg); color: rgba(22,34,51,0.18); font-size: 18px; font-weight: 800; letter-spacing: 2px; z-index: 2; }
.t-bad-3 { background: linear-gradient(160deg, #FAFBFD 0%, #EEF1F7 100%); }
.t-bad-3 .shape { width: 28%; height: 38%; position: absolute; }
.t-bad-3 .s1 { top: 16%; left: 14%; transform: rotate(-8deg); }
.t-bad-3 .s2 { top: 22%; right: 12%; transform: rotate(10deg); width: 24%; height: 32%; }
.t-bad-3 .s3 { bottom: 14%; left: 22%; transform: rotate(-3deg); width: 30%; height: 36%; }
.t-bad-3 .s4 { bottom: 18%; right: 16%; transform: rotate(14deg); width: 22%; height: 30%; }
</style></head><body>
<div class="phone">
  <div class="section-header">Do this</div>
  <div class="grid">
    <div class="cell">
      <div class="thumb t-good-1">
        <div class="thumb-inner"><div class="shape"></div></div>
        <div class="badge ok"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      </div>
      <div class="label">Well lit</div>
    </div>
    <div class="cell">
      <div class="thumb t-good-2">
        <div class="thumb-inner"><div class="shape"></div></div>
        <div class="badge ok"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      </div>
      <div class="label">Clean background</div>
    </div>
    <div class="cell">
      <div class="thumb t-good-3">
        <div class="thumb-inner"><div class="shape" style="width:74%;height:74%"></div></div>
        <div class="badge ok"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      </div>
      <div class="label">Close-up</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section-header">Avoid this</div>
  <div class="grid">
    <div class="cell">
      <div class="thumb t-bad-1">
        <div class="thumb-inner"><div class="shape"></div></div>
        <div class="badge no"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
      </div>
      <div class="label muted">Blurry / dark</div>
    </div>
    <div class="cell">
      <div class="thumb t-bad-2">
        <div class="thumb-inner"><div class="shape" style="opacity:0.6"></div></div>
        <div class="badge no"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
      </div>
      <div class="label muted">Stock photo</div>
    </div>
    <div class="cell">
      <div class="thumb t-bad-3">
        <div class="shape s1"></div>
        <div class="shape s2"></div>
        <div class="shape s3"></div>
        <div class="shape s4"></div>
        <div class="badge no"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
      </div>
      <div class="label muted">Multiple items</div>
    </div>
  </div>
</div>
</body></html>
