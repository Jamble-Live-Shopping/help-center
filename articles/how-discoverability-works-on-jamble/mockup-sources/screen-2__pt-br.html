<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 20px 0 28px; }
.search-bar { margin: 4px 16px 18px; padding: 10px 14px; background: #F3F4F8; border-radius: 12px; color: #A0A7B7; font-size: 14px; font-weight: 500; }
.subtab-row { display: flex; gap: 22px; padding: 0 20px 12px; border-bottom: 1px solid #E9EAEF; }
.subtab { padding: 6px 0; font-size: 14px; font-weight: 500; color: #6B7A92; }
.subtab.active { color: #162233; font-weight: 600; border-bottom: 2px solid #162233; padding-bottom: 6px; }
.subtab-body { margin: 22px 16px 0; padding: 36px 14px; text-align: center; background: #F9FAFC; border: 1px dashed #DADDE3; border-radius: 12px; color: #A0A7B7; font-size: 13px; line-height: 18px; }
</style></head><body><div class="phone"><div class="search-bar">Procure por membros...</div><div class="subtab-row"><div class="subtab active">Membros</div><div class="subtab">Shows</div></div><div class="subtab-body">Os resultados aparecem aqui conforme você digita</div></div></body></html>
