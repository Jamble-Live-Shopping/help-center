<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; padding: 28px 24px 28px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.eyebrow { font-size: 28px; font-weight: 700; color: #162233; letter-spacing: 1.2px; text-transform: uppercase; line-height: 32px; }
.subtitle { font-size: 17px; color: #162233; line-height: 24px; margin-top: 6px; }
.phone-row { display: flex; gap: 10px; margin-top: 32px; }
.country { height: 52px; display: flex; align-items: center; gap: 6px; padding: 0 14px; background: #FFFFFF; border: 1.5px solid #DADDE3; border-radius: 12px; font-size: 16px; font-weight: 600; color: #162233; }
.country .chev { font-size: 12px; color: #6D6D80; margin-left: 2px; }
.number { flex: 1; height: 60px; display: flex; align-items: center; padding: 0 14px; background: #FFFFFF; border: 3px solid #7E53F8; border-radius: 14px; font-size: 18px; font-weight: 600; color: #162233; }
.btn { margin-top: 18px; height: 56px; background: #7E53F8; border-radius: 28px; display: flex; align-items: center; justify-content: center; color: #FFFFFF; font-size: 18px; font-weight: 700; }
.other { margin-top: 26px; display: flex; align-items: center; justify-content: center; gap: 8px; color: #6D6D80; font-size: 15px; }
.other .chev { color: #162233; font-size: 14px; font-weight: 700; }
</style></head><body>
<div class="phone">
  <div class="eyebrow">REGISTRAR-SE</div>
  <div class="subtitle">Digite seu número de telefone</div>
  <div class="phone-row">
    <div class="country">🇧🇷 +55 <span class="chev">▾</span></div>
    <div class="number">11 98765-4321</div>
  </div>
  <div class="btn">Continuar</div>
  <div class="other">Outros métodos de login <span class="chev">›</span></div>
</div>
</body></html>
