<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; padding: 16px 0 14px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.navtitle { font-size: 20px; font-weight: 700; color: #162233; padding: 4px 20px 10px; }
.section-header { font-size: 12px; font-weight: 600; color: #6D6D80; text-transform: uppercase; letter-spacing: 0.6px; padding: 14px 20px 8px; }
.group { background: #FFFFFF; margin: 0 12px; border-radius: 12px; border: 1px solid #E9EAEF; overflow: hidden; }
.row { display: flex; align-items: center; padding: 13px 16px; min-height: 52px; }
.row + .row { border-top: 1px solid #E9EAEF; }
.row-icon { width: 30px; height: 30px; border-radius: 8px; background: #7E53F8; display: flex; align-items: center; justify-content: center; margin-right: 14px; flex-shrink: 0; }
.row-icon.gray { background: #6D6D80; }
.row-icon.red { background: #D92C20; }
.row-icon svg { width: 16px; height: 16px; }
.row-label { font-size: 16px; color: #162233; font-weight: 500; flex: 1; line-height: 20px; }
.row-label.danger { color: #D92C20; }
.chevron { color: #C7C7CC; font-size: 18px; margin-left: 8px; line-height: 1; }
</style></head><body>
<div class="phone">
  <div class="navtitle">Settings</div>

  <div class="section-header">Account</div>
  <div class="group">
    <div class="row">
      <div class="row-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
      </div>
      <div class="row-label">Personal Information</div>
      <div class="chevron">›</div>
    </div>
    <div class="row">
      <div class="row-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      </div>
      <div class="row-label">Notifications</div>
      <div class="chevron">›</div>
    </div>
    <div class="row">
      <div class="row-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      </div>
      <div class="row-label">Edit my Profile</div>
      <div class="chevron">›</div>
    </div>
    <div class="row">
      <div class="row-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
      </div>
      <div class="row-label">Blocked profiles</div>
      <div class="chevron">›</div>
    </div>
  </div>

  <div class="section-header">Help &amp; Legal</div>
  <div class="group">
    <div class="row">
      <div class="row-icon gray">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 1 1 5.8 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <div class="row-label">Help Center</div>
    </div>
    <div class="row">
      <div class="row-icon gray">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="row-label">Privacy Policy</div>
    </div>
  </div>

  <div class="section-header">&nbsp;</div>
  <div class="group">
    <div class="row">
      <div class="row-icon red">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      </div>
      <div class="row-label danger">Delete Account</div>
    </div>
    <div class="row">
      <div class="row-icon gray">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
      <div class="row-label">Log Out</div>
    </div>
  </div>
</div>
</body></html>
