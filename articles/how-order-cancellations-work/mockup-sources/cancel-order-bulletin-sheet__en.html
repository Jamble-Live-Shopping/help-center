<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>BLTNBoard cancel sheet (EN)</title><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: rgba(0,0,0,0.45); display: flex; justify-content: center; align-items: flex-end; padding: 12px; min-height: 100vh; }
.phone { width: 320px; background: transparent; border: none; box-shadow: none; }

.sheet { background: #FFFFFF; border-radius: 16px; padding: 28px 24px 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.18); }
.sheet-title { font-family: -apple-system, "SF Pro Display", system-ui; font-size: 24px; font-weight: 700; color: #000; text-align: center; margin-bottom: 16px; line-height: 28px; }
.sheet-desc { font-size: 16px; font-weight: 500; color: #000; text-align: center; line-height: 22px; margin-bottom: 24px; }
.btn-action { display: block; width: 100%; background: #FF3B5C; color: #FFFFFF; font-size: 16px; font-weight: 600; padding: 14px 16px; border: none; border-radius: 12px; margin-bottom: 12px; text-align: center; cursor: pointer; }
.btn-alt { display: block; width: 100%; background: transparent; color: #B07CFF; font-size: 16px; font-weight: 600; padding: 12px 16px; border: none; text-align: center; cursor: pointer; }
</style></head><body>
<div class="phone">
  <div class="sheet">
    <div class="sheet-title">Cancel this order</div>
    <div class="sheet-desc">Upon cancelation, This order will be closed and you will be refunded.</div>
    <button type="button" class="btn-action">Yes, I cancel</button>
    <button type="button" class="btn-alt">No, back</button>
  </div>
</div>
</body></html>
