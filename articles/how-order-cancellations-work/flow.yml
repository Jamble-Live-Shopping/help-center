mockup_plan:
  required: true
  screens:
    # Screen 1: order detail with Cancel Order button (status=Created)
    # iOS source: PurchaseViewController.swift:657-672
    # Button is text-only (no icon): red text, red border, transparent
    # background. Per rule 10e: text-only contract enforced.
    - name: order-detail-cancel-button
      purpose: "Show buyer where to find the Cancel Order button on a Created-status order"
      source: ios_required
      review_checks:
        - icons_match_ios_source
        - labels_match_xcstrings
        - no_invented_ui_state
      html_must_contain:
        pt-br:
          - "Cancelar pedido"
          - "Criado"
          - "Aguardando Confirmação do Vendedor"
        en:
          - "Cancel Order"
          - "Created"
          - "Awaiting Seller Confirmation"
      # Text-only anchor (rule 10e Option B): the iOS Cancel Order
      # button at PurchaseViewController.swift:657-672 is rendered with
      # plain UIButton text, no UIImage. All three icon-blockers
      # required to pass screen_icon_review_check_unanchored.
      html_must_not_contain:
        - "<img"
        - "<svg"
        - "icon-"

    # Screen 2: BLTNBoard cancel-confirmation sheet
    # iOS source: PurchaseViewController.swift:1068-1137
    # Sheet has title, description, two text buttons - no icons.
    - name: cancel-order-bulletin-sheet
      purpose: "Show the BLTNBoard cancel-confirmation sheet that appears when the buyer taps Cancel Order"
      source: ios_required
      review_checks:
        - icons_match_ios_source
        - labels_match_xcstrings
        - no_invented_ui_state
      html_must_contain:
        pt-br:
          - "Cancelar este pedido"
          - "Após o cancelamento, esse pedido será fechado e você será reembolsado."
          - "Sim, eu cancelo"
          - "Não, voltar"
        en:
          - "Cancel this order"
          - "Upon cancelation, This order will be closed and you will be refunded."
          - "Yes, I cancel"
          - "No, back"
      html_must_not_contain:
        - "<img"
        - "<svg"
        - "icon-"

    # Screen 3: order detail after cancellation (status=Canceled, refund pending)
    # iOS source: PurchaseViewController status banner using buyerStatusInfos
    # backend: transaction.py:418 (status="Canceled"/"Cancelado")
    # backend: transaction.py:622-625 (description with 5 business days)
    - name: order-canceled-refund-status
      purpose: "Show the order-detail status banner after cancellation, communicating refund timing"
      source: ios_required
      review_checks:
        - icons_match_ios_source
        - labels_match_xcstrings
        - no_invented_ui_state
      html_must_contain:
        pt-br:
          - "Cancelado"
          - "5 dias úteis"
        en:
          - "Canceled"
          - "5 business days"
      html_must_not_contain:
        - "<img"
        - "<svg"
        - "icon-"

