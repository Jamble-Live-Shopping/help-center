workflow: article-v2
mode: v2_rewrite
audience: buyer_br
job_to_be_done: "Explain when and how a buyer can cancel an order on Jamble, what triggers an automatic cancellation, and refund timing"

source_of_truth:
  ios_files:
    - TRANSACTION/Purchase/View/PurchaseViewController.swift:657-672
    - TRANSACTION/Purchase/View/PurchaseViewController.swift:1068-1137
  backend_files:
