<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
  padding-bottom: 10px;
}
.nav {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 14px 16px 12px;
  gap: 10px;
  border-bottom: 1px solid #F0F1F5;
}
.nav-back { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #162233; font-size: 22px; }
.nav-title { font-size: 17px; font-weight: 600; color: #162233; }
.list {
  margin: 12px 14px 6px;
  border: 1px solid #E9EAEF;
  border-radius: 14px;
  overflow: hidden;
  background: #FFFFFF;
}
.row {
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  border-bottom: 1px solid #F0F1F5;
}
.row:last-child { border-bottom: none; }
.row-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.row-id {
  font-size: 15px;
  font-weight: 600;
  color: #162233;
  letter-spacing: -0.01em;
}
.row-amount {
  font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: #162233;
}
.row-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.status {
  font-size: 13px;
  font-weight: 600;
}
.status.completed { color: #17B169; }
.status.failed { color: #D92C20; }
.status.pending { color: #7E53F8; }
.row-date {
  font-size: 13px;
  color: #6D6D80;
}
.fail-reason {
  font-size: 12px;
  color: #D92C20;
  margin-top: 2px;
}
</style></head><body>
<div class="phone">
  <div class="nav">
    <div class="nav-back">&lsaquo;</div>
    <div class="nav-title">Histórico de pagamentos</div>
  </div>
  <div class="list">
    <div class="row">
      <div class="row-top">
        <div class="row-id">#PAY-12345</div>
        <div class="row-amount">R$ 350,00</div>
      </div>
      <div class="row-bottom">
        <div class="status completed">Concluído</div>
        <div class="row-date">19/03/2026</div>
      </div>
    </div>
    <div class="row">
      <div class="row-top">
        <div class="row-id">#PAY-12340</div>
        <div class="row-amount">R$ 520,00</div>
      </div>
      <div class="row-bottom">
        <div class="status completed">Concluído</div>
        <div class="row-date">15/03/2026</div>
      </div>
    </div>
    <div class="row">
      <div class="row-top">
        <div class="row-id">#PAY-12335</div>
        <div class="row-amount">R$ 180,00</div>
      </div>
      <div class="row-bottom">
        <div class="status pending">Processamento</div>
        <div class="row-date">10/03/2026</div>
      </div>
    </div>
    <div class="row">
      <div class="row-top">
        <div class="row-id">#PAY-12330</div>
        <div class="row-amount">R$ 95,00</div>
      </div>
      <div class="row-bottom">
        <div class="status failed">Fracassada</div>
        <div class="row-date">08/03/2026</div>
      </div>
      <div class="fail-reason">Invalid bank account details</div>
    </div>
  </div>
</div>
</body></html>
