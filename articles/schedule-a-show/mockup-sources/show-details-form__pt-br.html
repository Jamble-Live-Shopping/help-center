<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #0E0E10; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #1F1F23; overflow: hidden; min-height: 720px; padding-bottom: 22px; }
.statusbar { display: flex; justify-content: space-between; align-items: center; padding: 14px 22px 6px; color: #FFFFFF; font-size: 13px; font-weight: 600; letter-spacing: 0.2px; }
.statusbar-right { display: flex; align-items: center; gap: 4px; }
.statusbar-right span { width: 4px; height: 4px; background: #FFFFFF; border-radius: 50%; opacity: 0.92; }
.step-row { display: flex; gap: 6px; padding: 18px 22px 10px; }
.step-bar { flex: 1; height: 3px; border-radius: 2px; background: #2A2A2E; }
.step-bar.active { background: #FFFFFF; }
.step-label { padding: 0 22px; font-size: 12px; color: #8E8E93; letter-spacing: 0.5px; text-transform: uppercase; }
.section-header { padding: 16px 22px 6px; display: flex; justify-content: space-between; align-items: baseline; color: #FFFFFF; font-size: 13px; font-weight: 500; letter-spacing: 0.4px; }
.section-header .opt { color: #8E8E93; font-weight: 400; font-size: 12px; }
.text-area { margin: 0 22px; background: #181818; border-radius: 12px; padding: 14px 16px; color: #6B6B70; font-size: 15px; min-height: 52px; }
.notes-area { margin: 0 22px; background: #181818; border-radius: 12px; padding: 14px 16px; color: #6B6B70; font-size: 15px; min-height: 52px; }
.date-row { margin: 0 22px; background: #181818; border-radius: 10px; padding: 16px; display: flex; align-items: center; gap: 8px; color: #FFFFFF; font-size: 16px; }
.date-row .ico { width: 21px; height: 22px; flex-shrink: 0; display: inline-block; }
.repeat-card { margin: 8px 22px 0; background: #181818; border-radius: 12px; padding: 14px 16px; }
.repeat-row { display: flex; align-items: center; justify-content: space-between; color: #FFFFFF; font-size: 15px; }
.toggle { width: 44px; height: 26px; background: #4D4D52; border-radius: 13px; position: relative; }
.toggle::after { content: ""; position: absolute; top: 2px; left: 2px; width: 22px; height: 22px; background: #FFFFFF; border-radius: 50%; }
.repeat-row.opacity { opacity: 0.55; }
</style></head><body><div class="phone">
<div class="statusbar"><div>9:41</div><div class="statusbar-right"><span></span><span></span><span></span></div></div>
<div class="step-row"><div class="step-bar active"></div><div class="step-bar active"></div><div class="step-bar active"></div><div class="step-bar active"></div></div>

<div class="section-header"><span>DESCRIÇÃO</span><span class="opt">opcional</span></div>
<div class="text-area">Descreva sua Live aqui</div>

<div class="notes-area">Observações adicionais</div>
