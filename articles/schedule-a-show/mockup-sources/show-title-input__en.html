<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #0E0E10; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #1F1F23; overflow: hidden; min-height: 420px; }
.statusbar { display: flex; justify-content: space-between; align-items: center; padding: 14px 22px 6px; color: #FFFFFF; font-size: 13px; font-weight: 600; letter-spacing: 0.2px; }
.statusbar-right { display: flex; align-items: center; gap: 4px; }
.statusbar-right span { width: 4px; height: 4px; background: #FFFFFF; border-radius: 50%; opacity: 0.92; }
.step-row { display: flex; gap: 6px; padding: 18px 22px 10px; }
.step-bar { flex: 1; height: 3px; border-radius: 2px; background: #2A2A2E; }
.step-bar.active { background: #FFFFFF; }
.step-label { padding: 0 22px; font-size: 12px; color: #8E8E93; letter-spacing: 0.5px; text-transform: uppercase; }
.title-area { padding: 64px 22px 32px; }
.placeholder { color: #4A4A50; font-size: 28px; font-weight: 600; text-align: center; letter-spacing: -0.4px; }
.cursor { display: inline-block; width: 2px; height: 28px; background: #FFFFFF; vertical-align: middle; animation: blink 1s steps(2) infinite; }
@keyframes blink { 50% { opacity: 0; } }
.next-pill { margin: 56px auto 22px; width: 200px; height: 52px; background: #FFFFFF; border-radius: 26px; display: flex; align-items: center; justify-content: center; gap: 8px; color: #162233; font-size: 16px; font-weight: 600; }
.chevron { color: #162233; font-weight: 700; font-size: 18px; line-height: 1; }
</style></head><body><div class="phone">
<div class="statusbar"><div>9:41</div><div class="statusbar-right"><span></span><span></span><span></span></div></div>
<div class="step-row"><div class="step-bar active"></div><div class="step-bar"></div><div class="step-bar"></div><div class="step-bar"></div></div>
<div class="step-label">Step 1 of 4</div>
<div class="title-area"><div class="placeholder">Type your show title<span class="cursor"></span></div></div>
<div class="next-pill"><span>Next</span><span class="chevron">&rsaquo;</span></div>
</div></body></html>
