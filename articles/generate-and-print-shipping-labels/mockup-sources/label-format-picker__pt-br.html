<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 16px 0 14px; }

.section-title { font-size: 12px; font-weight: 600; color: #6D6D80; text-transform: uppercase; letter-spacing: 0.4px; padding: 4px 20px 12px; }

.format-cell { display: flex; align-items: center; gap: 12px; padding: 12px 20px; }
.format-icon { width: 40px; height: 40px; border-radius: 8px; background: #F3F4F8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.format-content { flex: 1; min-width: 0; }
.format-title { font-size: 15px; font-weight: 600; color: #162233; line-height: 20px; }
.format-sub { font-size: 12px; color: #6D6D80; line-height: 16px; margin-top: 2px; }
.radio { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #BDC2CD; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.format-cell.on .radio { border-color: #162233; }
.radio-dot { width: 10px; height: 10px; border-radius: 50%; background: #162233; display: none; }
.format-cell.on .radio-dot { display: block; }
.divider { height: 0.5px; background: #E9EAEF; margin: 0 20px; }

.cta { margin: 14px 20px 4px; width: calc(100% - 40px); background: #7E53F8; color: #FFFFFF; border: none; height: 48px; border-radius: 24px; font-size: 16px; font-weight: 600; font-family: inherit; display: flex; align-items: center; justify-content: center; }
</style></head><body>
<div class="phone">
  <div class="section-title">Selecione o formato de sua etiqueta de remessa (PDF)</div>

  <div class="format-cell on">
    <div class="format-icon">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="3" width="14" height="16" rx="1.5" stroke="#162233" stroke-width="1.5"/>
        <line x1="4" y1="11" x2="18" y2="11" stroke="#162233" stroke-width="1.2" stroke-dasharray="2 2"/>
        <rect x="6.5" y="13.5" width="9" height="3.5" rx="0.5" fill="#162233"/>
      </svg>
    </div>
    <div class="format-content">
      <div class="format-title">Meia página (8,5 x 11)</div>
      <div class="format-sub">Imprima em papel comum e recorte</div>
    </div>
    <div class="radio"><div class="radio-dot"></div></div>
  </div>
  <div class="divider"></div>

  <div class="format-cell">
    <div class="format-icon">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="3" width="14" height="16" rx="1.5" stroke="#162233" stroke-width="1.5"/>
        <rect x="6.5" y="6" width="9" height="1.2" fill="#162233"/>
        <rect x="6.5" y="9" width="9" height="1.2" fill="#162233"/>
        <rect x="6.5" y="12" width="9" height="3.5" rx="0.5" fill="#162233"/>
      </svg>
    </div>
    <div class="format-content">
      <div class="format-title">Página inteira (8,5 x 11)</div>
      <div class="format-sub">Papel comum, sem precisar recortar</div>
    </div>
    <div class="radio"><div class="radio-dot"></div></div>
  </div>
  <div class="divider"></div>

  <div class="format-cell">
    <div class="format-icon">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2.5" y="6" width="17" height="10" rx="1.5" stroke="#162233" stroke-width="1.5"/>
        <rect x="5" y="8.5" width="12" height="1.2" fill="#162233"/>
        <rect x="5" y="11" width="12" height="3" rx="0.4" fill="#162233"/>
      </svg>
    </div>
    <div class="format-content">
      <div class="format-title">Térmica (4 x 6)</div>
      <div class="format-sub">Impressora térmica, descole e cole</div>
    </div>
    <div class="radio"><div class="radio-dot"></div></div>
  </div>

  <button class="cta">Salvar</button>
</div>
</body></html>
