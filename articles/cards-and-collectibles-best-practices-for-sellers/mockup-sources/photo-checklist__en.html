<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 12px; }

.nav { padding: 14px 16px 8px; }
.nav-title { font-size: 16px; font-weight: 600; color: #162233; text-align: center; }

.col-head { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px 12px 6px; }
.col-label { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; font-weight: 700; padding: 6px 8px; border-radius: 8px; letter-spacing: 0.3px; text-transform: uppercase; }
.col-good { background: #E8F8F0; color: #1B8A4F; }
.col-bad { background: #FBE3E3; color: #B12B2B; }
.tick { width: 12px; height: 12px; border-radius: 50%; background: #1B8A4F; color: white; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
.cross { width: 12px; height: 12px; border-radius: 50%; background: #B12B2B; color: white; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 12px 8px; }
.cell { aspect-ratio: 1; border-radius: 10px; overflow: hidden; position: relative; }

/* GOOD: portrait card centered on dark bg, sharp edges, gentle highlight */
.cell-good-1 { background: radial-gradient(ellipse at center, #1F2A3B 0%, #0E1623 100%); display: flex; align-items: center; justify-content: center; }
.cell-good-1 .card-shape { width: 44%; height: 70%; border-radius: 6px; background: linear-gradient(160deg, #C7B6FF 0%, #7E53F8 55%, #5A38C8 100%); box-shadow: 0 2px 6px rgba(0,0,0,0.45), inset 0 0 0 1.5px rgba(255,255,255,0.18); position: relative; }
.cell-good-1 .card-shape::after { content: ""; position: absolute; inset: 8px 8px auto 8px; height: 38%; border-radius: 3px; background: rgba(255,255,255,0.10); }

/* GOOD 2: card in toploader, back visible, lit evenly */
.cell-good-2 { background: radial-gradient(ellipse at center, #1F2A3B 0%, #0E1623 100%); display: flex; align-items: center; justify-content: center; }
.cell-good-2 .toploader { width: 56%; height: 78%; border-radius: 4px; background: rgba(255,255,255,0.06); box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.35); display: flex; align-items: center; justify-content: center; padding: 4px; }
.cell-good-2 .toploader .card-back { width: 100%; height: 100%; border-radius: 3px; background: linear-gradient(140deg, #2D5BD7 0%, #162233 100%); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.10); }

/* BAD 1: glare hotspot, blown highlights on foil */
.cell-bad-1 { background: linear-gradient(135deg, #2A2438 0%, #1A2230 60%, #0E1623 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.cell-bad-1 .card-shape { width: 44%; height: 70%; border-radius: 6px; background: linear-gradient(160deg, #C7B6FF 0%, #7E53F8 55%, #5A38C8 100%); position: relative; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.45); }
.cell-bad-1 .glare { position: absolute; top: -40%; left: -10%; width: 140%; height: 180%; background: linear-gradient(115deg, transparent 38%, rgba(255,255,255,0.92) 48%, rgba(255,255,255,0.98) 52%, transparent 62%); transform: rotate(-12deg); pointer-events: none; }

/* BAD 2: out of focus, off-center */
.cell-bad-2 { background: linear-gradient(180deg, #DDDDDD 0%, #888888 100%); display: flex; align-items: center; justify-content: flex-start; padding: 22% 0 0 16%; }
.cell-bad-2 .blur-card { width: 50%; height: 64%; border-radius: 6px; background: linear-gradient(160deg, rgba(126,83,248,0.55) 0%, rgba(90,56,200,0.65) 100%); transform: rotate(-8deg); filter: blur(3px); box-shadow: 0 4px 14px rgba(0,0,0,0.35); }

.cap { padding: 4px 8px; font-size: 11px; color: #6B7A92; text-align: center; line-height: 14px; min-height: 30px; }
.cap-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 12px; }
</style></head><body><div class="phone">

<div class="nav"><div class="nav-title">Photos: good vs bad</div></div>

<div class="col-head">
<div class="col-label col-good"><span class="tick">&#10003;</span> Do</div>
<div class="col-label col-bad"><span class="cross">&times;</span> Avoid</div>
</div>

<div class="grid">
<div class="cell cell-good-1"><div class="card-shape"></div></div>
<div class="cell cell-bad-1"><div class="card-shape"></div><div class="glare"></div></div>
</div>
<div class="cap-row">
<div class="cap">Plain dark background, sharp focus</div>
<div class="cap">Camera flash hotspot on foil</div>
</div>

<div class="grid" style="margin-top: 4px;">
<div class="cell cell-good-2"><div class="toploader"><div class="card-back"></div></div></div>
<div class="cell cell-bad-2"><div class="blur-card"></div></div>
</div>
<div class="cap-row">
<div class="cap">Card back and toploader visible</div>
<div class="cap">Out of focus, off-center</div>
</div>

</div></body></html>
