<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
  padding: 0 0 16px;
}
.nav { padding: 16px 18px 14px; border-bottom: 1px solid #F1F2F5; }
.nav-title { font-size: 22px; font-weight: 700; color: #162233; letter-spacing: -0.4px; }
.section { padding: 0 16px; }
.row { display: flex; align-items: center; gap: 12px; padding: 14px 4px; border-bottom: 1px solid #F1F2F5; }
.section:last-child .row:last-child { border-bottom: none; }
.row-text { flex: 1; }
.row-title { font-size: 15px; font-weight: 600; color: #162233; }
.row-sub { font-size: 12px; color: #6D6D80; margin-top: 3px; line-height: 16px; }
.toggle { width: 42px; height: 26px; border-radius: 13px; padding: 2px; flex-shrink: 0; transition: background 0.15s; }
.toggle.on { background: #7E53F8; display: flex; justify-content: flex-end; }
.toggle.off { background: #D8D9DF; display: flex; justify-content: flex-start; }
.toggle-knob { width: 22px; height: 22px; border-radius: 50%; background: #FFFFFF; box-shadow: 0 1px 4px rgba(0,0,0,0.18); }
.chevron { font-size: 14px; color: #B5B6BF; padding-left: 4px; }
</style></head><body>
<div class="phone">
  <div class="nav"><div class="nav-title">Notificações</div></div>
  <div class="section">
    <div class="row">
      <div class="row-text">
        <div class="row-title">Promotional</div>
        <div class="row-sub">Avisos sobre ofertas e promoções da Jamble</div>
      </div>
      <div class="toggle off"><div class="toggle-knob"></div></div>
      <div class="chevron">›</div>
    </div>
    <div class="row">
      <div class="row-text">
        <div class="row-title">Activity</div>
        <div class="row-sub">Seguidores novos, mensagens, curtidas</div>
      </div>
      <div class="toggle on"><div class="toggle-knob"></div></div>
      <div class="chevron">›</div>
    </div>
    <div class="row">
      <div class="row-text">
        <div class="row-title">Live Shows</div>
        <div class="row-sub">Shows recomendados, programas marcados, produtos marcados em show</div>
      </div>
      <div class="toggle on"><div class="toggle-knob"></div></div>
      <div class="chevron">›</div>
    </div>
    <div class="row">
      <div class="row-text">
        <div class="row-title">Transactions</div>
        <div class="row-sub">Atualizações sobre seus pedidos e suas vendas</div>
      </div>
      <div class="toggle on"><div class="toggle-knob"></div></div>
      <div class="chevron">›</div>
    </div>
  </div>
</div></body></html>
