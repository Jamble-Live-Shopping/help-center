<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F2F3F7;
  display: flex;
  justify-content: center;
  padding: 16px;
}
.phone {
  width: 340px;
  height: 460px;
  border-radius: 28px;
  overflow: hidden;
  position: relative;
  background: linear-gradient(165deg, #1B1530 0%, #2D2546 50%, #4A3B6B 100%);
  box-shadow: 0 6px 30px rgba(22,34,51,0.18);
  border: 1px solid #1B1530;
}
.phone::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 35% 30%, rgba(255,255,255,0.16) 0%, transparent 50%);
}
.overlay {
  position: absolute;
  top: 16px;
  left: 16px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  z-index: 2;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.overlay-title {
  color: #FFFFFF;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: 0.1px;
}
.overlay-row { display: flex; align-items: baseline; gap: 6px; }
.overlay-total {
  color: #FFFFFF;
  font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 30px;
}
.overlay-avg {
  color: #DCD6EE;
  font-size: 12px;
  font-weight: 500;
}
.live-badge {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(0,0,0,0.42);
  color: #FFFFFF;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.6px;
  padding: 5px 10px;
  border-radius: 12px;
}
.center-faux-product {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 130px;
  height: 180px;
  border-radius: 12px;
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(2px);
}
</style></head><body>
<div class="phone">
  <div class="overlay">
    <div class="overlay-title">Real-Time Sales</div>
    <div class="overlay-row">
      <div class="overlay-total">$1,240</div>
      <div class="overlay-avg">$155/item</div>
    </div>
  </div>
  <div class="live-badge">LIVE</div>
  <div class="center-faux-product"></div>
</div></body></html>
