<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F2F3F7;
  display: flex;
  justify-content: center;
  padding: 16px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
  padding-bottom: 28px;
}
.nav { display: flex; align-items: center; justify-content: center; padding: 16px 16px 12px; border-bottom: 1px solid #F0F1F5; }
.nav-title { font-size: 17px; font-weight: 600; color: #162233; }
.card { margin: 22px 16px 16px; padding: 22px 22px 20px; border: 1px solid #E9EAEF; border-radius: 14px; }
.card-label { font-size: 14px; font-weight: 500; color: #6D6D80; }
.card-amount { font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; font-size: 36px; font-weight: 600; color: #162233; letter-spacing: -0.02em; margin: 8px 0 18px; }
.btn-withdraw { height: 46px; border-radius: 23px; background: #7E53F8; color: #FFFFFF; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
.history-row { margin: 16px 16px 0; padding: 14px 18px; border: 1px solid #E9EAEF; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
.history-label { font-size: 14px; color: #162233; font-weight: 500; }
.history-amount { font-size: 14px; color: #6D6D80; }
</style></head><body>
<div class="phone">
  <div class="nav"><div class="nav-title">Minha carteira</div></div>
  <div class="card">
    <div class="card-label">Saldo disponivel</div>
    <div class="card-amount">R$ 1.250,00</div>
    <div class="btn-withdraw">Sacar</div>
  </div>
  <div class="history-row">
    <div class="history-label">Saque anterior</div>
    <div class="history-amount">R$ 820,00</div>
  </div>
</div></body></html>
