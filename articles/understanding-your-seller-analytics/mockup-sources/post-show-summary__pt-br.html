<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F2F3F7;
  display: flex;
  justify-content: center;
  padding: 16px;
}
.phone {
  width: 340px;
  background: #F2F3F7;
  padding: 18px 16px 22px;
  border-radius: 24px;
  border: 1px solid #E9EAEF;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
}
.section-label { font-size: 14px; font-weight: 600; color: #6D6D80; letter-spacing: 0.4px; margin-bottom: 8px; }
.summary-card {
  background: #FFFFFF;
  border-radius: 16px;
  padding: 18px 20px;
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  gap: 6px;
}
.tile { display: flex; flex-direction: column; align-items: flex-start; flex: 1; min-width: 0; }
.tile-value { font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; font-size: 18px; font-weight: 700; color: #162233; letter-spacing: -0.02em; line-height: 22px; white-space: nowrap; }
.tile-value.money { font-size: 14px; }
.tile-label { font-size: 11px; font-weight: 600; color: #6D6D80; letter-spacing: 0.6px; margin-top: 6px; white-space: nowrap; }
.spacer { flex: 0 0 1px; background: transparent; align-self: stretch; }
</style></head><body>
<div class="phone">
  <div class="section-label">RESUMO</div>
  <div class="summary-card">
    <div class="tile">
      <div class="tile-value money">R$1.840</div>
      <div class="tile-label">TOTAL</div>
    </div>
    <div class="tile">
      <div class="tile-value money">R$1.582</div>
      <div class="tile-label">AFTER FEES</div>
    </div>
    <div class="tile">
      <div class="tile-value">12</div>
      <div class="tile-label">SOLD</div>
    </div>
    <div class="tile">
      <div class="tile-value">7</div>
      <div class="tile-label">BUYERS</div>
    </div>
  </div>
</div></body></html>
