<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.grid-title { font-size: 13px; font-weight: 600; color: #A0A7B7; text-transform: uppercase; padding: 16px 20px 10px; letter-spacing: 0.5px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 16px 20px; }
.slot { aspect-ratio: 1; border-radius: 8px; position: relative; overflow: hidden; }
.slot.add { background: transparent; border: 1.5px dashed #C7C7CC; display: flex; align-items: center; justify-content: center; }
.slot .plus { font-size: 22px; color: #C7C7CC; font-weight: 300; }
.badge { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: #7E53F8; color: white; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; z-index: 2; }
/* Slot 1: Pokemon card - front */
.s1 { background: linear-gradient(135deg, #F9D648 0%, #E8B533 100%); display: flex; align-items: center; justify-content: center; }
.s1-inner { width: 70%; height: 82%; background: linear-gradient(160deg, #FFF4B8 0%, #FFE680 100%); border-radius: 3px; border: 1.2px solid #C99A22; position: relative; }
.s1-win { position: absolute; top: 18%; left: 15%; right: 15%; bottom: 35%; background: #7B4D2C; border-radius: 2px; border: 1px solid #5D3A20; }
.s1-bar { position: absolute; top: 6%; left: 10%; right: 10%; height: 6%; background: rgba(0,0,0,0.15); border-radius: 1px; }
.s1-hp { position: absolute; top: 5%; right: 9%; width: 20%; height: 9%; background: #E84545; border-radius: 2px; }
/* Slot 2: Pokemon card - back holographic */
.s2 { background: linear-gradient(135deg, #2B3F8F 0%, #1E2B66 100%); display: flex; align-items: center; justify-content: center; }
.s2-inner { width: 62%; height: 78%; background: radial-gradient(circle at 30% 30%, #7A5FD8 0%, #4332A8 50%, #2B1F7F 100%); border-radius: 3px; border: 1.2px solid #1A1352; position: relative; }
.s2-logo { position: absolute; top: 38%; left: 25%; right: 25%; height: 24%; background: rgba(255,220,100,0.85); border-radius: 2px; }
/* Slot 3: Card in sleeve close-up */
.s3 { background: #E9EAEF; display: flex; align-items: center; justify-content: center; position: relative; }
.s3-card { width: 70%; height: 84%; background: linear-gradient(160deg, #FFFFFF 0%, #EEF2F8 100%); border-radius: 2px; border: 2px solid #1A2942; position: relative; box-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
.s3-grade { position: absolute; top: 5%; left: 8%; right: 8%; height: 18%; background: #D92C20; border-radius: 1px; display: flex; align-items: center; justify-content: center; color: white; font-size: 7px; font-weight: 800; letter-spacing: 0.5px; }
.s3-img { position: absolute; top: 28%; left: 10%; right: 10%; bottom: 35%; background: linear-gradient(160deg, #F9D648 0%, #C99A22 100%); border-radius: 1px; }
</style></head><body><div class="phone"><div class="grid-title">Selecione fotos</div><div class="grid">
<div class="slot s1"><div class="badge">1</div><div class="s1-inner"><div class="s1-bar"></div><div class="s1-hp"></div><div class="s1-win"></div></div></div>
<div class="slot s2"><div class="badge">2</div><div class="s2-inner"><div class="s2-logo"></div></div></div>
<div class="slot s3"><div class="badge">3</div><div class="s3-card"><div class="s3-grade">PSA 10</div><div class="s3-img"></div></div></div>
<div class="slot add"><div class="plus">+</div></div>
<div class="slot add"><div class="plus">+</div></div>
<div class="slot add"><div class="plus">+</div></div>
<div class="slot add"><div class="plus">+</div></div>
<div class="slot add"><div class="plus">+</div></div>
</div></div></body></html>
