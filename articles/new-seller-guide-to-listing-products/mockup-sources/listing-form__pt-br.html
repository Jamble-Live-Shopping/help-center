<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-bottom: 16px; }
.section-title { font-size: 13px; font-weight: 600; color: #A0A7B7; text-transform: uppercase; padding: 16px 20px 8px; letter-spacing: 0.5px; }
.field { margin: 0 16px 10px; padding: 12px 14px; background: #F9FAFC; border: 1px solid #E9EAEF; border-radius: 12px; }
.field-label { font-size: 12px; font-weight: 500; color: #6B7A92; margin-bottom: 4px; }
.field-value { font-size: 16px; color: #162233; font-weight: 500; line-height: 22px; }
.field-value.placeholder { color: #A0A7B7; font-weight: 400; }
.row { display: flex; gap: 8px; margin: 0 16px 10px; }
.row .field { flex: 1; margin: 0; }
.counter { font-size: 11px; color: #A0A7B7; margin-left: auto; }
.label-row { display: flex; align-items: center; }
.chevron { color: #A0A7B7; font-size: 18px; }
.value-row { display: flex; align-items: center; justify-content: space-between; }
.tag { display: inline-block; padding: 2px 8px; background: #EFE9FF; color: #7E53F8; border-radius: 10px; font-size: 11px; font-weight: 600; }
</style></head><body><div class="phone">
<div class="section-title">Detalhes do produto</div>
<div class="field">
  <div class="label-row"><div class="field-label">Título</div><div class="counter">38 / 60</div></div>
  <div class="field-value">Charizard VMAX Holo PT-BR</div>
</div>
<div class="row">
  <div class="field">
    <div class="field-label">Preço</div>
    <div class="value-row"><div class="field-value">R$ 450,00</div></div>
  </div>
  <div class="field">
    <div class="field-label">Condição</div>
    <div class="value-row"><div class="field-value">Muito bom</div><div class="chevron">›</div></div>
  </div>
</div>
<div class="field">
  <div class="label-row"><div class="field-label">Descrição</div><div class="counter">62 / 120</div></div>
  <div class="field-value">Carta rara holográfica. Sem riscos, canto superior com marca leve.</div>
</div>
<div class="field">
  <div class="field-label">Categoria</div>
  <div class="value-row"><div class="field-value">Trading Cards › Pokémon TCG</div><div class="chevron">›</div></div>
</div>
</div></body></html>
