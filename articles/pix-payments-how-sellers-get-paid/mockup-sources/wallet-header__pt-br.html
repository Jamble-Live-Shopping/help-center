<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; padding: 14px 0 20px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.nav { display: flex; align-items: center; padding: 10px 18px 14px; border-bottom: 1px solid #F0F1F5; }
.nav-back { font-size: 22px; color: #162233; width: 28px; }
.nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 700; color: #162233; }
.nav-icons { display: flex; gap: 8px; }
.icon-btn { width: 32px; height: 32px; border-radius: 50%; background: #F3F4F8; display: flex; align-items: center; justify-content: center; color: #162233; }
.icon-btn svg { width: 16px; height: 16px; stroke: #162233; fill: none; stroke-width: 2; }
.body { padding: 20px 18px; }
.intro-title { font-size: 18px; font-weight: 700; color: #162233; margin-bottom: 6px; }
.intro-msg { font-size: 13px; color: #6D6D80; line-height: 18px; margin-bottom: 16px; }
.btn { height: 48px; border-radius: 24px; background: #7E53F8; color: white; font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
</style></head><body>
<div class="phone">
  <div class="nav">
    <div class="nav-back">‹</div>
    <div class="nav-title">Minha carteira</div>
    <div class="nav-icons">
      <div class="icon-btn"><svg viewBox="0 0 24 24" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
      <div class="icon-btn"><svg viewBox="0 0 24 24" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 5 0c0 2-2.5 2-2.5 4"/><circle cx="12" cy="17" r="0.8" fill="#162233"/></svg></div>
    </div>
  </div>
  <div class="body">
    <div class="intro-title">Cadastre sua conta bancária</div>
    <div class="intro-msg">Primeiro, você precisa verificar sua identidade e dados bancários. O Jamble utiliza a tecnologia da Pagar.me para transações seguras.</div>
    <div class="btn">Cadastrar banco</div>
  </div>
</div>
</body></html>
