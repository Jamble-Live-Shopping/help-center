<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; padding: 14px 0 16px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.nav { display: flex; align-items: center; padding: 10px 18px 14px; border-bottom: 1px solid #F0F1F5; }
.nav-back { font-size: 22px; color: #162233; width: 28px; }
.nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 700; color: #162233; }
.nav-icons { display: flex; gap: 8px; }
.icon-btn { width: 32px; height: 32px; border-radius: 50%; background: #F3F4F8; display: flex; align-items: center; justify-content: center; }
.icon-btn svg { width: 16px; height: 16px; stroke: #162233; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.card { margin: 16px 12px 12px; border: 1px solid #E9EAEF; border-radius: 14px; padding: 18px; }
.card-label { font-size: 14px; font-weight: 600; color: #162233; margin-bottom: 6px; }
.card-amount { font-size: 34px; font-weight: 700; color: #162233; font-variant-numeric: tabular-nums; margin-bottom: 14px; letter-spacing: -0.5px; }
.btn { height: 48px; border-radius: 24px; background: #7E53F8; color: white; font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
.pending { margin: 0 12px; border: 1px solid #E9EAEF; border-radius: 14px; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
.pending-label { font-size: 15px; color: #6D6D80; }
.pending-amount { font-size: 16px; font-weight: 700; color: #162233; font-variant-numeric: tabular-nums; }
</style></head><body>
<div class="phone">
  <div class="nav">
    <div class="nav-back">‹</div>
    <div class="nav-title">My Wallet</div>
    <div class="nav-icons">
      <div class="icon-btn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
      <div class="icon-btn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 5 0c0 2-2.5 2-2.5 4"/><circle cx="12" cy="17" r="0.8" fill="#162233" stroke="none"/></svg></div>
    </div>
  </div>
  <div class="card">
    <div class="card-label">Available</div>
    <div class="card-amount">$250.00</div>
    <div class="btn">Withdraw</div>
  </div>
  <div class="pending">
    <div class="pending-label">Pending</div>
    <div class="pending-amount">$120.00</div>
  </div>
</div>
</body></html>
