<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<!-- icon: icon-camera-add from Assets.xcassets/icon-camera-add.imageset -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #1A1F2E; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 18px 0 12px; color: #FFFFFF; min-height: 520px; }
.handle { width: 40px; height: 4px; background: #6B7A92; border-radius: 2px; margin: 0 auto 16px; opacity: 0.5; }
.title { font-size: 18px; font-weight: 700; color: #FFFFFF; padding: 0 20px; margin-bottom: 14px; letter-spacing: -0.4px; }
.searchbar { margin: 0 20px 18px; background: #2B3142; border-radius: 10px; padding: 9px 12px; display: flex; align-items: center; gap: 8px; font-size: 14px; color: #6B7A92; }
.searchbar .mag { width: 14px; height: 14px; border: 1.6px solid #6B7A92; border-radius: 50%; position: relative; flex-shrink: 0; }
.searchbar .mag::after { content: ""; position: absolute; right: -5px; bottom: -5px; width: 6px; height: 1.6px; background: #6B7A92; transform: rotate(45deg); }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px 16px; padding: 0 20px 20px; }
.viewer { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.av { width: 64px; height: 64px; border-radius: 50%; background: #2B3142; position: relative; overflow: hidden; }
.av.selected { box-shadow: 0 0 0 3px #7E53F8; }
.av .face { position: absolute; inset: 0; background: linear-gradient(135deg, var(--c1), var(--c2)); }
.av .ini { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #FFFFFF; opacity: 0.85; }
.uname { font-size: 12px; font-weight: 500; color: #C7CAD3; text-align: center; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sep { height: 0.5px; background: #2B3142; margin: 6px 0 12px; }
.cta-wrap { padding: 0 16px 8px; }
.cta { width: 100%; height: 48px; background: #7E53F8; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: #FFFFFF; gap: 8px; }
.cta svg { width: 18px; height: 18px; color: #FFFFFF; }
</style></head><body>
<div class="phone">
  <div class="handle"></div>
  <div class="title">Invite for a Duo</div>
  <div class="searchbar"><span class="mag"></span><span>Search</span></div>
  <div class="grid">
    <div class="viewer"><div class="av selected" style="--c1:#7E53F8;--c2:#5C2BCC;"><div class="face"></div><div class="ini">A</div></div><div class="uname">@ana_cards</div></div>
    <div class="viewer"><div class="av" style="--c1:#FF7E53;--c2:#E84B00;"><div class="face"></div><div class="ini">B</div></div><div class="uname">@bru_pkmn</div></div>
    <div class="viewer"><div class="av" style="--c1:#34C759;--c2:#1F8A40;"><div class="face"></div><div class="ini">C</div></div><div class="uname">@col_diecast</div></div>
    <div class="viewer"><div class="av" style="--c1:#5AC8FA;--c2:#0064B0;"><div class="face"></div><div class="ini">D</div></div><div class="uname">@duda_tcg</div></div>
    <div class="viewer"><div class="av" style="--c1:#FFD60A;--c2:#C49A00;"><div class="face"></div><div class="ini">E</div></div><div class="uname">@evan_hot</div></div>
    <div class="viewer"><div class="av" style="--c1:#FF2D55;--c2:#A00033;"><div class="face"></div><div class="ini">F</div></div><div class="uname">@fer_cards</div></div>
  </div>
  <div class="sep"></div>
  <div class="cta-wrap">
    <div class="cta">
      <span>Invite your friend</span>
      <svg alt="icon-camera-add" aria-label="icon-camera-add" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M9.6 4 L8 6 L4.5 6 C3.4 6 2.5 6.9 2.5 8 L2.5 17 C2.5 18.1 3.4 19 4.5 19 L19.5 19 C20.6 19 21.5 18.1 21.5 17 L21.5 11 C21.5 11 21 11.1 20.5 11.1 C18.9 11.1 17.6 9.8 17.6 8.2 C17.6 7.4 17.9 6.7 18.4 6.2 L16 6 L14.4 4 Z M12 16.5 C9.5 16.5 7.5 14.5 7.5 12 C7.5 9.5 9.5 7.5 12 7.5 C14.5 7.5 16.5 9.5 16.5 12 C16.5 14.5 14.5 16.5 12 16.5 Z"/>
        <circle cx="20" cy="6" r="3.2"/>
        <path d="M20 4.4 L20 7.6 M18.4 6 L21.6 6" stroke="#7E53F8" stroke-width="0.9" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</div>
</body></html>
