resolved_decisions:
  - risk: authenticity_claims
    decided_by: Aymar batch 3A
    decided_at: '2026-05-12'
    rationale: The article warns sellers not to list counterfeit goods and does not claim Jamble authenticates sneakers.
  - risk: category_policy
    decided_by: Aymar batch 3A
    decided_at: '2026-05-12'
    rationale: The article is category guidance for seller quality; it avoids unsupported app or backend behavior.
  - risk: buyer_expectation
    decided_by: Aymar batch 3A
    decided_at: '2026-05-12'
    rationale: Buyer-expectation guidance is limited to photos, flaws, sizing, box status, and accurate description.
mockup_plan:
