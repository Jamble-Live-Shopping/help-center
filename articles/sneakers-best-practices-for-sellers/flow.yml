intercom_id: 14288113
audience:
  primary: seller_br
  secondary: []
intent:
  job_to_be_done: List sneakers with enough authenticity, condition, sizing, photo, and shipping context to reduce buyer surprises.
  user_problem: Sneaker buyers need more evidence than a generic title or one photo, and sellers need clear expectations before going live.
  success_criteria:
    - Seller describes authenticity, condition, flaws, and size clearly.
    - Seller knows which photos are most valuable for sneaker buyers.
    - Seller understands how box/original packaging affects buyer expectations and shipping profile choice.
source_of_truth:
  code:
