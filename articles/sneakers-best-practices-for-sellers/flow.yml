  must_answer:
    en:
      - How should a seller describe sneaker authenticity and condition?
      - What photos should a seller include?
      - What should a seller say during a live show?
    pt-br:
      - Como o vendedor deve descrever autenticidade e condição?
      - Quais fotos o vendedor deve incluir?
      - O que o vendedor deve dizer durante uma live?
  forbidden_claims:
