<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }

.picker-title { font-size: 13px; font-weight: 600; color: #A0A7B7; text-transform: uppercase; padding: 16px 20px 8px; letter-spacing: 0.5px; }
.group { margin: 0 12px 14px; border: 1px solid #E9EAEF; border-radius: 12px; overflow: hidden; }
.opt { display: flex; align-items: flex-start; padding: 14px 16px; border-bottom: 1px solid #F0F1F5; }
.opt:last-child { border-bottom: none; }
.opt.selected { background: #F9F8FF; }
.opt-icon { width: 24px; height: 24px; margin-right: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.opt-icon svg { width: 100%; height: 100%; display: block; }
.opt-icon.purple { color: #7E53F8; }
.opt-icon.gray { color: #828DA2; }
.opt-text { flex: 1; }
.opt-name { font-size: 17px; font-weight: 600; color: #162233; line-height: 22px; }
.opt-sub { font-size: 13px; color: #A0A7B7; line-height: 18px; margin-top: 2px; }
.radio { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #A0A7B7; flex-shrink: 0; margin-left: 12px; margin-top: 2px; }
.radio.selected { border-color: #162233; position: relative; }
.radio.selected::after { content: ""; position: absolute; top: 3px; left: 3px; width: 10px; height: 10px; border-radius: 50%; background: #162233; }

.expanded { background: #F9F8FF; padding: 0 16px 14px; display: flex; gap: 12px; }
.field { flex: 1; }
.field-label { font-size: 11px; font-weight: 600; color: #6B7A92; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
.field-input { background: #FFFFFF; border: 1px solid #E9EAEF; border-radius: 8px; padding: 10px 12px; font-size: 15px; font-weight: 600; color: #162233; }
</style></head><body><div class="phone">
<div class="picker-title">Sell mode</div>
<div class="group">
  <div class="opt selected">
    <div class="opt-icon purple"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M3.1875 9C3.1875 5.78984 5.78984 3.1875 9 3.1875C12.2102 3.1875 14.8125 5.78984 14.8125 9C14.8125 12.2102 12.2102 14.8125 9 14.8125C5.78984 14.8125 3.1875 12.2102 3.1875 9ZM9 5.0625C9.51777 5.0625 9.9375 5.48223 9.9375 6V8.61167L11.5379 10.2121C11.904 10.5782 11.904 11.1718 11.5379 11.5379C11.1718 11.904 10.5782 11.904 10.2121 11.5379L8.33709 9.66291C8.16127 9.4871 8.0625 9.24864 8.0625 9V6C8.0625 5.48223 8.48223 5.0625 9 5.0625Z" fill="currentColor"/><path fill-rule="evenodd" clip-rule="evenodd" d="M3.1875 9C3.1875 5.78984 5.78984 3.1875 9 3.1875C12.2102 3.1875 14.8125 5.78984 14.8125 9C14.8125 12.2102 12.2102 14.8125 9 14.8125C5.78984 14.8125 3.1875 12.2102 3.1875 9ZM9 1.3125C4.75431 1.3125 1.3125 4.75431 1.3125 9C1.3125 13.2457 4.75431 16.6875 9 16.6875C13.2457 16.6875 16.6875 13.2457 16.6875 9C16.6875 4.75431 13.2457 1.3125 9 1.3125Z" fill="currentColor"/></svg></div>
    <div class="opt-text"><div class="opt-name">Real-time offers</div><div class="opt-sub">The last bidder wins at the end of the time</div></div>
    <div class="radio selected"></div>
  </div>
  <div class="expanded">
    <div class="field"><div class="field-label">Starting price</div><div class="field-input">$1</div></div>
    <div class="field"><div class="field-label">Timer (Seconds)</div><div class="field-input">15</div></div>
  </div>
  <div class="opt">
    <div class="opt-icon gray"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C7.58 2 4 5.58 4 10V14.5C4 15.33 4.67 16 5.5 16H6.5V19C6.5 19.55 6.95 20 7.5 20H9V21.5C9 21.78 9.22 22 9.5 22H10.5C10.78 22 11 21.78 11 21.5V20H13V21.5C13 21.78 13.22 22 13.5 22H14.5C14.78 22 15 21.78 15 21.5V20H16.5C17.05 20 17.5 19.55 17.5 19V16H18.5C19.33 16 20 15.33 20 14.5V10C20 5.58 16.42 2 12 2ZM9 12C7.9 12 7 11.1 7 10C7 8.9 7.9 8 9 8C10.1 8 11 8.9 11 10C11 11.1 10.1 12 9 12ZM15 12C13.9 12 13 11.1 13 10C13 8.9 13.9 8 15 8C16.1 8 17 8.9 17 10C17 11.1 16.1 12 15 12ZM12 17C11.45 17 11 16.55 11 16V14C11 13.45 11.45 13 12 13C12.55 13 13 13.45 13 14V16C13 16.55 12.55 17 12 17Z" fill="currentColor"/></svg></div>
    <div class="opt-text"><div class="opt-name">Sudden Death</div><div class="opt-sub">No added time, even if someone bids</div></div>
    <div class="radio"></div>
  </div>
  <div class="opt">
    <div class="opt-icon gray"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M8 6V5C8 2.79 9.79 1 12 1C14.21 1 16 2.79 16 5V6H18.5C19.6 6 20.5 6.9 20.5 8L21 19C21 20.66 19.66 22 18 22H6C4.34 22 3 20.66 3 19L3.5 8C3.5 6.9 4.4 6 5.5 6H8ZM10 6H14V5C14 3.9 13.1 3 12 3C10.9 3 10 3.9 10 5V6Z" fill="currentColor"/></svg></div>
    <div class="opt-text"><div class="opt-name">Buy It Now</div><div class="opt-sub">Offer a discount on an item during a limited time</div></div>
    <div class="radio"></div>
  </div>
</div>
</div></body></html>
