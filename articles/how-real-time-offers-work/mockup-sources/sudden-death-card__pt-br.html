<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #0C131D; border-radius: 24px; box-shadow: 0 2px 20px rgba(240,68,55,0.20); border: 1px solid #2E3C52; overflow: hidden; padding: 16px; color: #FFFFFF; }

.badge-row { display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(240,68,55,0.12); border: 1px solid rgba(240,68,55,0.35); padding: 8px 12px; border-radius: 12px; margin-bottom: 14px; }
.badge-row .badge-text { font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; font-size: 12px; font-weight: 700; color: #F04437; text-transform: uppercase; letter-spacing: 0.6px; }

.row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.thumb { width: 56px; height: 56px; border-radius: 12px; flex-shrink: 0; background: linear-gradient(135deg,#7E53F8,#5223D8); display: flex; align-items: center; justify-content: center; }
.thumb svg { width: 30px; height: 30px; }
.info { flex: 1; min-width: 0; }
.prod-name { font-size: 15px; font-weight: 600; line-height: 20px; color: #FFFFFF; }
.starts-line { font-size: 12px; color: #BDC2CD; line-height: 16px; margin-top: 2px; }
.timer-pill { background: rgba(240,68,55,0.18); border: 1px solid rgba(240,68,55,0.55); color: #FFB1AB; font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; font-size: 14px; font-weight: 700; padding: 6px 10px; border-radius: 14px; display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0; }
.timer-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: #F04437; }

.bid-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; padding: 0 2px; }
.label { font-size: 11px; font-weight: 600; color: #A0A7B7; text-transform: uppercase; letter-spacing: 0.4px; }
.value { font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; font-size: 18px; font-weight: 700; color: #FFFFFF; }
.value.lead { color: #17B169; }

.cta { background: #7E53F8; color: #FFFFFF; height: 50px; border-radius: 25px; display: flex; align-items: center; justify-content: center; font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; font-size: 16px; font-weight: 600; }
.cta .arrow { margin-left: 8px; opacity: 0.85; font-weight: 700; }

.helper { font-size: 11px; color: #A0A7B7; text-align: center; margin-top: 8px; }
</style></head><body><div class="phone">
<div class="badge-row"><span class="badge-text">Sudden Death  ·  sem extensão</span></div>

<div class="row">
  <div class="thumb"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2 14.39 8.36 21 9.27l-5 4.86 1.18 6.88L12 17.77 6.82 21l1.18-6.88L3 9.27l6.61-.91L12 2z" fill="#FFFFFF"/></svg></div>
  <div class="info">
    <div class="prod-name">Hot Wheels Redline 1968</div>
    <div class="starts-line">Inicia em R$ 30</div>
  </div>
  <div class="timer-pill"><span class="dot"></span> 0:02</div>
</div>

<div class="bid-header">
  <span class="label">Oferta atual</span>
  <span class="value lead">R$ 85</span>
</div>

<div class="cta">Oferta R$ 90 <span class="arrow">›</span></div>
<div class="helper">Quando o cronômetro zera, acaba</div>
</div></body></html>
