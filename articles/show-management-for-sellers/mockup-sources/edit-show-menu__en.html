<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: rgba(0,0,0,0.18); border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 8px; min-height: 380px; display: flex; flex-direction: column; justify-content: flex-end; }
.sheet { display: flex; flex-direction: column; gap: 8px; }
.sheet-group { background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 14px; overflow: hidden; }
.sheet-btn { display: block; width: 100%; padding: 16px 8px; font-size: 17px; border: none; background: transparent; cursor: pointer; font-family: inherit; border-bottom: 0.5px solid rgba(60,60,67,0.18); text-align: center; }
.sheet-btn:last-child { border-bottom: none; }
.sheet-btn.purple { color: #7E53F8; }
.sheet-btn.red { color: #FF3B30; }
.sheet-btn.cancel { font-weight: 600; color: #7E53F8; }
</style></head><body>
<div class="phone">
  <div class="sheet">
    <div class="sheet-group">
      <button class="sheet-btn purple">Edit</button>
      <button class="sheet-btn red">Delete</button>
    </div>
    <div class="sheet-group">
      <button class="sheet-btn cancel">Cancel</button>
    </div>
  </div>
</div>
</body></html>
