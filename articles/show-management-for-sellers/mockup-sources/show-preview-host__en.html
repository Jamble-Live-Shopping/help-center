<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.cover { position: relative; width: 100%; height: 168px; background: linear-gradient(135deg, #7E53F8 0%, #5C3AD0 100%); display: flex; align-items: center; justify-content: center; }
.cover-icon { width: 64px; height: 64px; border-radius: 16px; background: rgba(255,255,255,0.18); display: flex; align-items: center; justify-content: center; }
.cover-icon svg { width: 36px; height: 36px; }
.menu-btn { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; }
.dot { width: 4px; height: 4px; border-radius: 50%; background: #FFFFFF; margin: 0 1px; }
.menu-btn .row { display: flex; }
.body { padding: 16px 16px 14px; }
.title { font-size: 18px; font-weight: 700; color: #162233; line-height: 23px; letter-spacing: -0.2px; }
.date { font-size: 13px; color: #6B7A92; margin-top: 4px; }
.stats { display: flex; gap: 24px; margin-top: 14px; padding-top: 12px; border-top: 1px solid #E9EAEF; }
.stat-item { display: flex; flex-direction: column; gap: 2px; }
.stat-label { font-size: 11px; color: #A0A7B7; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
.stat-value { font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; font-size: 18px; font-weight: 700; color: #162233; }
.section-title { font-size: 13px; font-weight: 600; color: #6B7A92; text-transform: uppercase; letter-spacing: 0.4px; margin: 16px 16px 10px; }
.add-row { display: flex; align-items: center; gap: 12px; margin: 0 16px 12px; padding: 12px 14px; border-radius: 12px; background: #F4EEFF; }
.plus-circle { width: 32px; height: 32px; border-radius: 50%; background: #7E53F8; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; font-weight: 600; flex-shrink: 0; }
.add-text { font-size: 15px; font-weight: 600; color: #7E53F8; }
.product-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 16px 18px; }
.product-thumb { aspect-ratio: 1; border-radius: 10px; background: #E9EAEF; position: relative; overflow: hidden; }
.product-thumb.t1 { background: linear-gradient(135deg, #FFD89B 0%, #E68D5A 100%); }
.product-thumb.t2 { background: linear-gradient(135deg, #A1C4FD 0%, #7B9BD9 100%); }
.product-thumb.t3 { background: linear-gradient(135deg, #FAB1B1 0%, #D67676 100%); }
.product-thumb svg { position: absolute; inset: 25%; width: 50%; height: 50%; }
</style></head><body>
<div class="phone">
  <div class="cover">
    <div class="cover-icon">
      <svg viewBox="0 0 24 24" fill="white"><path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5L12 2Z"/></svg>
    </div>
    <div class="menu-btn"><div class="row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
  </div>
  <div class="body">
    <div class="title">Pokemon TCG booster opening</div>
    <div class="date">Today, 8:00 PM</div>
    <div class="stats">
      <div class="stat-item">
        <div class="stat-label">Bookmarks</div>
        <div class="stat-value">42</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Views</div>
        <div class="stat-value">318</div>
      </div>
    </div>
  </div>
  <div class="section-title">Listings</div>
  <div class="add-row">
    <div class="plus-circle">+</div>
    <div class="add-text">Add listings</div>
  </div>
  <div class="product-grid">
    <div class="product-thumb t1"><svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)"><rect x="6" y="4" width="12" height="16" rx="1"/></svg></div>
    <div class="product-thumb t2"><svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)"><circle cx="12" cy="12" r="7"/></svg></div>
    <div class="product-thumb t3"><svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)"><rect x="6" y="4" width="12" height="16" rx="1"/></svg></div>
  </div>
</div>
</body></html>
