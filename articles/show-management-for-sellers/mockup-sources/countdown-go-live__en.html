<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: linear-gradient(180deg, #1A1226 0%, #2D1B47 60%, #4A2D7D 100%); border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; min-height: 480px; display: flex; flex-direction: column; padding: 24px 20px 20px; }
.top-bar { display: flex; justify-content: space-between; align-items: center; }
.close-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }
.close-btn svg { width: 14px; height: 14px; fill: white; }
.menu-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }
.menu-btn .row { display: flex; }
.menu-btn .dot { width: 4px; height: 4px; border-radius: 50%; background: white; margin: 0 1px; }
.center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 0; }
.cover-thumb { width: 96px; height: 96px; border-radius: 16px; background: linear-gradient(135deg, #7E53F8 0%, #5C3AD0 100%); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; box-shadow: 0 8px 32px rgba(126,83,248,0.5); }
.cover-thumb svg { width: 44px; height: 44px; }
.show-title { font-size: 16px; font-weight: 600; color: white; text-align: center; margin-bottom: 24px; line-height: 21px; }
.countdown-label { font-size: 16px; font-weight: 500; color: white; text-align: center; line-height: 22px; }
.countdown-value { font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; font-size: 28px; font-weight: 600; color: white; text-align: center; margin-top: 6px; line-height: 34px; letter-spacing: -0.5px; }
.btn-group { display: flex; flex-direction: column; gap: 12px; padding-top: 20px; }
.btn { height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; }
.btn-practice { background: white; color: #2C3E50; }
.btn-live { background: #FF3B30; color: white; }
</style></head><body>
<div class="phone">
  <div class="top-bar">
    <div class="close-btn"><svg viewBox="0 0 14 14"><path d="M2 2 L12 12 M12 2 L2 12" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/></svg></div>
    <div class="menu-btn"><div class="row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
  </div>
  <div class="center">
    <div class="cover-thumb">
      <svg viewBox="0 0 24 24" fill="white"><path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5L12 2Z"/></svg>
    </div>
    <div class="show-title">Pokemon TCG booster opening</div>
    <div class="countdown-label">Show starts in</div>
    <div class="countdown-value">12m 30s</div>
  </div>
  <div class="btn-group">
    <div class="btn btn-practice">Practice mode</div>
    <div class="btn btn-live">Go Live</div>
  </div>
</div>
</body></html>
