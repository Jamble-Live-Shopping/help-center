<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 12px 0 16px; }
.picker-title { font-size: 13px; font-weight: 600; color: #828DA2; text-transform: uppercase; padding: 8px 16px 10px; letter-spacing: 0.4px; }
.opt { display: flex; align-items: center; padding: 14px 16px; gap: 16px; }
.opt-selected-wrap { background: #F5F1FF; }
.opt-icon { width: 24px; height: 24px; flex-shrink: 0; color: #4F86F7; display: flex; align-items: center; justify-content: center; }
.opt-icon svg { width: 24px; height: 24px; display: block; }
.opt-icon.selected svg path { fill: #1B2547; }
.opt-text { flex: 1; min-width: 0; }
.opt-name { font-size: 17px; font-weight: 600; color: #000000; line-height: 22px; }
.opt-sub { font-size: 13px; color: #6E8AB1; line-height: 18px; margin-top: 2px; }
.outer { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #6E8AB1; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.outer.selected { border-color: #1B2547; }
.inner { width: 10px; height: 10px; border-radius: 50%; background: #1B2547; transform: scale(0); }
.outer.selected .inner { transform: scale(1); }
.field-row { display: flex; gap: 16px; padding: 0 16px 12px; }
.field { flex: 1; height: 74px; border: 1px solid #D5DAE4; border-radius: 12px; padding: 12px 14px; display: flex; flex-direction: column; justify-content: center; }
.field-label { font-size: 12px; color: #6E8AB1; font-weight: 500; }
.field-value { font-size: 17px; font-weight: 600; color: #1B2547; margin-top: 2px; font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; }
