<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; height: 640px; position: relative; border-radius: 24px; overflow: hidden; box-shadow: 0 2px 20px rgba(126,83,248,0.18); border: 1px solid #E9EAEF; background: linear-gradient(180deg, #221530 0%, #3A2350 35%, #5C3A6B 100%); color: white; }
.dimmer { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.05) 25%, rgba(0,0,0,0.05) 60%, rgba(0,0,0,0.55) 100%); }
.top-left { position: absolute; top: 116px; left: 14px; z-index: 3; max-width: 200px; }
.top-label { font-size: 13px; font-weight: 600; line-height: 16px; white-space: nowrap; }
.top-values { display: flex; flex-direction: column; align-items: flex-start; gap: 0; margin-top: 2px; }
.top-value { font-size: 22px; font-weight: 700; font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; line-height: 26px; }
.top-avg { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 1px; }
.top-right { position: absolute; top: 52px; right: 14px; display: flex; gap: 8px; z-index: 3; }
.pill { background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.22); border-radius: 14px; padding: 5px 10px; font-size: 13px; font-weight: 600; min-height: 28px; display: flex; align-items: center; gap: 4px; }
.pill-red { background: #E54F58; border-color: #C73C44; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.95); display: inline-block; }
.host-row { position: absolute; left: 16px; bottom: 220px; display: flex; align-items: center; gap: 10px; z-index: 3; }
.avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #FFB873 0%, #E0734D 100%); border: 1.5px solid white; }
.username { font-size: 14px; font-weight: 600; }
.viewers { font-size: 12px; opacity: 0.8; margin-top: 1px; }
.product-card { position: absolute; left: 12px; right: 12px; bottom: 12px; background: rgba(255,255,255,0.97); border-radius: 20px; padding: 12px; z-index: 4; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
/* product-row mirrors XIB T4f-up-gzW: productView (Ogx-lZ-qCX, LEFT)
   and sale-area (cp3-Bb-DxC, RIGHT). The right column uses
   align-items: flex-end so saleAmountLabel (.price-val) and
   saleTimerButton (.sale-timer-btn) are trailing-aligned per
   constraints rAq-QJ-REu and Sjh-oJ-6bY. */
.product-row { display: flex; align-items: flex-start; gap: 12px; }
.thumb { width: 54px; height: 54px; border-radius: 12px; background: linear-gradient(135deg, #7E53F8 0%, #B97DF8 100%); flex-shrink: 0; }
.pinfo { flex: 1; min-width: 0; padding-top: 2px; }
.pname { font-size: 14px; font-weight: 600; color: #1B2547; line-height: 18px; }
.psize { font-size: 11px; color: #6E8AB1; margin-top: 2px; }
/* sale-status = XIB cp3-Bb-DxC (right column of T4f-up-gzW).
   align-items: flex-end forces trailing alignment of every child,
   matching constraints rAq-QJ-REu (saleAmount.trailing) and
   Sjh-oJ-6bY (saleTimer.trailing). saleTimer sits BELOW saleAmount
   per constraint vAm-e3-sKd. */
.sale-status { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; gap: 4px; padding-top: 2px; }
.price-val { font-size: 18px; font-weight: 700; color: #1B2547; font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; line-height: 22px; text-align: right; }
/* Compact sale-timer button, mirrors iOS ShowSaleView.swift:330-340
   (config) + :858-871 (setTime) + XIB:199-217 (constraints).
   Height 20px, transparent bg, icon-leading + 45-wide title label,
   semibold body S, color = .content.warning amber for AUCTION. */
.sale-timer-btn { display: inline-flex; align-items: center; gap: 4px; height: 20px; color: #F2A900; font-size: 14px; font-weight: 600; line-height: 20px; }
.sale-timer-btn .timer-text { min-width: 45px; text-align: right; font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; }
.sale-timer-btn svg { display: block; flex-shrink: 0; }
/* action-row = hostActionButtons stack view (ShowSaleView.swift:53,
   programmatic, NOT inside T4f-up-gzW). Rendered here as a separate
   row BELOW the product-row so the timer-vs-action-button
   architecture is visibly distinct from the sale-status column. */
.action-row { display: flex; justify-content: center; margin-top: 12px; }
.action-btn { background: #7E53F8; color: white; height: 44px; min-width: 160px; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; padding: 0 22px; }
.glow { position: absolute; left: 50%; top: 55%; transform: translate(-50%, -50%); width: 240px; height: 240px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 70%); z-index: 1; pointer-events: none; }
.status-bar { position: absolute; top: 0; left: 0; right: 0; height: 38px; display: flex; align-items: center; justify-content: space-between; padding: 12px 22px 0; color: white; font-size: 13px; font-weight: 600; z-index: 5; }
.status-icons { display: flex; gap: 5px; align-items: center; font-size: 11px; }
</style></head><body><div class="phone">
<div class="status-bar"><div>9:41</div><div class="status-icons">&middot;&middot;&middot; 5G</div></div>
<div class="dimmer"></div>
<div class="glow"></div>
<div class="top-left">
  <div class="top-label">Vendas em tempo real</div>
  <div class="top-values"><span class="top-value">R$ 75</span><span class="top-avg">R$ 75/item</span></div>
</div>
<div class="top-right">
  <div class="pill pill-red"><span class="dot"></span> 142</div>
  <div class="pill">&middot;&middot;&middot;</div>
</div>
<div class="host-row">
  <div class="avatar"></div>
  <div>
    <div class="username">@maria_cards</div>
    <div class="viewers">Ao vivo agora</div>
  </div>
</div>
<div class="product-card">
  <div class="product-row">
    <!-- LEFT column = productView (XIB Ogx-lZ-qCX): thumb + title + meta. -->
    <div class="thumb"></div>
    <div class="pinfo">
      <div class="pname">Charizard holo PSA 9</div>
      <div class="psize">Carta &middot; uma unidade</div>
    </div>
    <!-- RIGHT column = sale area (XIB cp3-Bb-DxC): saleAmountLabel on top
         (XIB JST-50-JEJ, trailing-aligned via rAq-QJ-REu) and
         saleTimerButton below (XIB mFP-1R-Tk3, trailing-aligned via
         Sjh-oJ-6bY, top >= saleAmount.bottom via vAm-e3-sKd).
         icon: auction_time_icon from Assets.xcassets/auction_time_icon.imageset
         (ShowSaleView.swift:861 sets this on saleTimerButton for AUCTION). -->
    <div class="sale-status">
      <div class="price-val">R$ 75,00</div>
      <div class="sale-timer-btn" aria-label="auction_time_icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="9" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M8 6 L8 9 L10.4 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M5.5 2.5 L10.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M8 2.5 L8 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="timer-text">0:18</span>
      </div>
    </div>
  </div>
  <!-- action-row = hostActionButtons stack (ShowSaleView.swift:53),
       separate from cp3-Bb-DxC. Renders BELOW product-row, never
       inline with the saleAmount/saleTimer column. -->
  <div class="action-row">
    <div class="action-btn">3 ofertas</div>
  </div>
</div>
</div></body></html>
