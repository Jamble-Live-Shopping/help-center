<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: rgba(22, 34, 51, 0.55); border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding-top: 280px; padding-bottom: 18px; }
.sheet { background: rgba(245, 245, 248, 0.85); border-radius: 14px; overflow: hidden; margin: 0 10px; backdrop-filter: blur(20px); }
.action { padding: 17px 16px; text-align: center; font-size: 17px; font-weight: 400; color: #007AFF; border-bottom: 1px solid #C7C7CC; line-height: 22px; }
.action.last { border-bottom: none; }
.action.highlight { background: rgba(126,83,248,0.10); font-weight: 600; }
.cancel-sheet { background: rgba(255, 255, 255, 0.95); border-radius: 14px; overflow: hidden; margin: 8px 10px 0; }
.cancel { padding: 17px 16px; text-align: center; font-size: 17px; font-weight: 600; color: #7E53F8; line-height: 22px; }
</style></head><body>
<div class="phone">
  <div class="sheet">
    <div class="action">New Quickie Listing</div>
    <div class="action highlight">Clone Past Shows Listings</div>
    <div class="action last">Create Credits Giveaway</div>
  </div>
  <div class="cancel-sheet">
    <div class="cancel">Cancel</div>
  </div>
</div>
</body></html>
