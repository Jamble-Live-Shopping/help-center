<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 18px 0 20px; }
.list-title { font-family: -apple-system-round, "SF Pro Rounded", -apple-system, system-ui, sans-serif; font-size: 17px; font-weight: 600; color: #162233; padding: 0 16px 12px; line-height: 22px; }
.row { display: flex; gap: 12px; align-items: center; padding: 10px 16px; }
.thumb { width: 56px; height: 56px; border-radius: 10px; background: #E9EAEF; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #6B7A92; font-weight: 600; flex-shrink: 0; overflow: hidden; }
.thumb svg { width: 56px; height: 56px; }
.row-body { flex: 1; min-width: 0; }
.row-title { font-size: 15px; font-weight: 600; color: #162233; line-height: 20px; }
.row-meta { font-size: 13px; color: #4F5C72; line-height: 18px; margin-top: 2px; }
.qty-pill { font-size: 11px; font-weight: 700; color: #FFFFFF; background: #7E53F8; padding: 2px 8px; border-radius: 10px; line-height: 14px; }
.row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.row-price { font-family: -apple-system-round, "SF Pro Rounded", -apple-system, system-ui, sans-serif; font-size: 15px; font-weight: 600; color: #162233; line-height: 20px; }
.divider { height: 1px; background: #E9EAEF; margin: 0 16px; }
</style></head><body>
<div class="phone">
  <div class="list-title">Listings (3)</div>
  <div class="row">
    <div class="thumb">
      <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><rect width="56" height="56" fill="#162233"/><path d="M14 36 C 20 22, 28 22, 32 30 C 36 38, 42 32, 44 28" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
    </div>
    <div class="row-body">
      <div class="row-title">Nike Air Max 90</div>
      <div class="row-meta">Size 40, Black</div>
    </div>
    <div class="row-right">
      <div class="qty-pill">QTY 1</div>
      <div class="row-price">$ 95</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div class="thumb">
      <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><rect width="56" height="56" fill="#162233"/><path d="M14 36 C 20 22, 28 22, 32 30 C 36 38, 42 32, 44 28" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
    </div>
    <div class="row-body">
      <div class="row-title">Nike Air Max 90</div>
      <div class="row-meta">Size 41, Black</div>
    </div>
    <div class="row-right">
      <div class="qty-pill">QTY 1</div>
      <div class="row-price">$ 95</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div class="thumb">
      <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><rect width="56" height="56" fill="#162233"/><path d="M14 36 C 20 22, 28 22, 32 30 C 36 38, 42 32, 44 28" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
    </div>
    <div class="row-body">
      <div class="row-title">Nike Air Max 90</div>
      <div class="row-meta">Size 42, Black</div>
    </div>
    <div class="row-right">
      <div class="qty-pill">QTY 1</div>
      <div class="row-price">$ 95</div>
    </div>
  </div>
</div>
</body></html>
