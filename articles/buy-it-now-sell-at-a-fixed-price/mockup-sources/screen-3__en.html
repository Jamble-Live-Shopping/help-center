<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: linear-gradient(180deg, #2A1B5C 0%, #4A2D7A 100%); display: flex; justify-content: center; padding: 24px 12px; }
.phone { width: 380px; padding: 18px 14px; }
.banner { display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 8px 0 12px; border-radius: 20px; background: rgba(202, 240, 10, 0.16); border: 1px solid rgba(202, 240, 10, 0.5); white-space: nowrap; }
.banner-icon { width: 18px; height: 18px; flex-shrink: 0; color: #FFFFFF; display: flex; align-items: center; justify-content: center; }
.banner-icon svg { width: 18px; height: 18px; display: block; }
.banner-title { font-size: 15px; font-weight: 600; color: #FFFFFF; line-height: 20px; white-space: nowrap; flex-shrink: 0; }
.items-pill { background: #CAF00A; color: #1B2547; height: 20px; padding: 0 12px 0 12px; border-radius: 10px; font-size: 13px; font-weight: 600; line-height: 20px; display: inline-flex; align-items: center; white-space: nowrap; flex-shrink: 0; }
</style></head><body><div class="phone">
<!-- icon: icon-flash Assets.xcassets/icon-flash.imageset -->
<div class="banner">
  <span class="banner-icon" aria-label="icon-flash"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 2L4 13H11L9 22L20 9H13L13 2Z" fill="#FFFFFF"/></svg></span>
  <span class="banner-title">Flash Sale • 30% OFF</span>
  <span class="items-pill">2 left</span>
</div>
</div></body></html>
