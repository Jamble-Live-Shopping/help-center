<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; height: 560px; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; position: relative;
  background: linear-gradient(160deg, #1d1338 0%, #2a1a4d 30%, #3a1a44 60%, #1c1230 100%); }

/* Top bar: live badge, viewers, top-right buttons */
.top-bar { position: absolute; top: 14px; left: 14px; right: 14px; display: flex; align-items: center; }
.host-pill { display: flex; align-items: center; height: 32px; padding: 2px 12px 2px 2px; border-radius: 16px; background: rgba(0,0,0,0.45); }
.host-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg,#FFD66E,#FF6E6E); flex-shrink: 0; }
.host-name { font-size: 13px; font-weight: 600; color: #FFFFFF; margin-left: 8px; }
.live-badge { background: #E2403B; color: #FFFFFF; font-size: 11px; font-weight: 700; padding: 3px 7px; border-radius: 4px; margin-left: 8px; letter-spacing: 0.4px; }
.viewers-pill { display: flex; align-items: center; height: 28px; padding: 0 10px; border-radius: 14px; background: rgba(0,0,0,0.45); margin-left: 8px; font-size: 12px; font-weight: 600; color: #FFFFFF; }
.viewers-pill svg { width: 14px; height: 14px; margin-right: 4px; }

.top-right { margin-left: auto; display: flex; gap: 10px; }
.icon-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
.icon-btn svg { width: 22px; height: 22px; }

/* Pinned message: white 20% alpha background, 8px padding, 3px corner radius, 28px round avatar, semibold white text */
.pinned-msg { position: absolute; left: 16px; right: 16px; top: 64px; display: flex; align-items: flex-start; padding: 8px; border-radius: 3px; background: rgba(255,255,255,0.20); }
.pin-avatar { width: 28px; height: 28px; border-radius: 14px; background: linear-gradient(135deg,#FFD66E,#FF6E6E); flex-shrink: 0; margin-right: 8px; }
.pin-text { font-size: 15px; font-weight: 600; color: #FFFFFF; line-height: 20px; letter-spacing: -0.15px; }

/* Chat at bottom */
.chat-area { position: absolute; left: 14px; bottom: 78px; right: 76px; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { display: flex; align-items: flex-start; }
.chat-avatar { width: 24px; height: 24px; border-radius: 12px; flex-shrink: 0; margin-right: 8px; }
.chat-bubble { font-size: 13px; color: #FFFFFF; line-height: 17px; padding-top: 2px; }
.chat-bubble b { font-weight: 700; }

.composer { position: absolute; left: 14px; right: 14px; bottom: 24px; display: flex; align-items: center; gap: 8px; }
.composer-input { flex: 1; height: 40px; border-radius: 20px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.18); padding: 0 14px; display: flex; align-items: center; font-size: 13px; color: rgba(255,255,255,0.5); }
.send-btn { width: 40px; height: 40px; border-radius: 20px; background: #7E53F8; display: flex; align-items: center; justify-content: center; }
.send-btn svg { width: 18px; height: 18px; }
</style></head><body>

</div>
