<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #000000; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 18px 16px 22px; }
.section-title { font-size: 17px; font-weight: 600; color: #FFFFFF; margin-bottom: 16px; }
.field-block { margin-bottom: 16px; }
.field-header { display: flex; align-items: baseline; height: 18px; margin-bottom: 6px; }
.field-label { font-size: 13px; font-weight: 500; color: #FFFFFF; letter-spacing: 0.4px; }
.field-counter { font-size: 13px; font-weight: 500; color: #FFFFFF; margin-left: 8px; line-height: 17px; }
.field-optional { margin-left: auto; font-size: 13px; font-weight: 500; color: #787878; }
.field-input { background: #1A1A1A; border-radius: 12px; padding: 16px 8px; min-height: 52px; font-size: 16px; color: #FFFFFF; line-height: 22px; }
.placeholder { color: rgba(255,255,255,0.32); }
.notes-active { color: #FFFFFF; }
</style></head><body>
<div class="phone">
  <div class="section-title">Show details</div>

  <div class="field-block">
    <div class="field-header">
      <span class="field-label">DESCRIPTION</span>
      <span class="field-optional">Optional</span>
    </div>
    <div class="field-input">
      <span class="placeholder">Describe your live here</span>
    </div>
  </div>

  <div class="field-block">
    <div class="field-header">
      <span class="field-label">NOTES</span>
      <span class="field-counter">(0/200)</span>
      <span class="field-optional">Optional</span>
    </div>
    <div class="field-input notes-active">
      <span class="placeholder">Additional notes</span>
    </div>
  </div>
</div>
</body></html>
