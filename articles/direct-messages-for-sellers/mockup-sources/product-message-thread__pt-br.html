<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
}

.phone { padding: 0; }
.nav { display: flex; align-items: center; padding: 12px 14px; gap: 10px; border-bottom: 1px solid #F1F2F5; }
.nav-back { width: 28px; height: 28px; border-radius: 50%; background: #F3F4F8; display: flex; align-items: center; justify-content: center; color: #6D6D80; font-size: 18px; }
.nav-avatar { width: 32px; height: 32px; border-radius: 50%; background: #FDB022; display: flex; align-items: center; justify-content: center; color: #FFFFFF; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.nav-name { font-size: 15px; font-weight: 600; color: #162233; flex: 1; }
.prod-card { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #F9FAFC; border-bottom: 1px solid #F1F2F5; }
.prod-thumb { width: 44px; height: 44px; border-radius: 8px; background: linear-gradient(135deg,#FDB022 0%,#FF8A00 100%); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.prod-meta { flex: 1; min-width: 0; }
.prod-name { font-size: 13px; font-weight: 600; color: #162233; line-height: 16px; }
.prod-price { font-size: 14px; font-weight: 700; color: #162233; margin-top: 2px; }
.thread { padding: 14px 14px 12px; min-height: 240px; }
.bubble { max-width: 78%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 18px; margin-bottom: 8px; word-wrap: break-word; }
.bubble.in { background: #F3F4F8; color: #162233; border-bottom-left-radius: 4px; }
.bubble.out { background: #7E53F8; color: #FFFFFF; border-bottom-right-radius: 4px; align-self: flex-end; margin-left: auto; }
.row-flex { display: flex; }
.row-flex.left { justify-content: flex-start; }
.row-flex.right { justify-content: flex-end; }
.composer { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-top: 1px solid #F1F2F5; background: #FFFFFF; }
.composer-input { flex: 1; height: 36px; border-radius: 18px; background: #F3F4F8; padding: 0 14px; display: flex; align-items: center; font-size: 13px; color: #A0A7B7; }
.composer-send { width: 36px; height: 36px; border-radius: 50%; background: #7E53F8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.composer-send img { width: 18px; height: 18px; }
