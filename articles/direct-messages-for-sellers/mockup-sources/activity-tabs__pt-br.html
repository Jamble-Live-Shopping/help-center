<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 360px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 0 0 12px; }
.nav { padding: 14px 18px 8px; }
.nav-title { font-size: 22px; font-weight: 700; color: #162233; letter-spacing: -0.4px; }
.tabs { display: flex; padding: 6px 12px 12px; gap: 6px; border-bottom: 1px solid #F1F2F5; overflow-x: auto; white-space: nowrap; }
.tab { padding: 7px 12px; font-size: 13px; font-weight: 600; color: #6D6D80; border: 1px solid #E9EAEF; border-radius: 999px; background: #FFFFFF; flex-shrink: 0; }
.tab.active { color: #FFFFFF; background: #7E53F8; border-color: #7E53F8; }
.row { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid #F1F2F5; }
.row:last-child { border-bottom: none; }
.avatar { width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; }
.av1 { background: linear-gradient(160deg, #FDB022 0%, #FF6A1F 100%); }
.av2 { background: linear-gradient(160deg, #7E53F8 0%, #4F2DA9 100%); }
.av3 { background: linear-gradient(160deg, #16A34A 0%, #047857 100%); }
.row-text { flex: 1; min-width: 0; }
.row-name { font-size: 15px; font-weight: 600; color: #162233; }
.row-msg { font-size: 13px; color: #6D6D80; margin-top: 2px; line-height: 17px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row-meta { font-size: 11px; color: #9092A0; flex-shrink: 0; padding-left: 6px; align-self: flex-start; padding-top: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #7E53F8; flex-shrink: 0; }
</style></head><body>
<div class="phone">
  <div class="nav"><div class="nav-title">Atividade</div></div>
  <div class="tabs">
    <div class="tab">Todos</div>
    <div class="tab">Mensagens</div>
    <div class="tab">Não lido</div>
    <div class="tab">Compras</div>
    <div class="tab active">Vendas</div>
    <div class="tab">Concluído</div>
  </div>
  <div class="row">
    <div class="avatar av1"></div>
    <div class="row-text">
      <div class="row-name">@cardstack_br</div>
      <div class="row-msg">Bom dia! Já fez o envio do pedido?</div>
    </div>
    <div class="dot"></div>
    <div class="row-meta">2min</div>
  </div>
  <div class="row">
    <div class="avatar av2"></div>
    <div class="row-text">
      <div class="row-name">@maria_pokemon</div>
      <div class="row-msg">Recebi a carta, muito obrigada</div>
    </div>
    <div class="row-meta">1h</div>
  </div>
  <div class="row">
    <div class="avatar av3"></div>
    <div class="row-text">
      <div class="row-name">@diecast_lover</div>
      <div class="row-msg">Você consegue mandar foto da caixa?</div>
    </div>
    <div class="row-meta">3h</div>
  </div>
</div></body></html>
