<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 0 0 18px; }
.cover { width: 100%; height: 110px; background: linear-gradient(160deg, #1B1530 0%, #4A3B6B 100%); }
.identity { display: flex; flex-direction: column; align-items: center; padding: 0 18px; margin-top: -36px; }
.avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(160deg, #FDB022 0%, #FF6A1F 100%); border: 4px solid #FFFFFF; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
.handle { font-size: 16px; font-weight: 700; color: #162233; margin-top: 10px; }
.bio { font-size: 12px; color: #6D6D80; margin-top: 6px; text-align: center; line-height: 16px; }
.stats { display: flex; gap: 22px; margin-top: 14px; }
.stat { display: flex; flex-direction: column; align-items: center; }
.stat-num { font-size: 14px; font-weight: 700; color: #162233; }
.stat-label { font-size: 11px; color: #6D6D80; margin-top: 2px; text-transform: lowercase; }
/* iOS uses both Follow and Message as filled UIButton.Configuration with
   baseBackgroundColor #162131, white text, capsule cornerStyle, 15pt
   medium font, no icon. Verified at
   PROFILE/Views/ProfileHeaderViewController.swift:328-360. */
.actions { display: flex; gap: 10px; padding: 20px 18px 0; }
.btn { flex: 1; height: 40px; border-radius: 20px; background: #162131; color: #FFFFFF; font-size: 15px; font-weight: 500; display: flex; align-items: center; justify-content: center; padding: 0 24px; }
</style></head><body>
<div class="phone">
  <div class="cover"></div>
  <div class="identity">
    <div class="avatar"></div>
    <div class="handle">@cardstack_br</div>
    <div class="bio">Pokemon TCG, PSA grade, daily Correios shipping.</div>
    <div class="stats">
      <div class="stat"><div class="stat-num">182</div><div class="stat-label">followers</div></div>
      <div class="stat"><div class="stat-num">47</div><div class="stat-label">following</div></div>
      <div class="stat"><div class="stat-num">94</div><div class="stat-label">sales</div></div>
    </div>
  </div>
  <div class="actions">
    <div class="btn">Follow</div>
    <div class="btn">Message</div>
  </div>
</div></body></html>
