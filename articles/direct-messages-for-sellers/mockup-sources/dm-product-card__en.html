<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
}

.phone { padding: 0; }
.nav { display: flex; align-items: center; padding: 12px 14px; gap: 10px; border-bottom: 1px solid #F1F2F5; }
.nav-back { width: 28px; height: 28px; border-radius: 50%; background: #F3F4F8; display: flex; align-items: center; justify-content: center; color: #6D6D80; font-size: 18px; }
.nav-name { font-size: 15px; font-weight: 600; color: #162233; flex: 1; }
.prod-card { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #F9FAFC; border-bottom: 1px solid #F1F2F5; }
.prod-thumb { width: 58px; height: 58px; border-radius: 10px; background: linear-gradient(135deg,#FDB022 0%,#FF8A00 100%); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.prod-meta { flex: 1; min-width: 0; }
.prod-name { font-size: 14px; font-weight: 600; color: #162233; line-height: 18px; }
.prod-price-label { font-size: 11px; color: #6D6D80; margin-top: 2px; }
.prod-price { font-size: 16px; font-weight: 700; color: #162233; line-height: 20px; }
.prod-status { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 8px; background: #ECFDF3; color: #079455; margin-top: 4px; }
.thread { padding: 14px 14px 18px; min-height: 220px; background: #FFFFFF; }
.bubble { max-width: 78%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 18px; margin-bottom: 8px; }
.bubble.in { background: #F3F4F8; color: #162233; border-bottom-left-radius: 4px; align-self: flex-start; }
.row-flex { display: flex; }
.row-flex.left { justify-content: flex-start; }
</style></head><body>
<div class="phone">
  <div class="nav"><div class="nav-back">‹</div><div class="nav-name">@camila_alves</div></div>
  <div class="prod-card">
    <div class="prod-thumb">🎴</div>
    <div class="prod-meta">
      <div class="prod-name">Charizard PSA 9 Base Set</div>
      <div class="prod-price-label">Price</div>
      <div class="prod-price">$1,450.00</div>
      <div class="prod-status">Available</div>
    </div>
  </div>
  <div class="thread">
    <div class="row-flex left"><div class="bubble in">Hi! Is the Charizard still available? I'd love to buy it.</div></div>
  </div>
</div></body></html>
