<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
}

.phone { padding: 18px 0 14px; }
.nav-title { font-size: 26px; font-weight: 700; color: #162233; padding: 4px 18px 12px; letter-spacing: -0.4px; }
.tab-row { display: flex; gap: 8px; padding: 0 12px 12px; overflow-x: hidden; }
.tab { padding: 8px 14px; border-radius: 20px; background: #F3F4F8; color: #6B7A92; font-size: 13px; font-weight: 600; flex-shrink: 0; }
.tab.active { background: #162233; color: #FFFFFF; }
.row { display: flex; align-items: center; padding: 12px 16px; gap: 12px; border-top: 1px solid #F1F2F5; }
.row:first-of-type { border-top: none; }
.avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #FFFFFF; }
.a1 { background: #FDB022; }
.a2 { background: #7E53F8; }
.a3 { background: #17B169; }
.body { flex: 1; min-width: 0; }
.name { font-size: 15px; font-weight: 600; color: #162233; line-height: 18px; }
.preview { font-size: 13px; color: #6D6D80; line-height: 18px; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.unread-dot { width: 8px; height: 8px; border-radius: 50%; background: #7E53F8; flex-shrink: 0; }
</style></head><body>
<div class="phone">
  <div class="nav-title">Activity</div>
  <div class="tab-row"><div class="tab">All</div><div class="tab">Unread</div><div class="tab">Purchases</div><div class="tab active">Sales</div><div class="tab">Archived</div></div>
  <div class="row">
    <div class="avatar a1">C</div>
    <div class="body"><div class="name">Camila Alves</div><div class="preview">Hi! Is the Charizard still available?</div></div>
    <div class="unread-dot"></div>
  </div>
  <div class="row">
    <div class="avatar a2">B</div>
    <div class="body"><div class="name">Bruno Silva</div><div class="preview">I'll ship it tomorrow, thanks!</div></div>
  </div>
  <div class="row">
    <div class="avatar a3">L</div>
    <div class="body"><div class="name">Lucas Rocha</div><div class="preview">Can you send a photo of the back of the card?</div></div>
    <div class="unread-dot"></div>
  </div>
</div></body></html>
