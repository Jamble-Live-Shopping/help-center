<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #F3F4F8; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; position: relative; min-height: 520px; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; background: #FFFFFF; border-bottom: 1px solid #F0F1F5; }
.nav-back { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #162233; font-size: 22px; font-weight: 400; }
.nav-title { font-size: 17px; font-weight: 600; color: #162233; }
.nav-spacer { width: 28px; }
.wallet-card { background: #FFFFFF; margin: 14px 12px; padding: 16px; border: 1px solid #E9EAEF; border-radius: 12px; opacity: 0.55; }
.wallet-label { font-size: 14px; font-weight: 600; color: #162233; margin-bottom: 6px; }
.wallet-amount { font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; font-size: 26px; font-weight: 500; color: #162233; letter-spacing: -0.02em; margin-bottom: 10px; }
.wallet-btn { height: 36px; border-radius: 18px; background: #7E53F8; color: #FFFFFF; font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
.backdrop { position: absolute; inset: 0; background: rgba(12,19,29,0.38); display: flex; align-items: center; justify-content: center; padding: 0 20px; }
.modal { width: 100%; background: #FFFFFF; border-radius: 16px; padding: 20px 18px 16px; box-shadow: 0 8px 30px rgba(12,19,29,0.18); }
.modal-icon-wrap { width: 44px; height: 44px; border-radius: 50%; background: #FFEFEF; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
.modal-icon { color: #E74C3C; font-size: 24px; font-weight: 700; }
.modal-title { font-size: 17px; font-weight: 600; color: #162233; text-align: center; margin-bottom: 6px; }
.modal-body { font-size: 14px; color: #6D6D80; text-align: center; line-height: 20px; margin-bottom: 16px; }
.modal-actions { display: flex; flex-direction: column; gap: 8px; }
.btn-primary { height: 44px; border-radius: 22px; background: #7E53F8; color: #FFFFFF; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
.btn-secondary { height: 44px; border-radius: 22px; background: transparent; color: #6D6D80; font-size: 14px; font-weight: 500; display: flex; align-items: center; justify-content: center; }
</style></head><body><div class="phone">
<div class="nav"><div class="nav-back">&lsaquo;</div><div class="nav-title">My Wallet</div><div class="nav-spacer"></div></div>
<div class="wallet-card">
<div class="wallet-label">Available to Withdraw</div>
<div class="wallet-amount">R$ 420,00</div>
<div class="wallet-btn">Withdraw</div>
</div>
<div class="backdrop"><div class="modal">
<div class="modal-icon-wrap"><div class="modal-icon">!</div></div>
<div class="modal-title">Não foi possível iniciar o saque</div>
<div class="modal-body">Verifique seus dados bancários e confirme que seu cadastro na Pagar.me está completo.</div>
<div class="modal-actions">
<div class="btn-primary">Verificar dados bancários</div>
<div class="btn-secondary">Cancelar</div>
</div>
</div></div>
</div></body></html>
