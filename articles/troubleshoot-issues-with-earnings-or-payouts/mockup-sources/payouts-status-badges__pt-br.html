<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; border-bottom: 1px solid #F0F1F5; }
.nav-back { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #162233; font-size: 22px; font-weight: 400; }
.nav-title { font-size: 17px; font-weight: 600; color: #162233; }
.nav-spacer { width: 28px; }
.section-title { padding: 18px 20px 10px; font-size: 17px; font-weight: 600; color: #162233; }
.list { margin: 0 12px 14px; border: 1px solid #E9EAEF; border-radius: 12px; overflow: hidden; }
.row { padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; border-bottom: 1px solid #F0F1F5; }
.row:last-child { border-bottom: none; }
.row-top, .row-bottom { display: flex; justify-content: space-between; align-items: center; }
.row-id { font-size: 15px; font-weight: 600; color: #162233; }
.row-amount { font-family: -apple-system-round, "SF Pro Rounded", system-ui, sans-serif; font-size: 15px; font-weight: 600; color: #162233; }
.status { font-size: 13px; font-weight: 600; padding: 3px 10px; border-radius: 10px; }
.status.done { color: #17B169; background: #E8F8F0; }
.status.proc { color: #9A6200; background: #FFF3D6; }
.status.fail { color: #D92C20; background: #FFE5E3; }
.row-date { font-size: 13px; color: #6B7A92; }
</style></head><body><div class="phone">
<div class="nav"><div class="nav-back">&lsaquo;</div><div class="nav-title">Histórico de pagamentos</div><div class="nav-spacer"></div></div>
<div class="section-title">Saques recentes</div>
<div class="list">
<div class="row">
<div class="row-top"><div class="row-id">#PAY-12345</div><div class="row-amount">R$ 350,00</div></div>
<div class="row-bottom"><div class="status done">Concluído</div><div class="row-date">19/04/2026</div></div>
</div>
<div class="row">
<div class="row-top"><div class="row-id">#PAY-12340</div><div class="row-amount">R$ 520,00</div></div>
<div class="row-bottom"><div class="status proc">Processamento</div><div class="row-date">18/04/2026</div></div>
</div>
<div class="row">
<div class="row-top"><div class="row-id">#PAY-12335</div><div class="row-amount">R$ 180,00</div></div>
<div class="row-bottom"><div class="status fail">Fracassada</div><div class="row-date">17/04/2026</div></div>
</div>
</div>
</div></body></html>
