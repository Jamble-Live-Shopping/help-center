<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: rgba(0,0,0,0.18); min-height: 380px; border-radius: 24px; padding: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 2px 20px rgba(126,83,248,0.08); }
.alert { width: 270px; background: rgba(248,248,248,0.94); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 14px; overflow: hidden; text-align: center; }
.alert-body { padding: 19px 16px 18px; }
.alert-title { font-size: 17px; font-weight: 600; color: #000; line-height: 22px; }
.alert-btns { border-top: 0.5px solid rgba(60,60,67,0.22); }
.alert-btn { display: block; width: 100%; padding: 11px 8px; font-size: 17px; border: none; background: transparent; cursor: pointer; font-family: inherit; border-bottom: 0.5px solid rgba(60,60,67,0.22); color: #007AFF; }
.alert-btn:last-child { border-bottom: none; }
.alert-btn.cancel { font-weight: 600; }
</style></head><body>
<div class="phone">
  <div class="alert">
    <div class="alert-body">
      <div class="alert-title">Start as a Flash Sale or Buy It Now?</div>
    </div>
    <div class="alert-btns">
      <button class="alert-btn">Flash Sale</button>
      <button class="alert-btn">Buy It Now</button>
      <button class="alert-btn cancel">Later</button>
    </div>
  </div>
</div>
</body></html>
