<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #1A1A1F; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #0F0F12; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #1F1F25; overflow: hidden; padding: 16px 14px 18px; }
.banner { display: flex; align-items: center; padding: 10px 12px; background: rgba(201,240,10,0.16); border: 1px solid rgba(201,240,10,0.5); border-radius: 14px; margin-bottom: 12px; }
.banner-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; margin-right: 8px; flex-shrink: 0; }
.banner-title { flex: 1; font-size: 14px; font-weight: 600; color: #FFFFFF; letter-spacing: 0.2px; }
.items-left { background: #C9F00A; color: #0F0F12; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 12px; }
.product-row { display: flex; align-items: center; padding: 8px 4px 10px; }
.product-thumb { width: 56px; height: 56px; border-radius: 12px; background: linear-gradient(135deg, #2C2D33 0%, #1A1A1F 100%); margin-right: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.product-thumb svg { width: 32px; height: 32px; }
.product-text { flex: 1; min-width: 0; }
.product-name { font-size: 15px; font-weight: 600; color: #FFFFFF; line-height: 19px; margin-bottom: 4px; }
.price-row { display: flex; align-items: baseline; gap: 8px; }
.price-old { font-size: 13px; color: #6B7280; text-decoration: line-through; }
.price-new { font-size: 17px; font-weight: 700; color: #C9F00A; }
.timer-row { display: flex; align-items: center; padding: 6px 4px 12px; }
.timer-icon { width: 14px; height: 14px; margin-right: 6px; flex-shrink: 0; }
.timer-text { font-size: 13px; color: #C9F00A; font-weight: 600; font-variant-numeric: tabular-nums; }
.slider { position: relative; height: 56px; border-radius: 28px; background: #C9F00A; display: flex; align-items: center; padding: 0 4px; overflow: hidden; }
.slider-knob { width: 48px; height: 48px; border-radius: 50%; background: #0F0F12; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.slider-knob svg { width: 20px; height: 20px; }
.slider-label { flex: 1; text-align: center; font-size: 15px; font-weight: 700; color: #0F0F12; letter-spacing: 0.3px; padding-right: 48px; }
</style></head><body>
<div class="phone">
  <div class="banner">
    <div class="banner-icon">
      <svg viewBox="0 0 24 24" fill="none"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z" fill="#C9F00A"/></svg>
    </div>
    <div class="banner-title">Flash Sale • 30% OFF</div>
    <div class="items-left">3 left</div>
  </div>
  <div class="product-row">
    <div class="product-thumb">
      <svg viewBox="0 0 64 64" fill="none"><path d="M16 40c2-10 6-16 16-16s14 6 16 16l-2 8H18l-2-8z" fill="#FFFFFF" opacity="0.8"/><path d="M22 36c4-6 14-6 20 0" stroke="#0F0F12" stroke-width="1.5" fill="none"/></svg>
    </div>
    <div class="product-text">
      <div class="product-name">Pikachu Holo, PSA 9</div>
      <div class="price-row">
        <div class="price-old">$200.00</div>
        <div class="price-new">$140.00</div>
      </div>
    </div>
  </div>
  <div class="timer-row">
    <svg class="timer-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="13" r="8" stroke="#C9F00A" stroke-width="1.6"/><path d="M12 9v4l3 2" stroke="#C9F00A" stroke-width="1.6" stroke-linecap="round"/><path d="M9 3h6" stroke="#C9F00A" stroke-width="1.6" stroke-linecap="round"/></svg>
    <div class="timer-text">0:42</div>
  </div>
  <div class="slider">
    <div class="slider-knob">
      <svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#C9F00A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="slider-label">Buy Now: $140.00</div>
  </div>
</div>
</body></html>
