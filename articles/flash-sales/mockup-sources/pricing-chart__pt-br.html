<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }
.card-header { padding: 16px 18px 12px; }
.card-title { font-size: 15px; font-weight: 700; color: #162233; line-height: 20px; }
.card-sub { font-size: 12px; color: #6B7A92; line-height: 16px; margin-top: 2px; }
.row { display: flex; align-items: center; padding: 10px 18px; border-top: 1px solid #F0F1F4; }
.row.head { background: #F9FAFC; padding: 8px 18px; border-top: none; border-bottom: 1px solid #E9EAEF; }
.row.head .col { font-size: 10px; font-weight: 700; color: #6B7A92; letter-spacing: 0.5px; text-transform: uppercase; }
.col { flex: 1; font-size: 13px; color: #162233; line-height: 18px; font-variant-numeric: tabular-nums; }
.col.disc { flex: 0 0 56px; text-align: center; }
.col.orig { flex: 1.1; }
.col.pays { flex: 1.2; font-weight: 600; }
.col.earn { flex: 1.2; color: #11B981; font-weight: 600; }
.disc-pill { display: inline-block; background: rgba(126,83,248,0.10); color: #7E53F8; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
.footer { padding: 12px 18px 14px; background: #F9FAFC; border-top: 1px solid #E9EAEF; }
.footer-text { font-size: 11px; color: #6B7A92; line-height: 15px; }
.footer-text b { color: #162233; }
</style></head><body>
<div class="phone">
  <div class="card-header">
    <div class="card-title">Quanto você ganha</div>
    <div class="card-sub">Exemplo com produto de R$ 200,00</div>
  </div>
  <div class="row head">
    <div class="col orig">Original</div>
    <div class="col disc">Desc.</div>
    <div class="col pays">Comprador paga</div>
    <div class="col earn">Você recebe</div>
  </div>
  <div class="row">
    <div class="col orig">R$ 200,00</div>
    <div class="col disc"><span class="disc-pill">10%</span></div>
    <div class="col pays">R$ 180,00</div>
    <div class="col earn">R$ 180,00</div>
  </div>
  <div class="row">
    <div class="col orig">R$ 200,00</div>
    <div class="col disc"><span class="disc-pill">30%</span></div>
    <div class="col pays">R$ 140,00</div>
    <div class="col earn">R$ 140,00</div>
  </div>
  <div class="row">
    <div class="col orig">R$ 200,00</div>
    <div class="col disc"><span class="disc-pill">50%</span></div>
    <div class="col pays">R$ 100,00</div>
    <div class="col earn">R$ 100,00</div>
  </div>
  <div class="row">
    <div class="col orig">R$ 200,00</div>
    <div class="col disc"><span class="disc-pill">90%</span></div>
    <div class="col pays">R$ 20,00</div>
    <div class="col earn">R$ 20,00</div>
  </div>
  <div class="footer">
    <div class="footer-text"><b>Antes da taxa Jamble.</b> A taxa é calculada sobre o preço com desconto.</div>
  </div>
</div>
</body></html>
