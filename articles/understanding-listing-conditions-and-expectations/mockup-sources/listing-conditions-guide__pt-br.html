<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 320px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; }

.section-header { font-size: 13px; font-weight: 400; color: #6D6D80; text-transform: uppercase; padding: 14px 20px 6px; letter-spacing: -0.08px; }
.group { background: #FFFFFF; margin: 0 12px 10px; border-radius: 12px; overflow: hidden; border: 1px solid #E9EAEF; }
.row { display: flex; align-items: center; padding: 12px 16px; min-height: 44px; }
.row-icon { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; margin-right: 12px; flex-shrink: 0; padding: 6px; }
.row-icon svg { width: 100%; height: 100%; }
.row-icon.brand { background: #7E53F8; }
.row-icon.gray { background: #8E8E93; }
.row-label { font-size: 17px; color: #162233; flex: 1; line-height: 22px; }
.row.dimmed .row-label { color: #C7C7CC; }
</style></head><body><div class="phone"><div class="section-header">Guia rápido de decisão</div><div class="group"><div class="row"><div class="row-icon brand"><svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></div><div class="row-label">Etiquetas ainda presas? → Novo com etiquetas</div></div><div class="row"><div class="row-icon brand"><svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="row-label">Nunca usado, sem etiquetas? → Novo sem etiquetas</div></div><div class="row"><div class="row-icon brand"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="#FFFFFF"/></svg></div><div class="row-label">Usado 1-2 vezes, perfeito? → Muito bom</div></div><div class="row"><div class="row-icon brand"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="#FFFFFF"/></svg></div><div class="row-label">Uso regular, desgaste menor? → Bom</div></div><div class="row"><div class="row-icon brand"><svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div><div class="row-label">Uso pesado, defeitos visíveis? → Satisfatório</div></div></div><div style="height:16px"></div></div></body></html>
