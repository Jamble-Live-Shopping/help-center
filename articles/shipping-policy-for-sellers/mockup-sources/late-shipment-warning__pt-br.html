<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: rgba(0,0,0,0.35); display: flex; justify-content: center; align-items: center; padding: 12px; min-height: 420px; }
.phone { width: 340px; background: transparent; border: none; box-shadow: none; display: flex; justify-content: center; }
.alert { width: 270px; background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); border-radius: 14px; overflow: hidden; }
.alert-body { padding: 19px 16px 17px; text-align: center; }
.alert-icon { width: 44px; height: 44px; border-radius: 50%; background: #FDECEB; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 22px; color: #D92C20; font-weight: 700; }
.alert-title { font-size: 17px; font-weight: 600; color: #162233; margin-bottom: 6px; line-height: 22px; }
.alert-msg { font-size: 13px; color: #162233; line-height: 18px; }
.alert-btns { border-top: 0.5px solid #C6C6C8; display: flex; }
.alert-btn { flex: 1; padding: 11px 8px; text-align: center; font-size: 16px; white-space: nowrap; }
.alert-btn.primary { color: #7E53F8; font-weight: 600; border-right: 0.5px solid #C6C6C8; }
.alert-btn.secondary { color: #007AFF; }
</style></head><body><div class="phone"><div class="alert"><div class="alert-body"><div class="alert-icon">!</div><div class="alert-title">Prazo de envio perdido</div><div class="alert-msg">Você tinha 10 dias para enviar após confirmar a venda. O pedido pode ser cancelado automaticamente e o comprador reembolsado.</div></div><div class="alert-btns"><div class="alert-btn secondary">Mais tarde</div><div class="alert-btn primary">Gerar etiqueta</div></div></div></div></body></html>
