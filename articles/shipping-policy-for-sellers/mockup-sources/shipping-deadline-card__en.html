<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif; background: #F9FAFC; display: flex; justify-content: center; padding: 12px; }
.phone { width: 340px; background: #FFFFFF; border-radius: 24px; box-shadow: 0 2px 20px rgba(126,83,248,0.08); border: 1px solid #E9EAEF; overflow: hidden; padding: 16px 0 16px; }

.section-header { font-size: 13px; color: #6D6D80; text-transform: uppercase; padding: 8px 20px 10px; letter-spacing: 0.4px; font-weight: 600; }
.card { background: #FFFFFF; margin: 0 16px 12px; border-radius: 12px; border: 1px solid #E9EAEF; padding: 14px; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.status { display: inline-flex; align-items: center; gap: 6px; background: #F3F4F8; color: #162233; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; }
.status .dot { width: 6px; height: 6px; border-radius: 50%; background: #FCB022; }
.countdown { font-size: 12px; font-weight: 600; color: #D92C20; background: #FDECEB; padding: 4px 10px; border-radius: 999px; }
.buyer-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: #E9EAEF; }
.buyer-name { font-size: 15px; font-weight: 600; color: #162233; }
.buyer-sub { font-size: 12px; color: #6D6D80; }
.item-row { display: flex; gap: 10px; align-items: center; background: #F9FAFC; border-radius: 10px; padding: 8px; margin-bottom: 12px; }
.thumb { width: 44px; height: 44px; border-radius: 8px; background: linear-gradient(135deg, #E9EAEF, #BDC2CD); }
.item-title { font-size: 14px; color: #162233; font-weight: 500; }
.item-price { font-size: 13px; color: #6D6D80; margin-top: 2px; }
.cta { background: #7E53F8; color: #FFFFFF; height: 40px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
</style></head><body><div class="phone"><div class="section-header">Awaiting Shipment</div><div class="card"><div class="card-top"><div class="status"><span class="dot"></span>Awaiting Shipment</div><div class="countdown">3 days Left</div></div><div class="buyer-row"><div class="avatar"></div><div><div class="buyer-name">Ana Silva</div><div class="buyer-sub">Sale confirmed on Nov 12</div></div></div><div class="item-row"><div class="thumb"></div><div><div class="item-title">Charizard Holo 1999</div><div class="item-price">R$ 289.00</div></div></div><div class="cta">Generate Label</div></div></div></body></html>
