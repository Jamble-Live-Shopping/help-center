<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: rgba(22,34,51,0.45);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 12px;
  min-height: 480px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px 24px 14px 14px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.16);
  border: 1px solid #E9EAEF;
  overflow: hidden;
  padding: 28px 22px 22px;
}
.handle { width: 40px; height: 4px; border-radius: 2px; background: #D8D9DF; margin: -16px auto 18px; }
.illu { width: 64px; height: 64px; margin: 0 auto 18px; border-radius: 50%; background: #F4EFFF; display: flex; align-items: center; justify-content: center; }
.illu svg { width: 32px; height: 32px; }
.title { font-size: 19px; font-weight: 700; color: #162233; text-align: center; letter-spacing: -0.2px; }
.body-copy { margin-top: 12px; font-size: 14px; color: #4D5260; line-height: 20px; text-align: center; padding: 0 6px; }
.cta { margin-top: 22px; height: 50px; border-radius: 25px; background: #7E53F8; color: #FFFFFF; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
.dismiss { margin-top: 10px; font-size: 14px; font-weight: 500; color: #6D6D80; text-align: center; padding: 12px 0; }
</style></head><body>
<div class="phone">
  <div class="handle"></div>
  <div class="illu"><svg viewBox="0 0 24 24" fill="none" stroke="#7E53F8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20"/><path d="M5 8l-2 4 2 4"/><path d="M19 8l2 4-2 4"/><path d="M9 4l-2 16"/><path d="M15 4l2 16"/></svg></div>
  <div class="title">Vacation Mode</div>
  <div class="body-copy">When turning on Vacation Mode, all your items will become unavailable for others to purchase.</div>
  <div class="cta">Turn On</div>
  <div class="dismiss">Cancel</div>
</div></body></html>
