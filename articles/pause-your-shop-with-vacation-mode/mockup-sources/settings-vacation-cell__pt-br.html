<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
  background: #F9FAFC;
  display: flex;
  justify-content: center;
  padding: 12px;
}
.phone {
  width: 340px;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 2px 20px rgba(126,83,248,0.08);
  border: 1px solid #E9EAEF;
  overflow: hidden;
  padding: 0 0 12px;
}
.nav { padding: 16px 18px 10px; }
.nav-title { font-size: 22px; font-weight: 700; color: #162233; letter-spacing: -0.4px; }
.section-label { padding: 16px 18px 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.6px; color: #6D6D80; text-transform: uppercase; }
.row { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid #F1F2F5; }
.row:last-child { border-bottom: none; }
.row-icon { width: 32px; height: 32px; border-radius: 8px; background: #F4EFFF; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.row-icon svg { width: 16px; height: 16px; }
.row-label { flex: 1; font-size: 15px; font-weight: 500; color: #162233; }
.row-arrow { color: #B5B6BF; font-size: 14px; }
.row.highlighted { background: #FBF8FF; border: 1px solid #DCC9FF; border-radius: 12px; margin: 0 12px; padding: 12px 16px; }
.row.highlighted .row-icon { background: #7E53F8; }
.row.highlighted .row-icon svg { stroke: #FFFFFF; }
</style></head><body>
<div class="phone">
  <div class="nav"><div class="nav-title">Configurações</div></div>
  <div class="section-label">Sell</div>
  <div class="row">
    <div class="row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#7E53F8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-6 9 6v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>
    <div class="row-label">Minhas vendas</div>
    <div class="row-arrow">›</div>
  </div>
  <div class="row">
    <div class="row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#7E53F8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg></div>
    <div class="row-label">Carteira</div>
    <div class="row-arrow">›</div>
  </div>
  <div class="row">
    <div class="row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#7E53F8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-4 9 4-9 4z"/><path d="M3 7v10l9 4 9-4V7"/></svg></div>
    <div class="row-label">Preferências de envio</div>
    <div class="row-arrow">›</div>
  </div>
  <div class="row highlighted">
    <div class="row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20"/><path d="M5 8l-2 4 2 4"/><path d="M19 8l2 4-2 4"/><path d="M9 4l-2 16"/><path d="M15 4l2 16"/></svg></div>
    <div class="row-label">Modo de férias</div>
    <div class="row-arrow">›</div>
  </div>
</div></body></html>
