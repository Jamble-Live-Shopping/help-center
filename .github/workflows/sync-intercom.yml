name: Sync articles to Intercom

# Trigger policy, post batch real-1-rerun-2 process breach (2026-05-11):
#
# The previous workflow had `on: push` on main paths `articles/**`, so
# every article PR merge auto-published to Intercom. During the 10-PR
# merge wave, PR #93 auto-synced article 14288117 before Aymar could
# disable the workflow. That was an accidental publish, not a content
# defect.
#
# To prevent recurrence:
#   - NO `on: push` trigger any more. Merging an article PR to main
#     does NOT publish to Intercom.
#   - workflow_dispatch only. Each run requires an explicit `article`
#     input (one slug per run; no "sync all" fallback).
#   - Defense in depth: a `confirm` input must be exactly the string
#     "yes" for the sync step to run. Defaults to "no" so an accidental
#     `Run workflow` click on the UI without changing the field
#     refuses to publish.
#
# Process docs: see process/15-intercom-sync.md for the manual
# publish runbook.
on:
  workflow_dispatch:
    inputs:
      article:
        description: 'Article slug OR path to sync. Examples: choose-quantities-when-listing-products  or  articles/choose-quantities-when-listing-products. One per run.'
        required: true
      confirm:
        description: 'Type "yes" (lowercase, no quotes) to confirm publishing to production Intercom. Anything else aborts the sync.'
        required: true
        default: 'no'

concurrency:
  group: sync-intercom
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Refuse without confirm
        if: github.event.inputs.confirm != 'yes'
        run: |
          echo "::error::Sync refused. The 'confirm' input must be exactly 'yes' to publish to Intercom. Got: '${{ github.event.inputs.confirm }}'"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Resolve article path
        id: article
        run: |
          set -euo pipefail
          INPUT="${{ github.event.inputs.article }}"
          # Accept "slug" or "articles/slug". Strip trailing slash.
          case "$INPUT" in
            articles/*) DIR="${INPUT%/}" ;;
            *)          DIR="articles/${INPUT%/}" ;;
          esac
          if [[ ! -d "$DIR" ]]; then
            echo "::error::Article directory not found: $DIR"
            exit 1
          fi
          if [[ ! -f "$DIR/metadata.yml" ]]; then
            echo "::error::Article folder has no metadata.yml: $DIR"
            exit 1
          fi
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "Will sync: $DIR"

      - name: Sync the article
        env:
          INTERCOM_TOKEN: ${{ secrets.INTERCOM_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== ${{ steps.article.outputs.dir }} ==="
          bash scripts/sync-one.sh "${{ steps.article.outputs.dir }}"

      - name: Summary
        if: always()
        run: |
          echo "## Sync summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Article: ${{ steps.article.outputs.dir }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Confirm: ${{ github.event.inputs.confirm }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Triggered by: ${{ github.actor }} via workflow_dispatch" >> "$GITHUB_STEP_SUMMARY"
